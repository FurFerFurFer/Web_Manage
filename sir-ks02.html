              )}
              {ks03SubView==="sourcedump"&&(
                <SourceDumpView sourceDumps={sourceDumps} mms={mms} mmColor={mmColor}
                  dumpPath={dumpPath} setDumpPath={setDumpPath}
                  onAddEntry={addDumpEntry} onDeleteEntry={deleteDumpEntry} onRename={renameDumpEntry}
                  onAddMMLink={addDumpMMLink} onRemoveMMLink={removeDumpMMLink}
                  onAddURLLink={addDumpURLLink} onRemoveURLLink={removeDumpURLLink}
                  onAddTextBlock={addDumpTextBlock} onRemoveTextBlock={removeDumpTextBlock}
                  onTransferTextBlock={transferDumpTextBlock} onTransferURLLink={transferDumpURLLink}
                  onOpenMMSC={(mmId)=>{setSelectedMM(mmId);setSelectedMMMode("sc");setView("ks03");}}/>
              )}
            </div>
          )}
          {view==="ks03"&&selectedMM&&currentMM&&<MMDetail mm={currentMM} {...mmDetailProps} initialMode={selectedMMMode}/>}

          {view==="kolb"&&!selectedKolb&&(
            <div className="p-4 max-w-2xl mx-auto">
              <div className="flex items-center justify-between mb-4">
                <div className="text-xs text-gray-500 tracking-widest">KOLB — ALL ENTRIES</div>
                <div className="flex gap-1">
                  {[["all","ALL"],["unlinked","UNLINKED"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setKolbView(v)} className={`px-3 py-1 rounded text-xs font-bold ${kolbView===v?"bg-white text-gray-950":"text-gray-400 hover:text-white"}`}>{l}</button>
                  ))}
                </div>
              </div>
              {!displayKolbs.length&&<div className="text-gray-600 text-center py-10 text-xs">No Kolbs yet.</div>}
              {displayKolbs.map(k=>{
                const mm=k.mmId?mmMap[k.mmId]:null,hasMG=mgChanges.some(c=>c.kolbId===k.id);
                return (
                  <div key={k.id} onClick={()=>setSelectedKolbId(k.id)} className="bg-gray-900 border border-gray-800 hover:border-gray-600 rounded px-4 py-3 mb-2 cursor-pointer">
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        {mm?(<><div className="w-2 h-2 rounded-full" style={{backgroundColor:mmColor(mm.id)}}/><span className="text-xs text-gray-300">{mm.name}</span></>):<span className="text-xs text-gray-500 italic">unlinked</span>}
                        {hasMG&&<span className="text-xs bg-emerald-900 text-emerald-300 px-1.5 py-0.5 rounded">MG</span>}
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={(e)=>{e.stopPropagation();if(window.confirm("Duplicate this kolb?"))duplicateKolb(k.id,k.mmId);}} className="bg-gray-700 hover:bg-gray-600 text-xs px-2 py-1 rounded">dupe</button>
                        <button onClick={(e)=>{e.stopPropagation();if(window.confirm("Delete this kolb?"))deleteKolb(k.id);}} className="bg-red-900 hover:bg-red-800 text-xs px-2 py-1 rounded text-red-300">delete</button>
                        <span className="text-xs text-gray-500">{k.date}</span>
                      </div>
                    </div>
                    <div className="text-xs text-gray-300 truncate">{k.experience||"(no experience noted)"}</div>
                    {k.experiments&&<div className="text-xs text-emerald-300 truncate mt-0.5">→ {k.experiments}</div>}
                  </div>
                );
              })}
            </div>
          )}
          {view==="kolb"&&selectedKolb&&(()=>{
            const k=selectedKolb,mm=k.mmId?mmMap[k.mmId]:null,hasMG=mgChanges.some(c=>c.kolbId===k.id);
            const filteredT2=type2mms.filter(m=>m.name.toLowerCase().includes(kolbLinkSearch.toLowerCase()));
            return (
              <KolbEditView
                kolb={k} mm={mm} hasMG={hasMG} filteredT2={filteredT2} allT2={type2mms}
                kolbLinkSearch={kolbLinkSearch} setKolbLinkSearch={setKolbLinkSearch}
                mmColor={mmColor} levelTemplates={levelTemplates}
                onBack={()=>setSelectedKolbId(null)}
                onSave={(updated)=>{
                  const mgValue=(updated.mgAdd||updated.experiments||"").trim();
                  setKolbs(p=>p.map(kb=>kb.id===k.id?{...kb,...updated}:kb));
                  if (updated.mmId!==k.mmId){
                    const hasNewMG=updated.mmId&&mmMap[updated.mmId]?.type==="2"&&mgValue;
                    const targetMM=hasNewMG?mmMap[updated.mmId]:null;
                    const affectedMmIds=new Set(mgChanges.filter(c=>c.kolbId===k.id&&c.mmId).map(c=>c.mmId));
                    if (k.mmId) affectedMmIds.add(k.mmId);
                    setMgChanges(p=>{
                      const moved=p.map(c=>c.kolbId===k.id?{...c,mmId:updated.mmId}:c);
                      return hasNewMG?[...moved,{id:nid(),mmId:updated.mmId,kolbId:k.id,oldMG:targetMM.currentMG||"(none)",newMG:mgValue,experiment:updated.experiments||"",date:k.date}]:moved;
                    });
                    if (hasNewMG) setMms(p=>p.map(m=>m.id===updated.mmId?{...m,currentMG:mgValue}:m));
                    if (affectedMmIds.size){
                      setMms(p=>p.map(m=>{
                        if (!affectedMmIds.has(m.id)) return m;
                        const remaining=mgChanges.filter(c=>c.mmId===m.id&&c.kolbId!==k.id).sort((a,b)=>b.date.localeCompare(a.date));
                        if (m.id===k.mmId){
                          const remKolbs=kolbs.filter(kb=>kb.mmId===k.mmId&&kb.id!==k.id).sort((a,b)=>b.date.localeCompare(a.date));
                          return {...m,currentMG:remaining.length?remaining[0].newMG:"",rating:remKolbs.length&&remKolbs[0].level?Number(remKolbs[0].level):null};
                        }
                        return {...m,currentMG:remaining.length?remaining[0].newMG:""};
                      }));
                    }
                  } else if (updated.mmId&&mmMap[updated.mmId]?.type==="2"&&mgValue&&updated.mmId===k.mmId){
                    setMgChanges(p=>p.map(c=>c.kolbId===k.id?{...c,newMG:mgValue,experiment:updated.experiments||""}:c));
                    const mmChanges=mgChanges.filter(c=>c.mmId===updated.mmId).sort((a,b)=>b.date.localeCompare(a.date));
                    if (!mmChanges.length||mmChanges[0].kolbId===k.id)
                      setMms(p=>p.map(m=>m.id===updated.mmId?{...m,currentMG:mgValue}:m));
                  }
                  if (updated.mmId&&mmMap[updated.mmId]?.type==="2"&&updated.level){
                    setMms(p=>p.map(m=>m.id===updated.mmId?{...m,rating:Number(updated.level)}:m));
                  }
                  setSelectedKolbId(k.id);
                }}
              />
            );
          })()}

          {view==="srch"&&!selectedMM&&(
            <div className="overflow-y-auto h-screen-nav">
              <SrchView mms={mms} mmColor={mmColor} onOpen={id=>openMM(id,"ks03")} focusId={srchFocusId} onClearFocus={()=>setSrchFocusId(null)}
                onArrange={(draggedId, targetId, insertBefore) => {
                  setMms(prev => {
                    const byId = Object.fromEntries(prev.map(m => [m.id, m]));
                    const m1 = byId[draggedId], m2 = byId[targetId];
                    if (!m1 || !m2) return prev;
                    const vp1 = (m1.parentIds || []).filter(pid => byId[pid]);
                    const vp2 = (m2.parentIds || []).filter(pid => byId[pid]);
                    const areSiblings = (vp1.length === 0 && vp2.length === 0) || vp1.some(p => vp2.includes(p));
                    if (!areSiblings) return prev;
                    const di = prev.findIndex(m => m.id === draggedId);
                    const ti = prev.findIndex(m => m.id === targetId);
                    const arr = [...prev];
                    const [moved] = arr.splice(di, 1);
                    const newTi = arr.findIndex(m => m.id === targetId);
                    arr.splice(insertBefore ? newTi : newTi + 1, 0, moved);
                    return arr;
                  });
                }}/>
            </div>
          )}
          {view==="srch"&&selectedMM&&currentMM&&<MMDetail mm={currentMM} {...mmDetailProps} initialMode="ks03"/>}

          {addMMModal&&(
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 overflow-y-auto">
              <div className="bg-gray-900 border border-gray-700 rounded-lg p-5 w-full max-w-sm my-4">
                <div className="font-bold mb-4 tracking-widest text-xs">NEW MIND MAP</div>
                <input value={newMM.name} onChange={e=>setNewMM(p=>({...p,name:e.target.value}))} placeholder="MM name"
                  className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-3 text-white placeholder-gray-600 text-sm"/>
                <div className="flex gap-2 mb-3">
                  {[["anchor","Anchor"],["1","T1"],["2","T2"]].map(([t,label])=>(
                    <button key={t} onClick={()=>setNewMM(p=>({...p,type:t}))}
                      className={`flex-1 py-2 rounded text-xs font-bold ${newMM.type===t?"bg-white text-gray-950":"bg-gray-800 text-gray-400"}`}>
                      {label}
                    </button>
                  ))}
                </div>
                {newMM.type==="anchor"&&(
                  <textarea value={newMM.explanation} onChange={e=>setNewMM(p=>({...p,explanation:e.target.value}))}
                    placeholder="Explanation (optional)" rows={2}
                    className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-3 text-white placeholder-gray-600 text-sm resize-none"/>
                )}
                <div className="mb-1 text-xs text-gray-400">Parent MM:</div>
                <input value={parentSearch} onChange={e=>setParentSearch(e.target.value)} placeholder="Search parents..."
                  className="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 mb-1 text-white placeholder-gray-600 text-xs outline-none focus:border-gray-500"/>
                <div className="max-h-32 overflow-y-auto space-y-0.5 mb-3">
                  <button onClick={()=>setNewMM(p=>({...p,parentIds:[]}))} className={`w-full text-left text-xs px-3 py-1.5 rounded ${newMM.parentIds.length===0?"bg-gray-600 text-white":"bg-gray-800 text-gray-400 hover:bg-gray-700"}`}>No parent (root)</button>
                  {mms.filter(m=>m.name.toLowerCase().includes(parentSearch.toLowerCase())).map(m=>(
                    <button key={m.id} onClick={()=>setNewMM(p=>({...p,parentIds:p.parentIds.includes(m.id)?p.parentIds.filter(x=>x!==m.id):[...p.parentIds,m.id]}))}
                      className={`w-full text-left text-xs px-3 py-1.5 rounded flex items-center gap-2 ${newMM.parentIds.includes(m.id)?"bg-indigo-800 text-white":"bg-gray-800 text-gray-300 hover:bg-gray-700"}`}>
                      <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:m.type==="anchor"?"#6b7280":m.type==="1"?"#ef4444":mmColor(m.id)}}/>
                      <span className="truncate">{m.name}</span>
                    </button>
                  ))}
                </div>
                <div className="flex gap-2">
                  <button onClick={addMM} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded font-bold text-xs">ADD</button>
                  <button onClick={()=>{setAddMMModal(false);setParentSearch("");}} className="flex-1 bg-gray-800 text-gray-300 py-2 rounded text-xs">CANCEL</button>
                </div>
              </div>
            </div>
          )}

          {kolbModal&&<KolbForm mmOptions={type2mms} initialMMId={kolbModal.mmId||null} levelTemplates={levelTemplates} onSave={saveKolb} onCancel={()=>setKolbModal(null)}/>}

          {linModal&&<LinModal mms={mms} sessions={sessions} sirSessionsMap={sirSessionsMap} mmColor={mmColor} linModal={linModal} setLinModal={setLinModal} linDayTitles={linDayTitles} onSave={(items,title)=>{saveLinSession(items,title);setLinModal(null);}}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
  <script src="notes-widget.js"></script>
</body>
</html>
