    function getMGsForDay(ds, mgSchedule) {
      if (Object.prototype.hasOwnProperty.call(mgSchedule, ds)) return mgSchedule[ds];
      const d = new Date(ds + 'T12:00:00');
      for (let i = 1; i <= 30; i++) {
        d.setDate(d.getDate() - 1);
        const prev = new Date(d).toISOString().split('T')[0];
        if (Object.prototype.hasOwnProperty.call(mgSchedule, prev)) return mgSchedule[prev];
      }
      return [];
    }
    const getDIM = (y,m) => new Date(y,m+1,0).getDate();

    // ── unified DB helpers ────────────────────────────────────────────────────
    function _getTrackDB() {
      try { return JSON.parse(localStorage.getItem('track_db') || '{}'); } catch { return {}; }
    }
    function _getSlots()        { return _getTrackDB().slots || []; }
    function _getActiveSlotId() { return _getTrackDB().activeSlotId || null; }
    function _setSlots(slots) {
      const db = _getTrackDB(); db.slots = slots;
      localStorage.setItem('track_db', JSON.stringify(db));
    }
    function _setActiveSlotId(id) {
      const db = _getTrackDB(); db.activeSlotId = id;
      localStorage.setItem('track_db', JSON.stringify(db));
    }
    // migrate all prior states → unified {slots, activeSlotId} at top level
    (function() {
      const db = _getTrackDB();
      if (db.slots) return;

      let slots = [], activeId = null;
      let pGoals = [], pSA = [], pSE = [];

      if (db.progress) {
        pGoals = db.progress.goals     || [];
        pSA    = db.progress.saActions || [];
        pSE    = db.progress.saEntries || [];
      } else {
        try{const r=localStorage.getItem('progress_goals');      if(r)pGoals=JSON.parse(r);}catch{}
        try{const r=localStorage.getItem('progress_sa_actions'); if(r)pSA  =JSON.parse(r);}catch{}
        try{const r=localStorage.getItem('progress_sa_entries'); if(r)pSE  =JSON.parse(r);}catch{}
      }

      if (db.ks02) {
        slots    = (db.ks02.slots||[]).map(s=>({...s,goals:s.goals||[],saActions:s.saActions||[],saEntries:s.saEntries||[]}));
        activeId = db.ks02.activeSlotId||null;
      } else {
        try{const r=localStorage.getItem('ks02_slots');        if(r)slots   =JSON.parse(r).map(s=>({...s,goals:[],saActions:[],saEntries:[]}));}catch{}
        try{const r=localStorage.getItem('ks02_activeSlotId'); if(r)activeId=r;}catch{}
      }

      if (!slots.length) {
        const s={id:"slot-"+Date.now(),name:"Default",createdAt:today(),sessions:[],mms:[],kolbs:[],mgChanges:[],linChanges:[],goals:pGoals,saActions:pSA,saEntries:pSE};
        slots=[s]; activeId=s.id;
      } else {
        const idx=activeId?Math.max(0,slots.findIndex(s=>s.id===activeId)):0;
        if(pGoals.length||pSA.length||pSE.length) slots[idx]={...slots[idx],goals:pGoals,saActions:pSA,saEntries:pSE};
      }

      if (!activeId||!slots.find(s=>s.id===activeId)) activeId=slots[0].id;
      localStorage.setItem('track_db', JSON.stringify({slots, activeSlotId:activeId}));
    })();

    (function migrateRating() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(slot => ({
        ...slot,
        mms: (slot.mms || []).map(m => {
          if (m.rating === undefined) { dirty = true; return { ...m, rating: null }; }
          return m;
        }),
      }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateSourceDumps() {
      const db = _getTrackDB(); if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(s => { if (!s.sourceDumps){dirty=true;return{...s,sourceDumps:[]};} return s; });
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateSCBlocksOrder() {
      const db = _getTrackDB(); if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(s => ({
        ...s,
        mms: (s.mms || []).map(m => {
          if (!m.scBlocksOrder) { dirty = true; return { ...m, scBlocksOrder: [] }; }
          return m;
        })
      }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateAggBlocksOrder() {
      const db = _getTrackDB(); if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(s => ({
        ...s,
        mms: (s.mms || []).map(m => {
          if (!m.scAggBlocksOrder) { dirty = true; return { ...m, scAggBlocksOrder: [] }; }
          return m;
        })
      }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateSourceDumpActivated(){
      const db=_getTrackDB();if(!db.slots)return;
      let dirty=false;
      db.slots=db.slots.map(s=>({...s,mms:(s.mms||[]).map(m=>{
        if(m.sourceDumpActivated===undefined){dirty=true;return{...m,sourceDumpActivated:false};}
        return m;
      })}));
      if(dirty)localStorage.setItem('track_db',JSON.stringify(db));
    })();

    function getDescendants(mmId, mmsArray) {
      const result = [];
      const visit = (id) => {
        mmsArray.filter(m => (m.parentIds || []).includes(id)).forEach(k => { result.push(k); visit(k.id); });
      };
      visit(mmId);
      return result;
    }

    function isLeafMM(mmId, mmsArray) {
      return !mmsArray.some(m => (m.parentIds || []).includes(mmId));
    }

	    function getAncestors(mmId,mmsArray){
	      const result=[];const visited=new Set([mmId]);
	      const mmById=Object.fromEntries(mmsArray.map(m=>[m.id,m]));
	      const queue=[mmId];
	      while(queue.length){
        const id=queue.shift();const node=mmById[id];if(!node)continue;
        (node.parentIds||[]).forEach(pid=>{
          if(!visited.has(pid)&&mmById[pid]){visited.add(pid);result.push(mmById[pid]);queue.push(pid);}
        });
      }
	      return result;
	    }

    function getSCTextBlocks(link) {
      const blocks = Array.isArray(link?.textBlocks) ? link.textBlocks : [];
      if (blocks.length) return blocks;
      const legacyText = (link?.text || "").trim();
      return legacyText ? [{ id: link.id + "_m", title: "", explanation: legacyText }] : [];
    }

    function scLinkHasContent(link) {
      return getSCTextBlocks(link).length > 0 || (Array.isArray(link?.links) && link.links.length > 0);
    }

    function scOrderMatchesLink(orderItem, dumpId, linkId) {
      return orderItem?.dumpId === dumpId && orderItem?.linkId === linkId;
    }

    function sameSCOrderItem(a, b) {
      return a?.dumpId === b?.dumpId && a?.linkId === b?.linkId && a?.itemType === b?.itemType && a?.itemId === b?.itemId;
    }

    (function repairTransferredParentSCDumps(){
      const db = _getTrackDB(); if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(slot => {
        const mms = slot.mms || [];
        const sourceDumps = slot.sourceDumps || [];
        if (!mms.length || !sourceDumps.length) return slot;
        const mmById = Object.fromEntries(mms.map(m => [m.id, m]));
        const moves = [];
        const repairedSourceDumps = sourceDumps.map(d => {
          let changed = false;
          const mmLinks = (d.mmLinks || []).map(l => {
            if (l.restoredFromMmId !== undefined) return l;
            const child = mmById[l.mmId];
            const parentIds = (child?.parentIds || []).filter(pid => mmById[pid]);
            if (!child || parentIds.length !== 1) return l;
            const linkId = Number(l.id);
            const childId = Number(child.id);
            if (!Number.isFinite(linkId) || !Number.isFinite(childId) || linkId >= childId) return l;
            if (d.createdAt && child.createdAt && d.createdAt > child.createdAt) return l;
            if (!scLinkHasContent(l)) return l;
            const parentId = parentIds[0];
            changed = true;
            moves.push({ childId: child.id, parentId, dumpId: d.id, link: l });
            return { ...l, mmId: parentId, restoredFromMmId: child.id };
          });
          return changed ? { ...d, mmLinks } : d;
        });
        if (!moves.length) return slot;

        const repairedMMs = mms.map(m => {
          let next = m;
          const parentMoves = moves.filter(move => move.parentId === m.id);
          if (parentMoves.length) {
            const order = [...(next.scBlocksOrder || [])];
            parentMoves.forEach(move => {
              const childOrder = (mmById[move.childId]?.scBlocksOrder || []).filter(o => scOrderMatchesLink(o, move.dumpId, move.link.id));
              childOrder.forEach(o => { if (!order.some(existing => sameSCOrderItem(existing, o))) order.push(o); });
            });
            next = { ...next, scBlocksOrder: order, sourceDumpActivated: true };
          }
          return next;
        });

        dirty = true;
        return { ...slot, mms: repairedMMs, sourceDumps: repairedSourceDumps };
      });
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

	    function computeLayerLayout(mms, layerRadii=[0,180,340,500,660]) {
      if (!mms.length) return {};
      const CX=360, CY=260;
      const mmById=Object.fromEntries(mms.map(m=>[m.id,m]));

      const childMap={};
      mms.forEach(m=>{
        childMap[m.id]=childMap[m.id]||[];
        (m.parentIds||[]).forEach(pid=>{
          if (!mmById[pid]) return;
          childMap[pid]=childMap[pid]||[];
          if (!childMap[pid].includes(m.id)) childMap[pid].push(m.id);
        });
      });

      // Bidirectional adjacency to detect disconnected components
      const adj={};
      mms.forEach(m=>{
        adj[m.id]=adj[m.id]||[];
        (m.parentIds||[]).forEach(pid=>{
          if (!mmById[pid]) return;
          adj[m.id]=adj[m.id]||[];
          adj[pid]=adj[pid]||[];
          if (!adj[m.id].includes(pid)) adj[m.id].push(pid);
          if (!adj[pid].includes(m.id)) adj[pid].push(m.id);
        });
      });

      // BFS to find connected components
      const visited={};
      const components=[];
      mms.forEach(m=>{
        if (visited[m.id]) return;
        const comp=[]; const q=[m.id]; visited[m.id]=true; let h=0;
        while(h<q.length){ const id=q[h++]; comp.push(id); (adj[id]||[]).forEach(nid=>{ if (!visited[nid]){ visited[nid]=true; q.push(nid); } }); }
        components.push(comp);
      });

      // Layout one component centered at (cx, cy); writes into pos
      function layoutComponent(compIds, cx, cy, pos){
        const compSet=new Set(compIds);
        const compNodes=compIds.map(id=>mmById[id]);
        const roots=compNodes.filter(m=>!(m.parentIds||[]).some(p=>mmById[p]&&compSet.has(p)));

        const depth={};
        const queue=[];
        roots.forEach(r=>{ depth[r.id]=0; queue.push(r.id); });
        let head=0;
        while(head<queue.length){
          const id=queue[head++];
          (childMap[id]||[]).forEach(cid=>{
            if (compSet.has(cid)&&depth[cid]===undefined){ depth[cid]=depth[id]+1; queue.push(cid); }
          });
        }
        const maxDepth=Object.values(depth).length?Math.max(...Object.values(depth)):0;
        compNodes.forEach(m=>{ if (depth[m.id]===undefined) depth[m.id]=maxDepth+1; });

        const leafMemo={};
        function leafCount(id){
          if (leafMemo[id]!==undefined) return leafMemo[id];
          const ch=(childMap[id]||[]).filter(c=>compSet.has(c));
          leafMemo[id]=ch.length===0?1:ch.reduce((s,c)=>s+leafCount(c),0);
          return leafMemo[id];
        }

        const LEAF_BRANCH=150;
        function layout(id, a0, a1, parentPos=null){
          const d=depth[id]||0;
          const ch=(childMap[id]||[]).filter(c=>compSet.has(c));
          const isLeaf=ch.length===0;
          if (d===0){
            pos[id]={x:cx,y:cy};
          } else if (isLeaf && parentPos){
            const a=(a0+a1)/2;
            pos[id]={x:parentPos.x+LEAF_BRANCH*Math.cos(a),y:parentPos.y+LEAF_BRANCH*Math.sin(a)};
          } else {
            const r=layerRadii[Math.min(d,layerRadii.length-1)];
            const a=(a0+a1)/2;
            pos[id]={x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};
          }
          if (!ch.length) return;
          const total=ch.reduce((s,c)=>s+leafCount(c),0);
          let cur=a0;
          ch.forEach(cid=>{ const span=(leafCount(cid)/total)*(a1-a0); layout(cid,cur,cur+span,pos[id]); cur+=span; });
        }

        if (roots.length===1){
          layout(roots[0].id,-Math.PI/2,3*Math.PI/2);
        } else {
          const total=roots.reduce((s,r)=>s+leafCount(r.id),0)||1;
          let cur=-Math.PI/2;
          roots.forEach(r=>{ const span=(leafCount(r.id)/total)*2*Math.PI; layout(r.id,cur,cur+span); cur+=span; });
        }
        compNodes.forEach(m=>{ if (!pos[m.id]) pos[m.id]={x:cx,y:cy}; });
      }

      const pos={};
      if (components.length===1){
        layoutComponent(components[0], CX, CY, pos);
      } else {
        // Estimate radius for each component, then arrange in a grid
        const radii=components.map(comp=>{
          const compSet=new Set(comp);
          const compNodes=comp.map(id=>mmById[id]);
          const maxD=compNodes.reduce((mx,m)=>{
            let d=0; let cur=m;
            // rough depth: count ancestors
            const seen=new Set();
            while(cur&&!seen.has(cur.id)){
              seen.add(cur.id);
              const pid=(cur.parentIds||[]).find(p=>mmById[p]&&compSet.has(p));
              if (!pid) break; cur=mmById[pid]; d++;
            }
            return Math.max(mx,d);
          },0);
          return layerRadii[Math.min(maxD,layerRadii.length-1)]||layerRadii[layerRadii.length-1];
        });
        const cols=Math.ceil(Math.sqrt(components.length));
        const rows=Math.ceil(components.length/cols);
        const GAP=120;
        // cell size based on largest radius in each column/row
        const cellW=Math.max(...radii)*2+GAP;
        const cellH=Math.max(...radii)*2+GAP;
        const gridW=cols*cellW;
        const gridH=rows*cellH;
        const startX=CX-gridW/2+cellW/2;
        const startY=CY-gridH/2+cellH/2;
        components.forEach((comp,i)=>{
          const col=i%cols, row=Math.floor(i/cols);
          const cx=startX+col*cellW;
          const cy=startY+row*cellH;
          layoutComponent(comp, cx, cy, pos);
        });
      }

      return pos;
    }

    function applyRepulsion(pos,minDist=90,iterations=80){
      const ids=Object.keys(pos);
      const out=Object.fromEntries(ids.map(id=>[id,{...pos[id]}]));
      for(let k=0;k<iterations;k++){
        for(let i=0;i<ids.length;i++){
          for(let j=i+1;j<ids.length;j++){
            const a=out[ids[i]],b=out[ids[j]];
            const dx=b.x-a.x,dy=b.y-a.y;
            const dist=Math.sqrt(dx*dx+dy*dy)||0.01;
            if(dist<minDist){const push=(minDist-dist)/2,nx=dx/dist*push,ny=dy/dist*push;a.x-=nx;a.y-=ny;b.x+=nx;b.y+=ny;}
          }
        }
      }
      return out;
    }

    function SIRWheel({sessions,onSessionClick,onRevert}) {
      const doneCount=sessions.filter(s=>s.done).length;
      const STAGE_COLORS_SIR=["#7c3aed","#2563eb","#0891b2","#0d9488","#059669"];
      return (
        <div className="flex flex-col gap-3 w-full">
          <div className="flex items-center w-full">
            {sessions.map((s,i)=>{
              const col=s.done?STAGE_COLORS_SIR[i]:s.skipped?"#374151":STAGE_COLORS_SIR[i];
              const opacity=s.done?1:s.skipped?0.3:0.45;
              const isNext=!s.done&&!s.skipped&&sessions.slice(0,i).every(p=>p.done||p.skipped);
              return (
                <React.Fragment key={s.id}>
                  <div className="flex flex-col items-center flex-1" onClick={()=>!s.done&&onSessionClick(s)} style={{cursor:s.done?"default":"pointer"}}>
                    <div className="w-full rounded-lg flex flex-col items-center justify-center py-2 px-1 border-2 transition-all"
                      style={{backgroundColor:col,borderColor:isNext?col:"transparent",opacity,boxShadow:isNext?`0 0 8px ${col}`:"none"}}>
                      <span className="text-white text-sm font-bold leading-none">{s.done?"✓":s.skipped?"—":`D${SIR_INTERVALS[i]}`}</span>
                    </div>
                    <div className="text-[10px] text-gray-500 mt-1">{(s.done&&s.finishDate?s.finishDate:s.date).slice(5)}</div>
                  </div>
                  {i<sessions.length-1&&(
                    <div className="h-0.5 w-2 shrink-0" style={{backgroundColor:s.done?STAGE_COLORS_SIR[i]:"#1f2937"}}/>
                  )}
                </React.Fragment>
              );
            })}
          </div>
          <div className="flex items-center justify-between text-[10px] text-gray-600">
            <span>{doneCount >= 5 ? 'FIN' : `SIR T${doneCount+1}`} ({doneCount}/5)</span>
            {onRevert&&<button onClick={onRevert} className="text-red-600 hover:text-red-400">revert stage</button>}
          </div>
          {doneCount===5&&<div className="text-xs text-emerald-400 font-bold tracking-widest text-center">ALL DONE → FINISHED</div>}
        </div>
      );
    }

    function KS02Wheel({mms,onSelectStage,selectedStage}) {
      const CX=200,CY=200,R_OUTER=175,R_INNER=55,arc=(2*Math.PI)/STAGE_KEYS.length;
      const counts=useMemo(()=>{const c={};STAGE_KEYS.forEach(s=>{c[s]=mms.filter(m=>m.ksStage===s).length;});return c;},[mms]);
      function segPath(i){
        const a0=-Math.PI/2+i*arc,a1=a0+arc-0.04;
        return `M${CX+R_OUTER*Math.cos(a0)},${CY+R_OUTER*Math.sin(a0)} A${R_OUTER},${R_OUTER} 0 0,1 ${CX+R_OUTER*Math.cos(a1)},${CY+R_OUTER*Math.sin(a1)} L${CX+R_INNER*Math.cos(a1)},${CY+R_INNER*Math.sin(a1)} A${R_INNER},${R_INNER} 0 0,0 ${CX+R_INNER*Math.cos(a0)},${CY+R_INNER*Math.sin(a0)} Z`;
      }
      function lp(i){const a=-Math.PI/2+i*arc+arc/2,r=(R_OUTER+R_INNER)/2;return{x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};}
      return (
        <div className="flex flex-col items-center py-4">
          <svg width={400} height={400} className="max-w-full">
            <circle cx={CX} cy={CY} r={R_OUTER+10} fill="none" stroke="#059669" strokeWidth="1" strokeOpacity="0.15" strokeDasharray="4,4"/>
            {STAGE_KEYS.map((s,i)=>{

    function MultiverseCanvas({mms,mgChanges,manualPos,setManualPos,onOpen,mmColor,onFillMM,onDuplicate,focusId}) {
      const svgRef=useRef(null);
      const dragNode=useRef(null);
      const dragOffset=useRef({x:0,y:0});
      const didDrag=useRef(false);
      const vtRef=useRef({x:0,y:0,scale:1});
      const panRef=useRef({active:false,startX:0,startY:0,startVtX:0,startVtY:0});
      const pinchRef=useRef({active:false,startDist:0,startScale:1,startVtX:0,startVtY:0,cx:0,cy:0});
      const nodePosRef=useRef({});
      const onOpenRef=useRef(onOpen);
      onOpenRef.current=onOpen;
      const [vt,setVt_]=useState({x:0,y:0,scale:1});
      const [fillState,setFillState]=useState("off"); // "off" | "picking" | "on"
      const [fillColor,setFillColor]=useState(null);
      const fillStateRef=useRef("off");
      const clickTimerRef=useRef(null);
      const clickCountRef=useRef(0);
      const [ctxMenu,setCtxMenu]=useState(null);
      function setVt(next){const val=typeof next==="function"?next(vtRef.current):next;vtRef.current=val;setVt_(val);}
      useEffect(()=>{fillStateRef.current=fillState;},[fillState]);
      useEffect(()=>{if(!ctxMenu)return;function dismiss(){setCtxMenu(null);}document.addEventListener("click",dismiss);return()=>document.removeEventListener("click",dismiss);},[!!ctxMenu]);
      useEffect(()=>{
        if(svgRef.current)svgRef.current.style.cursor=fillState==="on"?"crosshair":"grab";
      },[fillState]);
      const autoPos=useMemo(()=>computeLayerLayout(mms),[mms]);
      const nodePos=useMemo(()=>({...autoPos,...manualPos}),[autoPos,manualPos]);
      nodePosRef.current=nodePos;
      useEffect(()=>{
        if(!focusId)return;
        const pos=({...autoPos,...manualPos})[focusId];if(!pos)return;
        const svg=svgRef.current;if(!svg)return;
        requestAnimationFrame(()=>{
          const rect=svg.getBoundingClientRect();if(!rect.width)return;
          setVt({x:rect.width/2-pos.x,y:rect.height/2-pos.y,scale:1});
        });
      },[focusId]);
      const edges=useMemo(()=>{
        const seen=new Set(),res=[];
        mms.forEach(m=>(m.parentIds||[]).forEach(pid=>{const k=[pid,m.id].join("-");if (!seen.has(k)){seen.add(k);res.push([pid,m.id]);}}));
        return res;
      },[mms]);
      useEffect(()=>{
        const svg=svgRef.current;if (!svg) return;
        function onWheel(e){
          e.preventDefault();
          const rect=svg.getBoundingClientRect();
          const mx=e.clientX-rect.left,my=e.clientY-rect.top;
          const v=vtRef.current,factor=e.deltaY<0?1.12:0.89;
          const ns=Math.min(Math.max(v.scale*factor,0.12),4);
          setVt({scale:ns,x:mx-(mx-v.x)*(ns/v.scale),y:my-(my-v.y)*(ns/v.scale)});
        }
        svg.addEventListener("wheel",onWheel,{passive:false});
        return()=>svg.removeEventListener("wheel",onWheel);
      },[]);
      useEffect(()=>{
        function onMove(e){
          const rect=svgRef.current?.getBoundingClientRect();if (!rect) return;
          if (dragNode.current){
            didDrag.current=true;
            const v=vtRef.current,cx=(e.clientX-rect.left-v.x)/v.scale,cy=(e.clientY-rect.top-v.y)/v.scale;
            setManualPos(p=>({...p,[dragNode.current]:{x:cx-dragOffset.current.x,y:cy-dragOffset.current.y}}));
          } else if (panRef.current.active){
            setVt({...vtRef.current,x:panRef.current.startVtX+(e.clientX-panRef.current.startX),y:panRef.current.startVtY+(e.clientY-panRef.current.startY)});
          }
        }
        function onUp(){
          dragNode.current=null;
          if (panRef.current.active){panRef.current.active=false;if(svgRef.current)svgRef.current.style.cursor=fillStateRef.current==="on"?"crosshair":"grab";}
        }
        function onTouchStart(e){
          const svg=svgRef.current;if(!svg||!svg.contains(e.target))return;
          if(e.touches.length===2){
            const t=e.touches,rect=svg.getBoundingClientRect();
            dragNode.current=null;panRef.current.active=false;
            const cx=(t[0].clientX+t[1].clientX)/2-rect.left,cy=(t[0].clientY+t[1].clientY)/2-rect.top;
            const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
            const v=vtRef.current;
            pinchRef.current={active:true,startDist:Math.sqrt(dx*dx+dy*dy),startScale:v.scale,startVtX:v.x,startVtY:v.y,cx,cy};
            e.preventDefault();return;
          }
          if(e.touches.length===1){
            const t=e.touches[0],rect=svg.getBoundingClientRect();
            const nodeG=t.target&&t.target.closest?t.target.closest('[data-mmid]'):null;
            if(nodeG){
              const id=nodeG.dataset.mmid,cur=nodePosRef.current[id]||{x:200,y:200},v=vtRef.current;
              dragOffset.current={x:(t.clientX-rect.left-v.x)/v.scale-cur.x,y:(t.clientY-rect.top-v.y)/v.scale-cur.y};
              dragNode.current=id;didDrag.current=false;
            }else{
              panRef.current={active:true,startX:t.clientX,startY:t.clientY,startVtX:vtRef.current.x,startVtY:vtRef.current.y};
            }
            e.preventDefault();
          }
        }
        function onTouchMove(e){
          if(!dragNode.current&&!panRef.current.active&&!pinchRef.current.active)return;
          const rect=svgRef.current?.getBoundingClientRect();if(!rect)return;
          if(e.touches.length===2&&pinchRef.current.active){
            const t=e.touches,dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
            const dist=Math.sqrt(dx*dx+dy*dy),{startDist,startScale,startVtX,startVtY,cx,cy}=pinchRef.current;
            const ns=Math.min(Math.max(startScale*(dist/startDist),0.12),4),ratio=ns/startScale;
            setVt({scale:ns,x:cx-(cx-startVtX)*ratio,y:cy-(cy-startVtY)*ratio});
            e.preventDefault();return;
          }
          if(e.touches.length>=1){
            const t=e.touches[0];
            if(dragNode.current){
              didDrag.current=true;
              const v=vtRef.current,cx=(t.clientX-rect.left-v.x)/v.scale,cy=(t.clientY-rect.top-v.y)/v.scale;
              setManualPos(p=>({...p,[dragNode.current]:{x:cx-dragOffset.current.x,y:cy-dragOffset.current.y}}));
            }else if(panRef.current.active){
              setVt({...vtRef.current,x:panRef.current.startVtX+(t.clientX-panRef.current.startX),y:panRef.current.startVtY+(t.clientY-panRef.current.startY)});
            }
            e.preventDefault();
          }
        }
        function onTouchEnd(){
          if(!didDrag.current&&dragNode.current){onOpenRef.current(dragNode.current);}
          pinchRef.current.active=false;
          dragNode.current=null;
          if(panRef.current.active){panRef.current.active=false;if(svgRef.current)svgRef.current.style.cursor=fillStateRef.current==="on"?"crosshair":"grab";}
          didDrag.current=false;
        }
        window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
        window.addEventListener("touchstart",onTouchStart,{passive:false});
        window.addEventListener("touchmove",onTouchMove,{passive:false});
        window.addEventListener("touchend",onTouchEnd);
        return()=>{
          window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);

      function onMouseUp(e,id){
        e.stopPropagation();

          if (fillState==="on"&&fillColor){onFillMM(id,fillColor);}

                return <line key={`${pid}-${cid}`} x1={a.x} y1={a.y} x2={b.x-dx/len*r} y2={b.y-dy/len*r} stroke="#374151" strokeWidth="1.5" markerEnd="url(#arr)"/>;
              })}

                    {hasMG&&<circle r={r+7} fill="none" stroke={col} strokeWidth="1" strokeOpacity="0.25"/>}

            const descendantSCLinks=isLeaf?[]:descendants.flatMap(desc=>
              (sourceDumps||[]).flatMap(d=>(d.mmLinks||[]).filter(l=>l.mmId===desc.id).map(l=>({dump:d,link:l,sourceMM:desc,isInherited:false})))

                    <button onClick={()=>setShowSCLinkForm(null)} className="bg-gray-700 text-gray-300 px-2 py-1 rounded text-xs">cancel</button>
                  </div>
                ):(
                  <button onClick={()=>{setShowSCLinkForm({dumpId:dump.id,linkId:link.id});setScLinkDraft({label:"",url:""}); }} className="text-xs text-gray-500 hover:text-gray-300 mt-1">+ add link</button>
                )}
              </>
            );

              const tbs=getSCTextBlocks(link);

                <>
	                  {tbs.map(tb=>(
	                    <div key={tb.id} className="bg-gray-800 rounded p-2 mb-1">

    function DescendantSCNode({ descendantMM, depth, scLinks, mmColor, onGoToSourceDump, renderTextBlocksSection, renderURLLinksOnly, sourceDumps }) {
      const [open, setOpen] = React.useState(true);
      if (!scLinks.length) return null;
      return (
        <div className="relative">
          <div style={{ paddingLeft: depth * 16 }}
            className="flex items-center gap-2 py-1.5 px-2 rounded hover:bg-gray-800 cursor-pointer"
            onClick={() => setOpen(o => !o)}>
            <div className="w-2 h-2 rounded-full shrink-0"
              style={{ backgroundColor: descendantMM.type === "1" ? "#ef4444" : mmColor(descendantMM.id) }}/>
            <span className="text-sm font-bold text-gray-200">{descendantMM.name}</span>
            <span className="text-xs text-gray-500 ml-1">{open ? "▼" : "▶"} {scLinks.length}</span>
          </div>
          {open && (
            <>
              {depth > 0 && <div style={{ position:"absolute", left: depth*16+12, top:13, bottom:4, width:1, backgroundColor:"#374151", pointerEvents:"none" }}/>}
              <div style={{ paddingLeft: depth * 16 + 12 }}>
                {(()=>{
                  const dumpOrder=[];const byDump={};
                  scLinks.forEach(({dump,link})=>{if(!byDump[dump.id]){dumpOrder.push(dump.id);byDump[dump.id]={dump,links:[]};}byDump[dump.id].links.push(link);});
                  return dumpOrder.map(dId=>{
                    const {dump,links}=byDump[dId];
                    return (
                      <div key={dId} className="bg-gray-900 border border-gray-800 rounded mb-2 p-3">
                        <div className="text-xs text-indigo-400 font-bold mb-3 tracking-widest cursor-pointer hover:text-indigo-200 underline decoration-dotted"
                          onClick={()=>onGoToSourceDump&&onGoToSourceDump(dump.id)}>{(sourceDumps||[]).find(d=>d.id===dump.parentId)?.title||dump.title}</div>
                        {links.map(link=>(
                          <div key={link.id} className="mb-3 last:mb-0">
                            {renderTextBlocksSection?renderTextBlocksSection(dump,link):null}
                            {renderURLLinksOnly?<div className="mt-2">{renderURLLinksOnly(dump,link)}</div>:null}
                          </div>
                        ))}
                      </div>
                    );
                  });
                })()}
              </div>
            </>
          )}
        </div>
      );
    }

    function SrchMMNode({node, depth, mmColor, onOpen, onArrange, focusId, onClearFocus}) {
      const {mm, children} = node;
      const [open, setOpen] = React.useState(true);
      const [hov, setHov] = React.useState(false);
      const [arrangeDragOver, setArrangeDragOver] = React.useState(null);
      const nodeRef = React.useRef(null);
      const isFocused = mm.id === focusId;
      React.useEffect(()=>{
        if(isFocused&&nodeRef.current){
          nodeRef.current.scrollIntoView({behavior:'smooth',block:'center'});
          const t=setTimeout(()=>{if(onClearFocus)onClearFocus();},1500);
          return()=>clearTimeout(t);
        }
      },[isFocused]);
      return (
        <div className="relative">
          <div ref={isFocused?nodeRef:null} style={{paddingLeft: depth * 16}}
            className={`flex items-center gap-2 py-1.5 px-2 rounded hover:bg-gray-800 cursor-pointer${isFocused?" bg-indigo-900/40 outline outline-1 outline-indigo-700/50":""} ${arrangeDragOver==='before'?'border-t-2 border-green-500':arrangeDragOver==='after'?'border-b-2 border-green-500':''}`}
            onClick={() => onOpen(mm.id)}
            onMouseEnter={() => setHov(true)}
            onMouseLeave={() => setHov(false)}
            onDragOver={e => {
              if (e.dataTransfer.types.includes('application/srch-arrange-id')) {
                e.preventDefault(); e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                setArrangeDragOver(e.clientY < rect.top + rect.height / 2 ? 'before' : 'after');
              }
            }}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setArrangeDragOver(null); }}
            onDrop={e => {
              const draggedId = Number(e.dataTransfer.getData('application/srch-arrange-id'));
              if (draggedId && draggedId !== mm.id) {
                e.preventDefault(); e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                onArrange(draggedId, mm.id, e.clientY < rect.top + rect.height / 2);
              }
              setArrangeDragOver(null);
            }}>
            <div className="w-2 h-2 rounded-full shrink-0"
              style={{backgroundColor: mm.type==="1" ? "#ef4444" : mmColor(mm.id)}}/>
            <span className="text-sm">{mm.name}</span>
            {mm.unclear&&<span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-red-900 text-red-400 ml-1">UNCLEAR</span>}
            <span className="text-xs text-gray-600">T{mm.type}</span>
            {children.length > 0 && (
              <span
                className="text-xs text-gray-500 ml-1 cursor-pointer hover:text-white"
                onClick={e => { e.stopPropagation(); setOpen(o => !o); }}>
                {open ? "▼" : "▶"} {children.length}
              </span>
            )}
            {hov && (
              <span
                draggable
                onDragStart={e => {
                  e.dataTransfer.setData('application/srch-arrange-id', String(mm.id));
                  e.dataTransfer.effectAllowed = 'move';
                  e.stopPropagation();
                }}
                onClick={e => e.stopPropagation()}
                title="Drag to arrange among siblings"
                className="text-gray-600 hover:text-green-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60 cursor-grab select-none ml-auto">⇅</span>
            )}
          </div>
          {open && children.length > 0 && (
            <>
              <div style={{
                position: "absolute",
                left: depth * 16 + 12,
                top: 13,
                bottom: 4,
                width: 1,
                backgroundColor: "#374151",
                pointerEvents: "none"
              }}/>
              {children.map((child, i) => (
                <SrchMMNode key={`${child.mm.id}-${depth}-${i}`} node={child} depth={depth+1} mmColor={mmColor} onOpen={onOpen} onArrange={onArrange} focusId={focusId} onClearFocus={onClearFocus}/>
              ))}
            </>
          )}
        </div>
      );
    }

    function SrchView({mms, mmColor, onOpen, onArrange, focusId, onClearFocus}) {
      const [q, setQ] = useState("");
      React.useEffect(()=>{ if(focusId) setQ(""); },[focusId]);

      function buildTree() {
        const byId = Object.fromEntries(mms.map(m => [m.id, m]));
        const roots = mms.filter(m => !(m.parentIds||[]).some(pid => byId[pid]));
        function node(mm, seen) {
          if (seen.has(mm.id)) return {mm, children: []};
          const s2 = new Set(seen); s2.add(mm.id);
          const kids = mms.filter(m => (m.parentIds||[]).includes(mm.id));
          return {mm, children: kids.map(k => node(k, s2))};
        }
        return roots.map(mm => node(mm, new Set()));
      }

      function filterTree(nodes, lq) {
        return nodes.reduce((acc, n) => {
          const fc = filterTree(n.children, lq);
          if (!lq || n.mm.name.toLowerCase().includes(lq) || fc.length > 0)
            acc.push({...n, children: fc});
          return acc;
        }, []);
      }

      const tree = filterTree(buildTree(), q.toLowerCase());

      return (
        <div className="p-4 max-w-2xl mx-auto">
          <div className="text-xs text-gray-500 mb-3 tracking-widest">SRCH — NESTED BY PARENT / CHILD</div>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Filter MMs..."
            className="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 mb-3 text-white placeholder-gray-600 text-xs focus:outline-none focus:border-indigo-500"/>
          {!mms.length ? (
            <div className="text-gray-600 text-xs text-center py-8">No MMs yet.</div>
          ) : tree.length === 0 ? (
            <div className="text-gray-600 text-xs text-center py-4">No matches.</div>
          ) : (
            <div className="rounded border border-gray-800 bg-gray-900/30 px-2 py-1">
              {tree.map((n, i) => (
                <SrchMMNode key={`${n.mm.id}-${i}`} node={n} depth={0} mmColor={mmColor} onOpen={onOpen} onArrange={onArrange} focusId={focusId} onClearFocus={onClearFocus}/>
              ))}
            </div>
          )}
        </div>
      );
    }

    const STAGE_SEQUENCE=[null,"1","2","3","4","sir","finished"];
    function stageLabel(s){if(!s)return"Unassigned";if(s==="sir")return"SIR";if(s==="finished")return"FINISHED";return`S${s}`;}
    function changeLabel(change){
      const{type,oldValue,newValue,sessionId}=change;
      if(type==="stageAdvance")return`${stageLabel(oldValue)} → ${stageLabel(newValue)}`;
      if(type==="stageClear")return`${stageLabel(oldValue)} → Unassigned`;
      if(type==="stageRevert")return`${stageLabel(oldValue)} → ${stageLabel(newValue)} (revert)`;
      if(type==="stageFinish")return`SIR → FINISHED`;
      if(type==="sirDone")return`T${change.repIndex!=null?change.repIndex+1:"?"} session done`;
      if(type==="sirSkip")return`T${change.repIndex!=null?change.repIndex+1:"?"} session skipped`;
      if(type==="sirPostpone")return`T${change.repIndex!=null?change.repIndex+1:"?"} session postponed → ${newValue}`;
      return type;
    }

    function LinModal({mms,sessions,sirSessionsMap,mmColor,linModal,setLinModal,linDayTitles,onSave}){
      const[mmSearch,setMmSearch]=useState("");
      const[postponeDate,setPostponeDate]=useState(today());
      const nonAnchorMMs=mms.filter(m=>m.type!=="anchor");
      const filtered=nonAnchorMMs.filter(m=>m.name.toLowerCase().includes(mmSearch.toLowerCase()));

      const selectedMMIds=linModal.selectedMMIds||[];
      const currentMMIdx=linModal.currentMMIdx||0;
      const pendingItems=linModal.pendingItems||[];
      const currentMMId=selectedMMIds[currentMMIdx];
      const currentMM=currentMMId?mms.find(m=>m.id===currentMMId):null;
      const mySessions=currentMMId?(sirSessionsMap[currentMMId]||[]):[];
      const pendingSessions=mySessions.filter(s=>!s.done&&!s.skipped);
      const allRepsDone=mySessions.length===5&&mySessions.every(s=>s.done||s.skipped);

      function toggleMM(id){
        setLinModal(p=>{
          const ids=p.selectedMMIds||[];
          return {...p,selectedMMIds:ids.includes(id)?ids.filter(x=>x!==id):[...ids,id]};
        });
      }
      function goToStep2(){setLinModal(p=>({...p,step:2,currentMMIdx:0,pendingItems:[]}));}
      function pickChange(change){
        if(change.type==="sirPostpone"){
          setPostponeDate(addDays(today(),1));
          setLinModal(p=>({...p,change,step:"2b"}));
        } else {
          const newPending=[...pendingItems,{mmId:currentMMId,change}];
          const nextIdx=currentMMIdx+1;
          if(nextIdx<selectedMMIds.length){
            setLinModal(p=>({...p,pendingItems:newPending,currentMMIdx:nextIdx,change:null}));
          } else {
            setLinModal(p=>({...p,pendingItems:newPending,step:3,title:(linDayTitles||{})[today()]||"",change:null}));
          }
        }
      }
      function confirmPostpone(){
        if(!postponeDate||postponeDate<=today()){alert("rep date is not possible.");return;}
        const c={...linModal.change,newValue:postponeDate};
        const newPending=[...pendingItems,{mmId:currentMMId,change:c}];
        const nextIdx=currentMMIdx+1;
        if(nextIdx<selectedMMIds.length){
          setLinModal(p=>({...p,pendingItems:newPending,currentMMIdx:nextIdx,change:null,step:2}));
        } else {
          setLinModal(p=>({...p,pendingItems:newPending,step:3,title:(linDayTitles||{})[today()]||"",change:null}));
        }
      }

      const curStage=currentMM?.ksStage!=null?String(currentMM.ksStage):null;
      function stageOptions(){
        if(curStage===null) return [{label:"Assign to Stage 1",change:{type:"stageAdvance",oldValue:null,newValue:"1"}}];
        if(curStage==="1") return [
          {label:"Advance → S2",change:{type:"stageAdvance",oldValue:"1",newValue:"2"}},
          {label:"Clear (unassign)",change:{type:"stageClear",oldValue:"1",newValue:null}},
        ];
        if(curStage==="2") return [
          {label:"Advance → S3",change:{type:"stageAdvance",oldValue:"2",newValue:"3"}},
          {label:"Revert → S1",change:{type:"stageRevert",oldValue:"2",newValue:"1"}},
        ];
        if(curStage==="3") return [
          {label:"Advance → S4",change:{type:"stageAdvance",oldValue:"3",newValue:"4"}},
          {label:"Revert → S2",change:{type:"stageRevert",oldValue:"3",newValue:"2"}},
          {label:"Revert → S1",change:{type:"stageRevert",oldValue:"3",newValue:"1"}},
        ];
        if(curStage==="4") return [
          {label:"Advance → SIR",change:{type:"stageAdvance",oldValue:"4",newValue:"sir"}},
          {label:"Revert → S3",change:{type:"stageRevert",oldValue:"4",newValue:"3"}},
          {label:"Revert → S2",change:{type:"stageRevert",oldValue:"4",newValue:"2"}},
          {label:"Revert → S1",change:{type:"stageRevert",oldValue:"4",newValue:"1"}},
        ];
        if(curStage==="sir"){
          const opts=[];
          if(allRepsDone) opts.push({label:"Mark as FINISHED",change:{type:"stageFinish",oldValue:"sir",newValue:"finished"}});
          const currentRep=pendingSessions[0];
          if(currentRep){
            opts.push(
              {label:`Complete T${currentRep.repIndex+1} session (D${SIR_INTERVALS[currentRep.repIndex]})`,change:{type:"sirDone",oldValue:currentRep.date,newValue:"done",sessionId:currentRep.id,repIndex:currentRep.repIndex}},
              {label:`Postpone T${currentRep.repIndex+1} session`,change:{type:"sirPostpone",oldValue:currentRep.date,newValue:null,sessionId:currentRep.id,repIndex:currentRep.repIndex}},
            );
          }
          mySessions.filter(s=>s.done||s.skipped).forEach(s=>{
            opts.push({label:`Revert → SIR T${s.repIndex+1}`,change:{type:"sirRevert",oldValue:"sir",newValue:"sir",repIndex:s.repIndex}});
          });
          opts.push({label:"Revert → S4",change:{type:"stageRevert",oldValue:"sir",newValue:"4"}});
          opts.push({label:"Revert → S3",change:{type:"stageRevert",oldValue:"sir",newValue:"3"}});
          opts.push({label:"Revert → S2",change:{type:"stageRevert",oldValue:"sir",newValue:"2"}});
          opts.push({label:"Revert → S1",change:{type:"stageRevert",oldValue:"sir",newValue:"1"}});
          return opts;
        }
        if(curStage==="finished") return [
          {label:"Revert → SIR T1",change:{type:"sirRevert",oldValue:"finished",newValue:"sir",repIndex:0}},
          {label:"Revert → SIR T2",change:{type:"sirRevert",oldValue:"finished",newValue:"sir",repIndex:1}},
          {label:"Revert → SIR T3",change:{type:"sirRevert",oldValue:"finished",newValue:"sir",repIndex:2}},
          {label:"Revert → SIR T4",change:{type:"sirRevert",oldValue:"finished",newValue:"sir",repIndex:3}},
          {label:"Revert → SIR T5",change:{type:"sirRevert",oldValue:"finished",newValue:"sir",repIndex:4}},
          {label:"Revert → S4",change:{type:"stageRevert",oldValue:"finished",newValue:"4"}},
          {label:"Revert → S3",change:{type:"stageRevert",oldValue:"finished",newValue:"3"}},
          {label:"Revert → S2",change:{type:"stageRevert",oldValue:"finished",newValue:"2"}},
          {label:"Revert → S1",change:{type:"stageRevert",oldValue:"finished",newValue:"1"}},
        ];
        return [];
      }

      const step=linModal.step;
      const title=linModal.title||"";

      return (
        <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50 p-4 overflow-y-auto">
          <div className="bg-gray-900 border border-green-800 rounded-lg p-5 w-full max-w-sm my-4">
            <div className="flex items-center justify-between mb-1">
              <div className="font-bold tracking-widest text-xs text-green-400">+LIN — LINEAR PROGRESS</div>
              <div className="text-xs text-gray-500">
                {step==="2b"?"Step 2/3":step===2?`Step 2/3 — MM ${currentMMIdx+1}/${selectedMMIds.length}`:`Step ${step}/3`}
              </div>
            </div>
            <div className="flex gap-1 mb-4">{[1,2,3].map(i=>{const active=step==="2b"?i<=2:step>=i;return <div key={i} className={`flex-1 h-1 rounded ${active?"bg-green-500":"bg-gray-700"}`}/>; })}</div>

            {step===1&&(
              <div>
                <div className="text-xs font-bold text-gray-300 mb-3">STEP 1 — CHOOSE MMs</div>
                <input value={mmSearch} onChange={e=>setMmSearch(e.target.value)} placeholder="Search MMs..."
                  className="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 mb-2 text-white placeholder-gray-600 text-xs outline-none focus:border-gray-500"/>
                <div className="max-h-56 overflow-y-auto space-y-1">
                  {!filtered.length&&<div className="text-gray-600 text-xs text-center py-4">No MMs found.</div>}
                  {filtered.map(m=>{
                    const sel=selectedMMIds.includes(m.id);
                    return (
                      <button key={m.id} onClick={()=>toggleMM(m.id)}
                        className={`w-full flex items-center gap-2 text-left px-3 py-2 rounded text-xs ${sel?"bg-indigo-800 text-white border border-indigo-600":"bg-gray-800 hover:bg-gray-700 text-gray-300"}`}>
                        <div className={`w-3.5 h-3.5 rounded border shrink-0 flex items-center justify-center ${sel?"bg-indigo-500 border-indigo-400":"border-gray-600"}`}>
                          {sel&&<span className="text-white text-xs leading-none">✓</span>}
                        </div>
                        <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:m.type==="1"?"#ef4444":mmColor(m.id)}}/>
                        <span className="flex-1 font-medium">{m.name}</span>
                        {m.ksStage&&<span className={`px-1.5 py-0.5 rounded text-xs ${STAGE_COLORS[m.ksStage]||"bg-gray-700 text-gray-300"}`}>{stageLabel(m.ksStage)}</span>}
                        {!m.ksStage&&<span className="text-gray-600 text-xs">unassigned</span>}
                      </button>
                    );
                  })}
                </div>
                {selectedMMIds.length>0&&<div className="text-xs text-green-500 mt-2">{selectedMMIds.length} MM{selectedMMIds.length>1?"s":""} selected</div>}
              </div>
            )}

            {step===2&&currentMM&&(
              <div>
                <div className="text-xs font-bold text-gray-300 mb-1">STEP 2 — CHOOSE CHANGE</div>
                <div className="flex items-center gap-2 mb-3 px-2 py-1.5 bg-gray-800 rounded">
                  <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:currentMM.type==="1"?"#ef4444":mmColor(currentMM.id)}}/>
                  <span className="text-xs font-bold">{currentMM.name}</span>
                  <span className="text-xs text-gray-500 ml-auto">{stageLabel(curStage)}</span>
                </div>
                <div className="space-y-1">
                  {stageOptions().map((opt,i)=>(
                    <button key={i} onClick={()=>pickChange(opt.change)}
                      className={`w-full text-left px-3 py-2 rounded text-xs font-medium ${opt.change.type==="stageRevert"||opt.change.type==="stageClear"||opt.change.type==="sirRevert"?"bg-red-950 hover:bg-red-900 text-red-300 border border-red-900":"bg-gray-800 hover:bg-gray-700 text-gray-200"}`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {step==="2b"&&linModal.change&&(
              <div>
                <div className="text-xs font-bold text-gray-300 mb-3">POSTPONE — PICK NEW DATE</div>
                <div className="text-xs text-gray-400 mb-2">Today: <span className="text-white">{today()}</span></div>
                <input type="date" value={postponeDate} min={addDays(today(),1)} onChange={e=>setPostponeDate(e.target.value)}
                  className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white text-xs mb-3"/>
                <button onClick={confirmPostpone} className="w-full bg-green-700 hover:bg-green-600 text-white py-2 rounded text-xs font-bold">CONFIRM DATE →</button>
              </div>
            )}

            {step===3&&(
              <div>
                <div className="text-xs font-bold text-gray-300 mb-1">STEP 3 — SESSION TITLE</div>
                <div className="space-y-1 mb-3 max-h-32 overflow-y-auto">
                  {pendingItems.map((item,i)=>{
                    const mm=mms.find(m=>m.id===item.mmId);
                    return (
                      <div key={i} className="text-xs px-2 py-1.5 bg-gray-800 rounded flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:mm?.type==="1"?"#ef4444":mmColor(item.mmId)}}/>
                        <span className="font-medium text-gray-300 flex-1">{mm?.name||"?"}</span>
                        <span className="text-gray-500">{changeLabel(item.change)}</span>
                      </div>
                    );
                  })}
                </div>
                <input value={title} onChange={e=>setLinModal(p=>({...p,title:e.target.value}))}
                  placeholder={today()}
                  className="w-full bg-gray-800 border border-green-700 rounded px-3 py-2 text-white placeholder-gray-600 text-xs mb-1 outline-none focus:border-green-500"/>
                <div className="text-xs text-gray-600 mb-3">Leave blank to use today's date as title.</div>
                <button onClick={()=>onSave(pendingItems,title||today())}
                  className="w-full bg-green-700 hover:bg-green-600 text-white py-2 rounded text-xs font-bold">SAVE</button>
              </div>
            )}

            <div className="flex gap-2 mt-4">
              {step===1&&<button onClick={()=>setLinModal(null)} className="flex-1 bg-gray-800 text-gray-400 py-1.5 rounded text-xs">✕ Cancel</button>}
              {step===2&&currentMMIdx===0&&<button onClick={()=>setLinModal(p=>({...p,step:1,pendingItems:[],change:null}))} className="flex-1 bg-gray-800 text-gray-400 py-1.5 rounded text-xs">← back</button>}
              {step===2&&currentMMIdx>0&&<button onClick={()=>setLinModal(p=>({...p,currentMMIdx:p.currentMMIdx-1,pendingItems:p.pendingItems.slice(0,-1),change:null}))} className="flex-1 bg-gray-800 text-gray-400 py-1.5 rounded text-xs">← back</button>}
              {step==="2b"&&<button onClick={()=>setLinModal(p=>({...p,step:2,change:null}))} className="flex-1 bg-gray-800 text-gray-400 py-1.5 rounded text-xs">← back</button>}
              {step===3&&<button onClick={()=>setLinModal(p=>({...p,step:2,currentMMIdx:p.selectedMMIds.length-1,pendingItems:p.pendingItems.slice(0,-1),change:null}))} className="flex-1 bg-gray-800 text-gray-400 py-1.5 rounded text-xs">← back</button>}
              {step===1&&<button onClick={goToStep2} disabled={selectedMMIds.length===0} className={`flex-1 py-1.5 rounded text-xs font-bold ${selectedMMIds.length===0?"bg-gray-700 text-gray-600 cursor-not-allowed":"bg-green-700 hover:bg-green-600 text-white"}`}>NEXT →</button>}
              {(step===2||step==="2b"||step===3)&&<button onClick={()=>setLinModal(null)} className="bg-gray-800 text-gray-500 px-3 py-1.5 rounded text-xs">✕</button>}
            </div>
          </div>
        </div>
      );
    }

    function TransferPicker({mms,mmColor,currentMmId,search,setSearch,onSelect,onCancel}){
      const options=mms.filter(m=>(isLeafMM(m.id,mms)||m.sourceDumpActivated===true)&&m.id!==currentMmId&&m.name.toLowerCase().includes(search.toLowerCase()));
      return (
        <div className="mt-1 bg-gray-800 border border-indigo-800 rounded p-2 mb-2">
          <div className="text-xs text-gray-500 mb-1">Transfer to MM:</div>
          <input autoFocus value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search MMs..."
            className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs outline-none mb-1"/>
          <div className="max-h-32 overflow-y-auto">
            {options.length===0&&<div className="text-gray-600 text-xs text-center py-2">No MMs found.</div>}
            {options.map(m=>(
              <div key={m.id} onClick={()=>onSelect(m.id)}
                className="flex items-center gap-2 px-2 py-1 rounded mb-0.5 cursor-pointer hover:bg-gray-700">
                <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:m.type==="anchor"?"#6b7280":m.type==="1"?"#ef4444":mmColor(m.id)}}/>
                <span className="text-xs text-gray-200">{m.name}</span>
                <span className="text-xs text-gray-600 ml-auto">{m.type==="anchor"?"Anchor":`T${m.type}`}</span>
              </div>
            ))}
          </div>
          <button onClick={onCancel} className="text-xs text-gray-500 hover:text-gray-300 mt-1">cancel</button>
        </div>
      );
    }

    function SourceDumpView({sourceDumps,mms,mmColor,dumpPath,setDumpPath,onAddEntry,onDeleteEntry,onRename,onAddMMLink,onRemoveMMLink,onAddURLLink,onRemoveURLLink,onAddTextBlock,onRemoveTextBlock,onTransferTextBlock,onTransferURLLink,onOpenMMSC}) {

	      const [hoveredBadgeId,setHoveredBadgeId]=useState(null);

	      function handleCreate(){

	      const requestConfirmDelete=(title,message,onConfirm)=>setConfirmDelete({title,message,onConfirm});

	        <div className="overflow-y-auto flex-1 p-4 max-w-2xl mx-auto w-full">

          {/* Create title form */}

            <div className="flex gap-2 mb-4">
              <input autoFocus value={createTitle} onChange={e=>setCreateTitle(e.target.value)}

              {currentEntry.mmLinks.map(link=>{
                const mm=mms.find(m=>m.id===link.mmId);
                const isPickingLink=showLinkFormFor&&showLinkFormFor.dumpId===currentEntry.id&&showLinkFormFor.linkId===link.id;
                const isAddingText=showTextBlockForm&&showTextBlockForm.dumpId===currentEntry.id&&showTextBlockForm.linkId===link.id;
                const tbs=getSCTextBlocks(link);
                return (
                  <div key={link.id} className="bg-gray-900 border border-gray-800 rounded mb-3 p-3">

                      <div className="flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:mm?(mm.type==="anchor"?"#6b7280":mm.type==="1"?"#ef4444":mmColor(mm.id)):"#6b7280"}}/>

                        <span className="text-xs text-gray-600">{mm?.type==="anchor"?"Anchor":mm?`T${mm.type}`:""}</span>
                      </div>
	                      <button onClick={()=>requestConfirmDelete(

	                        `Remove "${mm?.name||"this MM"}" and its S&C data from this source dump?`,

	                      )} className="text-xs text-red-800 hover:text-red-500">remove</button>
                    </div>
	                    {tbs.map(tb=>(
	                      <div key={tb.id} className="bg-gray-800 rounded p-2 mb-1 select-text">
	                        <div className="flex items-start gap-2 mb-0.5">

	                              <button onClick={()=>requestConfirmDelete(
	                                "Remove text block?",

	                        </div>
	                        <div className="text-xs text-gray-300 whitespace-pre-wrap">{tb.explanation}</div>
	                      </div>
	                    ))}
                    {transferPickerFor?.linkId===link.id&&transferPickerFor?.itemType==="text"&&(
                      <TransferPicker mms={mms} mmColor={mmColor} currentMmId={transferPickerFor.currentMmId} search={transferMmSearch} setSearch={setTransferMmSearch}
                        onSelect={toMmId=>{onTransferTextBlock(currentEntry.id,link.id,transferPickerFor.itemId,toMmId);setTransferPickerFor(null);setTransferMmSearch("");}}
                        onCancel={()=>{setTransferPickerFor(null);setTransferMmSearch("");}}/>
                    )}
                    {isAddingText?(
                      <div className="mt-1 bg-gray-800 border border-indigo-800 rounded p-2 mb-2">
                        <input value={textBlockDraft.title} onChange={e=>setTextBlockDraft(p=>({...p,title:e.target.value}))} placeholder="title (optional)" className="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs outline-none mb-1"/>
                        <textarea value={textBlockDraft.explanation} onChange={e=>setTextBlockDraft(p=>({...p,explanation:e.target.value}))} placeholder="explanation..." rows={3} className="w-full bg-gray-900 border border-gray-700 rounded p-2 text-xs text-gray-100 resize-none outline-none mb-1"/>
                        <div className="flex gap-1">
                          <button onClick={()=>{if(textBlockDraft.explanation.trim()){onAddTextBlock(currentEntry.id,link.id,textBlockDraft);setTextBlockDraft({title:"",explanation:""});setShowTextBlockForm(null);}}} className="bg-indigo-700 hover:bg-indigo-600 text-white px-2 py-1 rounded text-xs">add</button>
                          <button onClick={()=>setShowTextBlockForm(null)} className="bg-gray-700 text-gray-300 px-2 py-1 rounded text-xs">cancel</button>
                        </div>
                      </div>
                    ):(
                      <button onClick={()=>{setShowTextBlockForm({dumpId:currentEntry.id,linkId:link.id});setTextBlockDraft({title:"",explanation:""});}} className="text-xs text-gray-600 hover:text-gray-400 mt-1 mr-3">+ add text</button>
                    )}
	                    {(link.links||[]).map(u=>(
	                      <div key={u.id} className="flex items-center gap-2 bg-gray-800 rounded px-2 py-1 mb-1">
	                        <a href={u.url} target="_blank" rel="noopener noreferrer" className="text-xs text-indigo-300 hover:text-indigo-100 truncate flex-1 min-w-0">{u.label||u.url}</a>
	                        <div className="flex items-center gap-1 shrink-0">
	                          <button onClick={()=>{setTransferPickerFor({dumpId:currentEntry.id,linkId:link.id,itemType:"url",itemId:u.id,currentMmId:link.mmId});setTransferMmSearch("");}} className="text-indigo-600 hover:text-indigo-400 text-xs px-1">-&gt;</button>
	                          <button onClick={()=>requestConfirmDelete(
	                            "Remove citation link?",
	                            `Remove "${u.label||u.url}" from this source dump?`,
	                            ()=>onRemoveURLLink(currentEntry.id,link.id,u.id)
	                          )} className="text-red-700 hover:text-red-400 text-xs px-1">x</button>
	                        </div>
	                      </div>
	                    ))}
                    {transferPickerFor?.linkId===link.id&&transferPickerFor?.itemType==="url"&&(
                      <TransferPicker mms={mms} mmColor={mmColor} currentMmId={transferPickerFor.currentMmId} search={transferMmSearch} setSearch={setTransferMmSearch}
                        onSelect={toMmId=>{onTransferURLLink(currentEntry.id,link.id,transferPickerFor.itemId,toMmId);setTransferPickerFor(null);setTransferMmSearch("");}}
                        onCancel={()=>{setTransferPickerFor(null);setTransferMmSearch("");}}/>
                    )}
                    {isPickingLink?(
                      <div className="flex gap-1 mt-1">
                        <input value={newLinkForm.label} onChange={e=>setNewLinkForm(p=>({...p,label:e.target.value}))} placeholder="label" className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs outline-none"/>
                        <input value={newLinkForm.url} onChange={e=>setNewLinkForm(p=>({...p,url:e.target.value}))} placeholder="url" className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs outline-none"/>
                        <button onClick={()=>{if(newLinkForm.url.trim()){onAddURLLink(currentEntry.id,link.id,newLinkForm);setNewLinkForm({label:"",url:""});setShowLinkFormFor(null);}}} className="bg-indigo-700 hover:bg-indigo-600 text-white px-2 py-1 rounded text-xs">add</button>
                        <button onClick={()=>setShowLinkFormFor(null)} className="bg-gray-700 text-gray-300 px-2 py-1 rounded text-xs">cancel</button>
                      </div>
                    ):(
                      <button onClick={()=>{setShowLinkFormFor({dumpId:currentEntry.id,linkId:link.id});setNewLinkForm({label:"",url:""}); }} className="text-xs text-gray-600 hover:text-gray-400 mt-1">+ citation link</button>
                    )}
                  </div>
                );
              })}
              {/* Add MM button / picker */}
              {mmPickerFor===currentEntry.id?(
                <div className="bg-gray-900 border border-indigo-800 rounded p-3 mb-3">
                  <input autoFocus value={mmSearch} onChange={e=>setMmSearch(e.target.value)} placeholder="Search MMs..."
                    className="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs outline-none mb-2"/>
                  <div className="max-h-48 overflow-y-auto">
                    {filteredMMs.length===0&&<div className="text-gray-600 text-xs text-center py-2">No MMs found.</div>}
                    {filteredMMs.map(m=>{
                      const already=alreadyLinked.includes(m.id);
                      return (
                        <div key={m.id} onClick={()=>{if(!already){onAddMMLink(currentEntry.id,m.id);setMmPickerFor(null);setMmSearch("");}}}
                          className={`flex items-center gap-2 px-2 py-1.5 rounded mb-0.5 ${already?"opacity-40 cursor-not-allowed":"cursor-pointer hover:bg-gray-800"}`}>
                          <div className="w-2 h-2 rounded-full shrink-0" style={{backgroundColor:m.type==="anchor"?"#6b7280":m.type==="1"?"#ef4444":mmColor(m.id)}}/>
                          <span className="text-xs text-gray-200">{m.name}</span>
                          <span className="text-xs text-gray-600 ml-auto">{m.type==="anchor"?"Anchor":`T${m.type}`}</span>
                          {already&&<span className="text-xs text-gray-600">linked</span>}
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={()=>{setMmPickerFor(null);setMmSearch("");}} className="text-xs text-gray-500 hover:text-gray-300 mt-1">cancel</button>
                </div>
              ):(
                <button onClick={()=>{setMmPickerFor(currentEntry.id);setMmSearch("");}} className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded mb-4">+ add MM</button>
              )}

          {/* Children list */}
          <div>
            {!currentChildren.length&&!currentEntry&&<div className="text-gray-600 text-xs text-center py-10">No titles yet. Create one with "+ title".</div>}
            {currentChildren.map(child=>(
              <div key={child.id} className="bg-gray-900 border border-gray-800 hover:border-gray-600 rounded mb-2">
                <div className="flex items-center px-4 py-3 gap-2">
                  {editingTitleId===child.id?(
                    <input autoFocus value={editingTitleVal} onChange={e=>setEditingTitleVal(e.target.value)}
                      onBlur={()=>{onRename(child.id,editingTitleVal);setEditingTitleId(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"){onRename(child.id,editingTitleVal);setEditingTitleId(null);}if(e.key==="Escape")setEditingTitleId(null);}}
                      className="flex-1 bg-transparent border-b border-indigo-500 text-white text-sm outline-none font-bold"/>
                  ):(
                    <span className="flex-1 font-bold text-sm cursor-pointer" onClick={e=>e.stopPropagation()} onDoubleClick={()=>{setEditingTitleId(child.id);setEditingTitleVal(child.title);}}>{child.title}</span>
                  )}
                  {(()=>{
                    const childSubs=sourceDumps.filter(d=>d.parentId===child.id);
                    const isOpen=hoveredBadgeId===child.id;
                    const open=e=>{e.stopPropagation();setHoveredBadgeId(child.id);};
                    const close=()=>setHoveredBadgeId(null);
                    const toggle=e=>{e.stopPropagation();setHoveredBadgeId(v=>v===child.id?null:child.id);};
                    if(childSubs.length>0){
                      return (
                        <span className="relative shrink-0" onClick={toggle}>
                          <span className={`text-xs cursor-pointer underline decoration-dotted ${isOpen?"text-white drop-shadow-[0_0_6px_rgba(255,255,255,0.9)]":"text-indigo-400"}`}>{childSubs.length} sub{childSubs.length!==1?"s":""}</span>
                          {isOpen&&(
                            <div className="absolute right-0 top-5 z-50 bg-gray-800 border border-gray-600 rounded shadow-lg min-w-max py-1">
                              {childSubs.map(s=><div key={s.id} className="px-3 py-1 text-xs text-gray-200 whitespace-nowrap">{s.title}</div>)}
                            </div>
                          )}
                        </span>
                      );
                    } else {
                      const mmCount=child.mmLinks.length;
                      return (
                        <span className="relative shrink-0" onClick={mmCount>0?toggle:undefined}>
                          <span className={`text-xs ${mmCount>0?(isOpen?"text-white drop-shadow-[0_0_6px_rgba(255,255,255,0.9)] cursor-pointer underline decoration-dotted":"text-indigo-400 cursor-pointer underline decoration-dotted"):"text-gray-600"}`}>{mmCount} MM{mmCount!==1?"s":""}</span>
                          {isOpen&&mmCount>0&&(
                            <div className="absolute right-0 top-5 z-50 bg-gray-800 border border-gray-600 rounded shadow-lg min-w-max py-1">
                              {child.mmLinks.map(link=>{const mm=mms.find(m=>m.id===link.mmId);return <div key={link.id} className="px-3 py-1 text-xs text-gray-200 whitespace-nowrap">{mm?mm.name:link.mmId}</div>;})}
                            </div>
                          )}
                        </span>
                      );
                    }
                  })()}
                  <span onClick={e=>{e.stopPropagation();setDumpPath(p=>[...p,child.id]);}} className="bg-gray-400 text-black text-xs px-2 py-0.5 rounded shrink-0 cursor-pointer transition-all duration-150 hover:scale-110 hover:bg-gray-200 hover:shadow-[0_0_8px_rgba(255,255,255,0.7)] inline-block">navigate</span>
	                  <button onClick={e=>{e.stopPropagation();requestConfirmDelete(
	                    "Delete source dump?",
	                    `Delete "${child.title}" and all its contents? This cannot be undone.`,
	                    ()=>onDeleteEntry(child.id)
	                  );}} className="text-red-800 hover:text-red-500 text-xs shrink-0">×</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScheduleFocusTab({ type2mms, mgChanges, mgSchedule, openMM, kolbs }) {
      const [selDate, setSelDate] = React.useState(today());
      const latestChange = Object.fromEntries(
        type2mms.map(mm => {
          const sorted = (mgChanges || [])
            .filter(c => c.mmId === mm.id)
            .sort((a, b) => b.date.localeCompare(a.date));
          return [mm.id, sorted[0] || null];
        })
      );
      const activeMGs = getMGsForDay(selDate, mgSchedule);
      const isCarried = !Object.prototype.hasOwnProperty.call(mgSchedule, selDate) && activeMGs.length > 0;
      const sortedMMs = [...type2mms].sort((a, b) => {
        const aA = activeMGs.includes(a.id) ? 0 : 1;
        const bA = activeMGs.includes(b.id) ? 0 : 1;
        if (aA !== bA) return aA - bA;
        return ((a.rating ?? Infinity) - (b.rating ?? Infinity));
      });
      if (!type2mms.length)
        return <div className="text-gray-600 text-center py-20 text-xs">No T2 Mind Maps yet.</div>;
      return (
        <div className="p-4 overflow-y-auto flex-1">
          <div className="flex items-center gap-3 mb-4">
            <button onClick={() => window.location.href = 'progress.html#mg'}
              className="bg-emerald-800 hover:bg-emerald-700 text-white px-3 py-1 rounded text-xs font-bold tracking-widest">GO TO SCHEDULE →</button>
          </div>
          <div className="flex flex-col gap-3">
            {sortedMMs.map(mm => {
              const mgText = mm.currentMG || latestChange[mm.id]?.newMG || '';
              const active = activeMGs.includes(mm.id);
              const sessionCount = (kolbs||[]).filter(k => k.mmId === mm.id).length;
              return (
                <button key={mm.id} onClick={() => openMM(mm.id, "mg")}
                  className={`w-full text-left border rounded-lg p-4 transition-colors group ${active ? 'border-emerald-700 bg-emerald-950/30 hover:border-emerald-500' : 'border-gray-800 bg-gray-900/50 hover:border-gray-600'}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <div className="text-xs text-gray-500 tracking-widest">{mm.name}</div>

      function transferDumpTextBlock(dumpId,fromLinkId,blockId,toMmId){setSourceDumps(p=>p.map(d=>{if(d.id!==dumpId)return d;const fromLink=d.mmLinks.find(l=>l.id===fromLinkId);const block=(fromLink?.textBlocks||[]).find(b=>b.id===blockId);if(!block)return d;const toLink=d.mmLinks.find(l=>l.mmId===toMmId);let mmLinks;if(toLink){mmLinks=d.mmLinks.map(l=>{if(l.id===fromLinkId)return{...l,textBlocks:(l.textBlocks||[]).filter(b=>b.id!==blockId)};if(l.mmId===toMmId)return{...l,textBlocks:[...(l.textBlocks||[]),block]};return l;});}else{mmLinks=[...d.mmLinks.map(l=>l.id===fromLinkId?{...l,textBlocks:(l.textBlocks||[]).filter(b=>b.id!==blockId)}:l),{id:nid(),mmId:toMmId,text:"",textBlocks:[block],links:[]}];}return{...d,mmLinks};}));}
      function transferDumpURLLink(dumpId,fromLinkId,urlId,toMmId){setSourceDumps(p=>p.map(d=>{if(d.id!==dumpId)return d;const fromLink=d.mmLinks.find(l=>l.id===fromLinkId);const urlLink=(fromLink?.links||[]).find(u=>u.id===urlId);if(!urlLink)return d;const toLink=d.mmLinks.find(l=>l.mmId===toMmId);let mmLinks;if(toLink){mmLinks=d.mmLinks.map(l=>{if(l.id===fromLinkId)return{...l,links:(l.links||[]).filter(u=>u.id!==urlId)};if(l.mmId===toMmId)return{...l,links:[...(l.links||[]),urlLink]};return l;});}else{mmLinks=[...d.mmLinks.map(l=>l.id===fromLinkId?{...l,links:(l.links||[]).filter(u=>u.id!==urlId)}:l),{id:nid(),mmId:toMmId,text:"",textBlocks:[],links:[urlLink]}];}return{...d,mmLinks};}));}

      function saveLinSession(items,title){
        const record={id:nid(),title:title||today(),date:today(),items};
        items.forEach(({mmId,change})=>{
          const mm=mmMap[mmId];
          const t=change.type;
          if(t==="stageAdvance"||t==="stageClear"||t==="stageFinish"){
            const newStage=change.newValue;
            setMms(p=>p.map(m=>m.id===mmId?{...m,ksStage:newStage}:m));
            if(newStage==="sir"&&mm?.ksStage!=="sir"&&!sessions.filter(s=>s.mmId===mmId).length)
              setSessions(p=>[...p,...SIR_INTERVALS.map((iv,i)=>({id:nid(),mmId,date:addDays(today(),iv),repIndex:i,done:false,skipped:false}))]);
          } else if(t==="stageRevert"){
            const newStage=change.newValue;
            if(["sir","finished"].includes(change.oldValue)&&!["sir","finished"].includes(newStage))
              setSessions(p=>p.filter(s=>s.mmId!==mmId));
            setMms(p=>p.map(m=>m.id===mmId?{...m,ksStage:newStage}:m));
          } else if(t==="sirRevert"){
            const ri=change.repIndex;
            setMms(p=>p.map(m=>m.id===mmId?{...m,ksStage:"sir"}:m));
            const existing=sessions.filter(s=>s.mmId===mmId);
            if(existing.length===5){
              setSessions(p=>p.map(s=>{
                if(s.mmId!==mmId) return s;
                if(s.repIndex<ri) return {...s,done:true,skipped:false};
                return {...s,done:false,skipped:false,date:addDays(today(),SIR_INTERVALS[s.repIndex])};
              }));
            } else {
              setSessions(p=>[...p.filter(s=>s.mmId!==mmId),...SIR_INTERVALS.map((iv,i)=>({
                id:nid(),mmId,date:addDays(today(),iv),repIndex:i,
                done:i<ri,skipped:false
              }))]);
            }
          } else if(t==="sirDone"){
            const sid=change.sessionId;
            const finishDate=today();
            const delta=Math.round((new Date(finishDate)-new Date(change.oldValue))/(864e5));
            setSessions(prev=>{
              const upd=prev.map(s=>{
                if(s.id===sid) return {...s,done:true,finishDate};
                if(s.mmId===mmId&&s.repIndex>change.repIndex&&!s.done&&!s.skipped&&delta!==0)
                  return {...s,date:addDays(s.date,delta)};
                return s;
              });

                setMms(p=>p.map(m=>m.id===mmId?{...m,ksStage:"finished"}:m));
              return upd;

            setSessions(p=>p.map(s=>s.id===change.sessionId?{...s,skipped:true}:s));
          } else if(t==="sirPostpone"){
            const delta=Math.round((new Date(change.newValue)-new Date(change.oldValue))/(864e5));
            setSessions(p=>p.map(s=>{
              if(s.id===change.sessionId) return {...s,date:change.newValue};
              if(s.mmId===mmId&&s.repIndex>change.repIndex&&!s.done&&!s.skipped)
                return {...s,date:addDays(s.date,delta)};
              return s;
            }));
          }
        });
        setLinChanges(p=>[...p,record]);
        if(title&&title!==today())setLinDayTitles(p=>p[today()]?p:{...p,[today()]:title});

      function addMM(){

        let initPos;
        if(parentPoss.length>0){
          const cx=parentPoss.reduce((s,p)=>s+p.x,0)/parentPoss.length;
          const cy=parentPoss.reduce((s,p)=>s+p.y,0)/parentPoss.length;
          const dx=cx-360,dy=cy-260;
          const dist=Math.sqrt(dx*dx+dy*dy)||1;
          const od=160;
          initPos=dist<10?{x:cx,y:cy+od}:{x:cx+(dx/dist)*od,y:cy+(dy/dist)*od};
        } else {
          const vals=Object.values(curPos);
