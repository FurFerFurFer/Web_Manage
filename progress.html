                        onUpdateNote(node.id, editingNoteId, { title: noteDraftTitle.trim(), detail: noteDraftDetail.trim() });
                        setEditingNoteId(null);
                      } else {
                        onAddNote(node.id, { id: uid(), title: noteDraftTitle.trim(), detail: noteDraftDetail.trim(), createdAt: Date.now() });
                        setShowNotePanel(false);
                      }
                      setNoteDraftTitle('');
                      setNoteDraftDetail('');
                    }}>{editingNoteId ? 'Save' : 'Done'}</button>
                </div>
              </div>
            </div>
          )}
          {isParent && prog && (
            <div style={{ paddingLeft: indent + 22 }} className="pr-2 mb-1">
              <ProgressBar done={prog.done} total={prog.total} slim />
            </div>
          )}
          {datePicker}
          {subGoalAddRow}
          {kidAddRow}
          {isParent && !collapsed && (
            <div>
              {(node.children || []).map(child => {
                if (child.isLink) {
                  const original = resolveLinkedTask(child, allGoals);
                  if (!original) return (
                    <div key={child.id} style={{ paddingLeft: indent + 18 }}
                      className="flex items-center gap-2 py-0.5 text-xs text-gray-600 italic">
                      <span>Linked task deleted</span>
                      <button onClick={() => onUnlinkTask(child.id)} className="hover:text-red-400 not-italic">×</button>
                    </div>
                  );
                  return <GoalNode key={child.id} node={original} depth={depth + 1} handlers={handlers}
                    linkedRefId={child.id} milestoneOwner={currentMilestoneOwner} insideMilestone={blockedMilestoneBranch} insideActiveMilestone={nextInsideActiveMilestone} />;
                }
                return <GoalNode key={child.id} node={child} depth={depth + 1} handlers={handlers}
                  milestoneOwner={currentMilestoneOwner} insideMilestone={blockedMilestoneBranch} insideActiveMilestone={nextInsideActiveMilestone} />;
              })}
            </div>
          )}
        </div>
        {pickingLink && (
          <TaskPickerModal
            goals={allGoals || []}
            excludeIds={[node.id, ...(node.children || []).filter(c => c.isLink).map(c => c.linkedTaskId)]}
            onSelect={taskId => { onAddLinkedTask(node.id, taskId); setPickingLink(false); }}
            onClose={() => setPickingLink(false)}
          />
        )}
        {pendingDelete && (
          <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center"
               onClick={() => setPendingDelete(false)}>
            <div className="bg-gray-800 border border-gray-600 rounded-xl p-5 w-80 shadow-xl"
                 onClick={e => e.stopPropagation()}>
              <p className="text-white font-medium mb-1">Delete "{node.title}"?</p>
              <p className="text-gray-400 text-sm mb-4">This task has {(node.children || []).filter(c => !c.isLink).length} child task(s).</p>
              <div className="flex flex-col gap-2">
                <button
                  onClick={() => { onDeleteKeepChildren(node.id); setPendingDelete(false); }}
                  className="w-full text-left px-3 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-white text-sm">
                  Delete only this task <span className="text-gray-500">(keep children)</span>
                </button>
                <button
                  onClick={() => { onDelete(node.id); setPendingDelete(false); }}
                  className="w-full text-left px-3 py-2 rounded-lg bg-red-900/60 hover:bg-red-800 text-red-200 text-sm">
                  Delete this task and all children
                </button>
                <button
                  onClick={() => setPendingDelete(false)}
                  className="w-full text-center px-3 py-2 rounded-lg bg-gray-700/50 hover:bg-gray-700 text-gray-400 text-sm">
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}
      </>);
    }

    // ── GoalTree ──────────────────────────────────────────────────────────────

    function GoalTree({ goals, setGoals, mms, sirDoneMap }) {
      const [adding, setAdding]     = useState(false);
      const [newTitle, setNewTitle] = useState('');
      const inputRef = useRef(null);

      useEffect(() => { if (adding && inputRef.current) inputRef.current.focus(); }, [adding]);

      function addGoal() {
        const v = newTitle.trim();
        if (!v) return;
        setGoals(prev => [...prev, {
          id: uid(), title: v, children: [], completed: false,
          createdAt: Date.now(), scheduledDate: null, toLearn: [], mmTargets: {}, milestones: [],
        }]);
        setNewTitle('');
        setAdding(false);
      }

      const handlers = {
        onToggle:           id              => setGoals(prev => toggleLeaf(prev, id)),
        onAddChild:         (pid, child)    => setGoals(prev => addChildAndTransferNotes(prev, pid, child)),
        onAddSubGoal:       (pid, subGoal)  => setGoals(prev => addSubGoalAndMigrateTasks(prev, pid, subGoal)),
        onDelete:               id              => setGoals(prev => deleteNode(prev, id)),
        onDeleteKeepChildren:   id              => setGoals(prev => deleteNodeKeepChildren(prev, id)),
        onUpdateTitle:      (id, title)     => setGoals(prev => updateTitle(prev, id, title)),
        onUpdateDate:       (id, date)      => setGoals(prev => updateDate(prev, id, date)),
        onUpdateToLearn:    (id, mmIds)     => setGoals(prev => updateGoalToLearn(prev, id, mmIds)),
        onUpdateMmTargets:  (id, mmTargets) => setGoals(prev => updateGoalMmTargets(prev, id, mmTargets)),
        onAddMilestoneType:     (id, title) => setGoals(prev => addMilestoneType(prev, id, title)),
        onRenameMilestoneType:  (id, mid, title) => setGoals(prev => renameMilestoneType(prev, id, mid, title)),
        onDeleteMilestoneType:  (id, mid) => setGoals(prev => deleteMilestoneType(prev, id, mid)),
        onReorderMilestoneType: (id, mid, dir) => setGoals(prev => reorderMilestoneType(prev, id, mid, dir)),
        allGoals: goals,
        onAddLinkedTask:    (parentId, linkedTaskId) => setGoals(prev => addLinkedTask(prev, parentId, linkedTaskId)),
        onUnlinkTask:       id              => setGoals(prev => deleteNode(prev, id)),
        onArrangeTask:      (draggedId, targetId, insertBefore) => setGoals(prev => reorderSibling(prev, draggedId, targetId, insertBefore)),
        onAddNote:          (taskId, note)   => setGoals(prev => addNoteToTask(prev, taskId, note)),
        onRemoveNote:       (taskId, noteId) => setGoals(prev => removeNoteFromTask(prev, taskId, noteId)),
        onUpdateNote:       (taskId, noteId, fields) => setGoals(prev => updateNoteInTask(prev, taskId, noteId, fields)),
        mms,
        sirDoneMap,
      };

      return (
        <div>
          {goals.length === 0 && (
            <div className="text-center py-16 text-gray-700">
              <div className="text-3xl mb-3">◎</div>
              <div className="text-sm">No goals yet.</div>
              <div className="text-xs mt-1">Add your first ultimate goal below.</div>
            </div>
          )}
          {goals.map((g, idx) => (
            <GoalNode key={g.id} node={g} depth={0} handlers={handlers} goalColor={PALETTE[idx % PALETTE.length]} />
          ))}
          {adding ? (
            <div className="flex items-center gap-2 mt-2">
              <input
                ref={inputRef}
                value={newTitle}
                onChange={e => setNewTitle(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter')  addGoal();
                  if (e.key === 'Escape') { setAdding(false); setNewTitle(''); }
                }}
                placeholder="Ultimate goal…"
                className="flex-1 bg-gray-800 border border-indigo-500 rounded px-3 py-1.5 text-sm text-white outline-none placeholder-gray-600"
              />
              <button onClick={addGoal} className="text-xs px-3 py-1.5 bg-indigo-700 hover:bg-indigo-600 text-white rounded font-bold">add</button>
              <button onClick={() => { setAdding(false); setNewTitle(''); }} className="text-xs px-2 py-1.5 bg-gray-800 text-gray-500 hover:text-white rounded">cancel</button>
            </div>
          ) : (
            <button
              onClick={() => setAdding(true)}
              className="w-full text-left text-xs text-gray-600 hover:text-indigo-400 px-3 py-2 mt-1 rounded border border-dashed border-gray-800 hover:border-indigo-800 transition-colors"
            >
              + add ultimate goal
            </button>
          )}
        </div>
      );
    }

    // ── GoalProgressPanel ─────────────────────────────────────────────────────

    function StatCard({ label, value, color }) {
      return (
        <div className="flex flex-col items-center bg-gray-800/50 rounded-lg px-3 py-2.5 flex-1">
          <span className="text-2xl font-black tabular-nums leading-none" style={{ color }}>{value}</span>
          <span className="text-[9px] tracking-widest text-gray-600 mt-1">{label}</span>
        </div>
      );
    }

    function GoalProgressPanel({ node, goalColor, mms, sirDoneMap, goals }) {
      const [viewType, setViewType] = React.useState('subgoal');

      const resolveLink = goals ? id => findNode(goals, id) : null;
      const prog = countProgress(node, resolveLink);
      const pct  = prog.total ? Math.round(prog.done / prog.total * 100) : 0;
      const full = prog.done === prog.total && prog.total > 0;
      const displayColor = full ? '#10b981' : goalColor;
      const r = 52, circ = 2 * Math.PI * r;

      const isGoalLike      = !((node.children || []).some(c => c.isSubGoal));
      const isGoalContainer = !isGoalLike;
      const subGoals        = isGoalContainer
        ? (node.children || []).filter(c => c.isSubGoal).map(c => resolveLinkedTask(c, goals)).filter(Boolean)
        : [];

      function collectToLearn(n) {
        const sgs = (n.children || []).filter(c => c.isSubGoal);
        if (sgs.length === 0) return n.toLearn || [];
        return sgs.flatMap(sg => collectToLearn(sg));
      }
      function collectMmTargets(n) {
        const sgs = (n.children || []).filter(c => c.isSubGoal);
        if (sgs.length === 0) return n.mmTargets || {};
        return Object.assign({}, ...sgs.map(sg => collectMmTargets(sg)));
      }
      const effectiveToLearn = isGoalContainer
        ? [...new Set(collectToLearn(node))]
        : (node.toLearn || []);
      const effectiveMmTargets = isGoalContainer
        ? collectMmTargets(node)
        : (node.mmTargets || {});

      // Collect unique leaves — resolve links to originals, deduplicate by canonical ID
      function collectUniqueLeaves() {
        function walk(n) {
          const resolved = resolveLinkedTask(n, goals);
          if (!resolved) return [];
          if (resolved !== n) return walk(resolved);
          if (isMilestoneNode(n) && (n.children || []).length === 0) return [];
          if ((n.children || []).length === 0) return [n];
          return (n.children || []).flatMap(c => walk(c));
        }
        const all = walk(node);
        const seen = new Set();
        return all.filter(leaf => {
          if (seen.has(leaf.id)) return false;
          seen.add(leaf.id);
          return true;
        });
      }

      const uniqueLeaves = collectUniqueLeaves();
      const uniqueDone   = uniqueLeaves.filter(l => l.completed).length;
      const uniqueTotal  = uniqueLeaves.length;
      const uniquePct    = uniqueTotal ? Math.round(uniqueDone / uniqueTotal * 100) : 0;
      const uniqueFull   = uniqueDone === uniqueTotal && uniqueTotal > 0;
      const uniqueColor  = uniqueFull ? '#10b981' : goalColor;

      // Per-subgoal MM targets helper
      function subGoalMmProg(sg) {
        const tl = sg.toLearn || [];
        const targets = sg.mmTargets || {};
        let done = 0, total = 0;
        tl.forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = targets[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          total++;
          done += mmProgressFraction(mm, tgt, sirDoneMap);
        });
        return { done, total };
      }

      // MM progress for UNIQUE TOTAL view (deduplicated across subgoals)
      const mmProg = (() => {
        let done = 0, total = 0;
        effectiveToLearn.forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = effectiveMmTargets[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          total++;
          done += mmProgressFraction(mm, tgt, sirDoneMap);
        });
        return { done, total };
      })();

      const mmPct = mmProg.total > 0 ? mmProg.done / mmProg.total * 100 : null;
      const combinedUniquePct =
        uniqueTotal > 0 && mmPct !== null ? Math.round((uniquePct + mmPct) / 2)
        : mmPct !== null                  ? Math.round(mmPct)
        :                                    uniquePct;

      const activeView = isGoalContainer ? viewType : 'unique';
      const heroColor  = activeView === 'subgoal' ? displayColor : uniqueColor;
      const heroPct    = activeView === 'subgoal' ? pct : combinedUniquePct;
      const heroProg   = activeView === 'subgoal' ? prog : { done: uniqueDone, total: uniqueTotal };

      return (
        <div className="flex flex-col gap-7">

          {/* View toggle */}
          {isGoalContainer && (
            <div className="flex gap-1">
              <button onClick={() => setViewType('subgoal')}
                className={`px-3 py-1 text-[10px] rounded-full tracking-wider transition-colors ${
                  activeView === 'subgoal' ? 'bg-indigo-700 text-white' : 'bg-gray-800 text-gray-500 hover:text-gray-300'}`}>
                BY SUBGOAL
              </button>
              <button onClick={() => setViewType('unique')}
                className={`px-3 py-1 text-[10px] rounded-full tracking-wider transition-colors ${
                  activeView === 'unique' ? 'bg-indigo-700 text-white' : 'bg-gray-800 text-gray-500 hover:text-gray-300'}`}>
                UNIQUE TOTAL
              </button>
            </div>
          )}

          {/* Hero ring + stats */}
          <div className="flex items-center gap-6">
            <div className="relative flex-shrink-0">
              <svg width={130} height={130} viewBox="0 0 130 130">
                <circle cx={65} cy={65} r={r} fill="none" stroke="#1e293b" strokeWidth={14}/>
                <circle cx={65} cy={65} r={r} fill="none"
                  stroke={heroColor} strokeWidth={14}
                  strokeLinecap="round"
                  strokeDasharray={`${(heroPct / 100) * circ} ${circ}`}
                  transform="rotate(-90 65 65)"
                  style={{ transition: 'stroke-dasharray 0.6s ease' }}/>
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-3xl font-black tabular-nums leading-none" style={{ color: heroColor }}>{heroPct}%</span>
                <span className="text-[10px] text-gray-600 mt-0.5 font-mono">{heroProg.done}/{heroProg.total}</span>
              </div>
            </div>
            <div className="flex flex-col gap-2.5 flex-1">
              <div className="flex gap-2">
                <StatCard label="TOTAL"  value={heroProg.total}                         color="#6b7280" />
                <StatCard label="DONE"   value={heroProg.done}                          color={heroColor} />
                <StatCard label="LEFT"   value={heroProg.total - heroProg.done}         color={heroProg.total - heroProg.done === 0 ? '#10b981' : '#f59e0b'} />
              </div>
              <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-500"
                  style={{ width: `${heroPct}%`, backgroundColor: heroColor }} />
              </div>
            </div>
          </div>

          {/* BY SUBGOAL: per-subgoal mini rings */}
          {activeView === 'subgoal' && subGoals.length > 0 && (() => {
            const rS = 28, circS = 2 * Math.PI * rS;
            return (
              <div>
                <div className="text-[10px] tracking-widest text-gray-600 mb-3">SUBGOALS</div>
                <div className="flex flex-col gap-3">
                  {subGoals.map(sg => {
                    const sp = countProgress(sg, resolveLink);
                    const spPct = sp.total ? Math.round(sp.done / sp.total * 100) : 0;
                    const spFull = sp.done === sp.total && sp.total > 0;
                    const spColor = spFull ? '#10b981' : goalColor;
                    const sgMm = subGoalMmProg(sg);
                    return (
                      <div key={sg.id} className="flex items-center gap-4 px-3 py-2.5 rounded-xl bg-gray-900/40">
                        <div className="relative flex-shrink-0">
                          <svg width={70} height={70} viewBox="0 0 70 70">
                            <circle cx={35} cy={35} r={rS} fill="none" stroke="#1e293b" strokeWidth={8}/>
                            <circle cx={35} cy={35} r={rS} fill="none"
                              stroke={spColor} strokeWidth={8}
                              strokeLinecap="round"
                              strokeDasharray={`${(spPct / 100) * circS} ${circS}`}
                              transform="rotate(-90 35 35)"
                              style={{ transition: 'stroke-dasharray 0.5s ease' }}/>
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-sm font-bold tabular-nums leading-none" style={{ color: spColor }}>{spPct}%</span>
                          </div>
                        </div>
                        <div className="flex flex-col gap-1 flex-1 min-w-0">
                          <span className="text-xs font-semibold text-gray-200 truncate">{sg.title}</span>
                          <div className="flex items-center gap-3 flex-wrap">
                            <span className="text-[10px] font-mono text-gray-500 tabular-nums">{sp.done}/{sp.total} tasks</span>
                            {sgMm.total > 0 && (
                              <span className={`text-[10px] font-mono tabular-nums ${sgMm.done >= sgMm.total ? 'text-emerald-500' : 'text-purple-400'}`}>
                                {Math.round(sgMm.done * 10) / 10}/{sgMm.total} learned
                              </span>
                            )}
                          </div>
                          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden mt-0.5">
                            <div className="h-full rounded-full transition-all duration-500"
                              style={{ width: `${spPct}%`, backgroundColor: spColor }} />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* UNIQUE TOTAL: deduplicated task list */}
          {activeView === 'unique' && uniqueLeaves.length > 0 && (
            <div>
              <div className="flex items-center justify-between mb-3">
                <span className="text-[10px] tracking-widest text-gray-600">UNIQUE TASKS</span>
                <span className="text-[10px] text-gray-600 font-mono">{uniqueDone}/{uniqueTotal}</span>
              </div>
              <div className="flex flex-col gap-0.5 pr-1">
                {uniqueLeaves.map((leaf, i) => (
                  <div key={leaf.id || i}
                    className={`flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg transition-colors ${leaf.completed ? 'bg-gray-900/30' : 'bg-gray-900/60'}`}>
                    <span className="flex-shrink-0 w-3 h-3 rounded-sm transition-all"
                      style={{
                        backgroundColor: leaf.completed ? uniqueColor : 'transparent',
                        border: `1.5px solid ${leaf.completed ? uniqueColor : '#4b5563'}`,
                      }} />
                    <span className={`text-xs flex-1 truncate ${leaf.completed ? 'line-through text-gray-600' : 'text-gray-300'}`}>
                      {leaf.title}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* TO LEARN (unique total view) */}
          {activeView === 'unique' && effectiveToLearn.length > 0 && (
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] tracking-widest text-gray-600">TO LEARN</span>
                {mmProg.total > 0 && (
                  <span className="text-[10px] font-mono text-gray-600">{Math.round(mmProg.done * 10) / 10}/{mmProg.total} targets met</span>
                )}
              </div>
              {mmProg.total > 0 && (
                <div className="h-2 bg-gray-800 rounded-full overflow-hidden mb-2">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{ width: `${Math.round(mmProg.done/mmProg.total*100)}%`, backgroundColor: mmProg.done === mmProg.total ? '#10b981' : '#8b5cf6' }} />
                </div>
              )}
              <div className="flex flex-col gap-1">
                {effectiveToLearn.map(mmId => {
                  const mm = (mms || []).find(m => m.id === mmId);
                  if (!mm) return null;
                  const tgt = effectiveMmTargets[mmId] || {};
                  const hasTarget = !!(tgt.stage || tgt.level);
                  const met = hasTarget && isMMTargetMet(mm, tgt, sirDoneMap);
                  return (
                    <div key={mmId} className="flex items-center gap-2">
                      <MindMapsBadge mm={mm} sirDoneMap={sirDoneMap} />
                      {hasTarget && (
                        <span className={`text-[10px] ml-auto ${met ? 'text-emerald-400' : 'text-amber-400'}`}>
                          {met ? '✓ met' : '○ unmet'}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {heroProg.total === 0 && (
            <div className="text-center py-8 text-gray-700 text-xs italic">Add tasks in the left panel to track progress here.</div>
          )}
        </div>
      );
    }

    // ── MilestonesPanel ───────────────────────────────────────────────────────

    function MilestonesPanel({ goals, setGoals, selectedMilestone, setSelectedMilestone }) {
      const selectedRowRef = useRef(null);
      const calendarScrollRef = useRef(null);
      const todayCellRef = useRef(null);
      const todayStr = toDateStr(new Date());
      const todayInMilestoneCalendar = todayStr >= MILESTONE_CAL_START && todayStr <= MILESTONE_CAL_END;

      const groups = useMemo(() => (goals || []).map((goal, idx) => {
        const owners = collectMilestoneOwners(goal, goals || []);
        return { goal, color: PALETTE[idx % PALETTE.length], owners };
      }).filter(g => g.owners.length > 0), [goals]);

      const milestoneMonths = useMemo(() => {
        const months = [];
        for (let year = 2026; year <= 2033; year++) {
          for (let month = 0; month < 12; month++) months.push({ year, month });
        }
        return months;
      }, []);

      const milestoneItems = useMemo(() => groups.flatMap((group, groupIdx) =>
        group.owners.flatMap((owner, ownerIdx) =>
          (owner.milestones || []).map((m, idx) => {
            const blocks = collectMilestoneBlocks(owner, m.id, goals || []);
            const progress = blocks.reduce((acc, b) => {
              const p = countProgress(b, id => goals && findNode(goals, id));
              return { done: acc.done + p.done, total: acc.total + p.total };
            }, { done: 0, total: 0 });
            const pct = progress.total ? Math.round(progress.done / progress.total * 100) : 0;
            const full = progress.total > 0 && progress.done >= progress.total;
            const progressColor = progress.total === 0 ? '#6b7280' : full ? '#10b981' : '#06b6d4';
            return {
              key: `${owner.id}|${m.id}`,
              group,
              owner,
              milestone: m,
              idx,
              blocks,
              tasks: blocks.flatMap(block => block.children || []),
              progress,
              pct,
              progressColor,
              chipColor: PALETTE[(groupIdx + ownerIdx + idx) % PALETTE.length],
            };
          })
        )
      ), [groups, goals]);

      const milestoneItemMap = useMemo(
        () => Object.fromEntries(milestoneItems.map(item => [item.key, item])),
        [milestoneItems]
      );
      const milestoneKeyList = milestoneItems.map(item => item.key).join('|');
      const selectedKey = selectedMilestone ? `${selectedMilestone.ownerId}|${selectedMilestone.milestoneId}` : null;
      const selectedItem = selectedKey ? milestoneItemMap[selectedKey] : null;

      const totalOwners = groups.reduce((sum, g) => sum + g.owners.length, 0);
      const totalMilestones = groups.reduce((sum, g) =>
        sum + g.owners.reduce((s, owner) => s + (owner.milestones || []).length, 0), 0);

      useEffect(() => {
        if (selectedKey && !milestoneItemMap[selectedKey]) {
          setSelectedMilestone(null);
        }
      }, [selectedKey, milestoneKeyList]);

      useEffect(() => {
        if (selectedRowRef.current) {
          selectedRowRef.current.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }, [selectedKey]);

      useEffect(() => {
        if (!todayInMilestoneCalendar) return;
        const id = requestAnimationFrame(() => {
          const scroller = calendarScrollRef.current;
          const todayCell = todayCellRef.current;
          if (!scroller || !todayCell) return;
          const scrollerRect = scroller.getBoundingClientRect();
          const todayRect = todayCell.getBoundingClientRect();
          scroller.scrollTop += todayRect.top - scrollerRect.top - (scroller.clientHeight / 2) + (todayRect.height / 2);
        });
        return () => cancelAnimationFrame(id);
      }, []);

      function chooseMilestone(ownerId, milestoneId) {
        setSelectedMilestone({ ownerId, milestoneId });
      }

      function setMilestonePeriod(ownerId, milestoneId, startDate, endDate) {
        setGoals(prev => updateMilestonePeriod(prev, ownerId, milestoneId, startDate, endDate));
      }

      function handleDateInput(ownerId, milestone, field, value) {
        chooseMilestone(ownerId, milestone.id);
        let startDate = field === 'start' ? value || null : milestone.startDate || null;
        let endDate = field === 'end' ? value || null : milestone.endDate || null;
        if (field === 'start' && value && endDate && value > endDate) endDate = value;
        if (field === 'end' && value && startDate && value < startDate) startDate = value;
        setMilestonePeriod(ownerId, milestone.id, startDate, endDate);
      }

      function clearMilestonePeriod(ownerId, milestoneId) {
        chooseMilestone(ownerId, milestoneId);
        setMilestonePeriod(ownerId, milestoneId, null, null);
      }

      function activeMilestonesForDate(dateStr) {
        return milestoneItems.filter(item =>
          item.milestone.startDate &&
          item.milestone.endDate &&
          dateStr >= item.milestone.startDate &&
          dateStr <= item.milestone.endDate
        );
      }

      function renderMilestoneTask(task, depth = 0, keyPrefix = '', isActive = false) {
        if (task.isLink) {
          const original = resolveLinkedTask(task, goals);
          if (!original) {
            return (
              <div key={`${keyPrefix}-${task.id}`} style={{ paddingLeft: depth * 16 }}
                className="flex items-center gap-2 py-0.5 text-[11px] text-gray-700 italic">
                <span className="w-3 h-3 flex-shrink-0" />
                <span>Linked task deleted</span>
              </div>
            );
          }
          return renderMilestoneTask(original, depth, `${keyPrefix}-${task.id}`, isActive);
        }

        const children = (task.children || []).filter(c => !isMilestoneNode(c));
        const isLeaf = isCountableLeaf(task);
        const progress = !isLeaf && children.length > 0 ? countProgress(task, id => goals && findNode(goals, id), true) : null;
        const done = isLeaf
          ? !!task.completed
          : progress && progress.total > 0 && progress.done >= progress.total;
        const markerColor = done ? '#10b981' : task.taskType === 'routine' ? '#f59e0b' : '#6b7280';
        const textClass = done ? 'line-through text-gray-600' : !isLeaf ? 'text-gray-300 font-semibold' :
          isActive ? (task.taskType === 'routine' ? 'text-amber-400' : 'text-gray-200') :
          (task.taskType === 'routine' ? 'text-amber-500' : 'text-gray-400');

        return (
          <React.Fragment key={`${keyPrefix}-${task.id}`}>
            <div style={{ paddingLeft: depth * 16, ...(isActive && !done ? { backgroundColor: task.taskType === 'routine' ? 'rgba(245, 158, 11, 0.10)' : 'rgba(6, 182, 212, 0.08)' } : {}) }}
              className="flex items-center gap-2 py-0.5 min-w-0">
              <span className="w-3 h-3 rounded-sm flex-shrink-0"
                style={{
                  backgroundColor: done ? markerColor : 'transparent',
                  border: `1px solid ${markerColor}`,
                }} />
              <span className={`text-[11px] flex-1 truncate ${textClass}`}>
                {task.title}
              </span>
              {progress && (
                <span className={`text-[9px] font-mono tabular-nums flex-shrink-0 ${done ? 'text-emerald-500' : 'text-gray-600'}`}>
                  {progress.done}/{progress.total}
                </span>
              )}
            </div>
            {children.map(child => renderMilestoneTask(child, depth + 1, `${keyPrefix}-${task.id}`, isActive))}
          </React.Fragment>
        );
      }

      function renderCalendarMonth({ year, month }) {
        const firstDay = getFirstDay(year, month);
        const daysInMonth = getDIM(year, month);
        const trailing = (7 - ((firstDay + daysInMonth) % 7)) % 7;
        return (
          <div key={`${year}-${month}`} className="border border-gray-800 bg-gray-900/40 rounded-lg overflow-hidden">
            <div className="flex items-center justify-between px-3 py-2 border-b border-gray-800">
              <span className="text-xs font-bold tracking-widest text-gray-300">{MONTH_NAMES[month]} {year}</span>
              <span className="text-[10px] text-gray-700 font-mono">{daysInMonth}</span>
            </div>
            <div className="grid grid-cols-7 border-b border-gray-800 bg-gray-950">
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map(day => (
                <div key={day} className="text-center text-[10px] text-gray-600 py-1">{day}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-px bg-gray-800">
              {Array(firstDay).fill(null).map((_, i) => (
                <div key={`empty-start-${i}`} className="min-h-[92px] bg-gray-950/70" />
              ))}
              {Array(daysInMonth).fill(null).map((_, i) => {
                const day = i + 1;
                const ds = dStr(year, month, day);
                const isToday = ds === todayStr;
                const active = activeMilestonesForDate(ds);
                const selectedActive = selectedItem &&
                  selectedItem.milestone.startDate &&
                  selectedItem.milestone.endDate &&
                  ds >= selectedItem.milestone.startDate &&
                  ds <= selectedItem.milestone.endDate;
                const tint = active[0]?.chipColor || '#080d18';
                return (
                  <div key={ds}
                    ref={isToday ? todayCellRef : null}
                    className="min-h-[92px] p-1.5 flex flex-col cursor-default"
                    style={{
                      backgroundColor: active.length ? `${tint}12` : '#080d18',
                      outline: selectedActive ? `1px solid ${selectedItem.chipColor}` : isToday ? '1px solid #6366f1' : 'none',
                      outlineOffset: '-1px',
                    }}>
                    <div className={`text-[10px] mb-1 flex-shrink-0 ${selectedActive ? 'text-white font-bold' : isToday ? 'text-indigo-300 font-bold' : active.length ? 'text-gray-300' : 'text-gray-600'}`}>
                      {day}
                    </div>
                    <div className="flex-1 min-h-0 overflow-y-auto flex flex-col gap-0.5">
                      {active.map(item => {
                        const chipSelected = item.key === selectedKey;
                        const displayName = `${item.milestone.title} - ${item.owner.title}`;
                        return (
                          <button key={item.key}
                            onClick={e => { e.stopPropagation(); chooseMilestone(item.owner.id, item.milestone.id); }}
                            title={`${item.group.goal.title} / ${displayName}`}
                            className={`w-full text-left rounded px-1 py-0.5 text-[9px] leading-tight truncate border transition-colors ${chipSelected ? 'bg-white/10' : 'hover:bg-white/5'}`}
                            style={{
                              borderColor: `${item.chipColor}${chipSelected ? 'ff' : '88'}`,
                              color: item.chipColor,
                              backgroundColor: chipSelected ? `${item.chipColor}2b` : `${item.chipColor}17`,
                            }}>
                            {displayName}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              {Array(trailing).fill(null).map((_, i) => (
                <div key={`empty-end-${i}`} className="min-h-[92px] bg-gray-950/70" />
              ))}
            </div>
          </div>
        );
      }

      return (
        <div className="flex-1 min-h-0 flex overflow-hidden">
          <div className="min-w-0 overflow-y-auto border-r border-gray-800 p-4" style={{ flex: '0 0 40%' }}>
            <div className="flex items-center justify-between mb-4">
              <div className="text-gray-700 tracking-widest text-xs">
                MILESTONES
              </div>
              <div className="text-[10px] text-gray-600 font-mono">
                {totalMilestones} milestone{totalMilestones !== 1 ? 's' : ''} · {totalOwners} leaf subgoal{totalOwners !== 1 ? 's' : ''}
              </div>
            </div>

            {!groups.length ? (
              <div className="h-full flex items-center justify-center">
                <div className="text-center text-gray-700">
                  <div className="text-3xl mb-3">◇</div>
                  <div className="text-sm">No milestones yet.</div>
                  <div className="text-xs mt-1">Add milestones inside a leaf subgoal in Progress.</div>
                </div>
              </div>
            ) : (
              <div className="flex flex-col gap-4">
                {groups.map(group => (
                  <div key={group.goal.id} className="border border-gray-800 bg-gray-900/50 rounded-lg overflow-hidden">
                    <div className="flex items-center gap-2 px-4 py-3 border-b border-gray-800">
                      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: group.color }} />
                      <span className="text-sm font-bold text-gray-200 truncate">{group.goal.title}</span>
                      <span className="ml-auto text-[10px] text-gray-600 font-mono">{group.owners.length} leaf</span>
                    </div>
                    <div className="flex flex-col divide-y divide-gray-800/70">
                      {group.owners.map(owner => (
                        <div key={owner.id} className="px-4 py-3">
                          <div className="flex items-center justify-between gap-2 mb-2">
                            <span className="text-xs font-semibold text-gray-300 truncate">{owner.title}</span>
                            <span className="text-[10px] text-gray-600 font-mono">{(owner.milestones || []).length}</span>
                          </div>
                          {(owner.milestones || []).length === 0 ? (
                            <div className="text-[11px] text-gray-700 italic">No milestones defined.</div>
                          ) : (
                            <div className="flex flex-col gap-1.5">
                              {(owner.milestones || []).map(m => {
                                const item = milestoneItemMap[`${owner.id}|${m.id}`];
                                const isSelected = item?.key === selectedKey;
                                const isActive = !!(m.startDate && m.endDate && todayStr >= m.startDate && todayStr <= m.endDate);
                                const dateLabel = m.startDate && m.endDate
                                  ? m.startDate === m.endDate ? m.startDate : `${m.startDate} to ${m.endDate}`
                                  : 'no dates';
                                return (
                                  <div key={m.id}
                                    ref={isSelected ? selectedRowRef : null}
                                    onClick={() => chooseMilestone(owner.id, m.id)}
                                    className={`rounded border cursor-pointer transition-colors ${
                                      isSelected
                                        ? 'border-cyan-500/80 bg-cyan-950/20'
                                        : 'border-transparent bg-gray-950/30 hover:border-gray-700'
                                    }`}
                                    style={!isSelected && isActive ? { borderColor: `${item?.chipColor}60`, backgroundColor: `${item?.chipColor}08` } : undefined}>
                                    <div className="flex items-center gap-3 px-2 py-1.5">
                                      <span className="w-5 text-[10px] text-gray-600 tabular-nums flex-shrink-0">{(item?.idx || 0) + 1}.</span>
                                      <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 min-w-0">
                                          <span className="text-xs font-semibold truncate" style={{ color: item?.chipColor || '#06b6d4' }}>{m.title}</span>
                                          {item?.blocks.length > 1 && <span className="text-[9px] text-gray-600 flex-shrink-0">{item.blocks.length} blocks</span>}
                                          <span className="text-[9px] text-gray-700 truncate">{dateLabel}</span>
                                        </div>
                                        <div className="h-1 bg-gray-800 rounded-full overflow-hidden mt-1">
                                          <div className="h-full rounded-full transition-all duration-500"
                                            style={{ width: `${item?.pct || 0}%`, backgroundColor: item?.progressColor || '#6b7280' }} />
                                        </div>
                                      </div>
                                      <span className="text-[10px] font-mono tabular-nums flex-shrink-0" style={{ color: item?.progressColor || '#6b7280' }}>
                                        {item?.progress.done || 0}/{item?.progress.total || 0}
                                      </span>
                                    </div>
                                    <div className="ml-9 mr-2 pb-2 flex flex-wrap items-center gap-2">
                                      <label className="flex items-center gap-1 text-[10px] text-gray-600">
                                        <span>start</span>
                                        <input type="date"
                                          min={MILESTONE_CAL_START}
                                          max={MILESTONE_CAL_END}
                                          value={m.startDate || ''}
                                          onClick={e => e.stopPropagation()}
                                          onChange={e => handleDateInput(owner.id, m, 'start', e.target.value)}
                                          className="bg-gray-900 border border-gray-700 rounded px-1.5 py-1 text-[10px] text-gray-300 outline-none focus:border-cyan-500" />
                                      </label>
                                      <label className="flex items-center gap-1 text-[10px] text-gray-600">
                                        <span>end</span>
                                        <input type="date"
                                          min={MILESTONE_CAL_START}
                                          max={MILESTONE_CAL_END}
                                          value={m.endDate || ''}
                                          onClick={e => e.stopPropagation()}
                                          onChange={e => handleDateInput(owner.id, m, 'end', e.target.value)}
                                          className="bg-gray-900 border border-gray-700 rounded px-1.5 py-1 text-[10px] text-gray-300 outline-none focus:border-cyan-500" />
                                      </label>
                                      {(m.startDate || m.endDate) && (
                                        <button
                                          onClick={e => { e.stopPropagation(); clearMilestonePeriod(owner.id, m.id); }}
                                          className="text-[10px] text-gray-600 hover:text-red-400 transition-colors">
                                          clear
                                        </button>
                                      )}
                                    </div>
                                    <div className="ml-9 mr-2 pb-2 border-l border-gray-800/70 pl-2">
                                      {(item?.tasks || []).length === 0 ? (
                                        <div className="py-0.5 text-[11px] text-gray-700 italic">No tasks inside yet.</div>
                                      ) : (
                                        <div className="flex flex-col gap-0.5">
                                          {item.tasks.map(task => renderMilestoneTask(task, 0, m.id, isActive))}
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div ref={calendarScrollRef} className="min-w-0 overflow-y-auto p-4" style={{ flex: '0 0 60%' }}>
            <div className="sticky top-0 z-10 -mx-4 -mt-4 px-4 pt-4 pb-3 bg-gray-950/95 border-b border-gray-900">
              <div className="flex items-center justify-between gap-3">
                <div className="text-gray-700 tracking-widest text-xs">CALENDAR 2026-2033</div>
                <div className="min-w-0 text-right">
                  <div className="text-[10px] text-gray-600 font-mono truncate">
                    {selectedItem ? `${selectedItem.milestone.title} - ${selectedItem.owner.title}` : 'NO SELECTION'}
                  </div>
                </div>
              </div>
            </div>
            <div className="flex flex-col gap-4 pt-4">
              {milestoneMonths.map(renderCalendarMonth)}
            </div>
          </div>
        </div>
      );
    }

    // ── GoalTabsPanel ─────────────────────────────────────────────────────────

    function GoalTabsPanel({ goals, setGoals, mms, sirDoneMap }) {
      const [activeGoalId, setActiveGoalId] = useState(goals[0]?.id || null);
      const [adding, setAdding]             = useState(false);
      const [newTitle, setNewTitle]         = useState('');
      const [dragTabFromIdx, setDragTabFromIdx] = useState(null);
      const [dragTabTarget, setDragTabTarget]   = useState(null);
      const [tabBarDragOver, setTabBarDragOver] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { if (adding && inputRef.current) inputRef.current.focus(); }, [adding]);

      useEffect(() => {
        if (activeGoalId && !goals.find(g => g.id === activeGoalId)) {
          setActiveGoalId(goals[0]?.id || null);
        } else if (!activeGoalId && goals.length > 0) {
          setActiveGoalId(goals[0].id);
        }
      }, [goals]);

      function addGoal() {
        const v = newTitle.trim();
        if (!v) return;
        const newGoal = { id: uid(), title: v, children: [], completed: false, createdAt: Date.now(), scheduledDate: null, toLearn: [], mmTargets: {}, milestones: [] };
        setGoals(prev => [...prev, newGoal]);
        setActiveGoalId(newGoal.id);
        setNewTitle('');
        setAdding(false);
      }

      const handlers = {
        onToggle:          id              => setGoals(prev => toggleLeaf(prev, id)),
        onAddChild:        (pid, child)    => setGoals(prev => addChildAndTransferNotes(prev, pid, child)),
        onAddSubGoal:      (pid, subGoal)  => setGoals(prev => addSubGoalAndMigrateTasks(prev, pid, subGoal)),
        onDelete:              id              => setGoals(prev => deleteNode(prev, id)),
        onDeleteKeepChildren:  id              => setGoals(prev => deleteNodeKeepChildren(prev, id)),
        onUpdateTitle:     (id, title)     => setGoals(prev => updateTitle(prev, id, title)),
        onUpdateDate:      (id, date)      => setGoals(prev => updateDate(prev, id, date)),
        onUpdateToLearn:   (id, mmIds)     => setGoals(prev => updateGoalToLearn(prev, id, mmIds)),
        onUpdateMmTargets: (id, mmTargets) => setGoals(prev => updateGoalMmTargets(prev, id, mmTargets)),
        onAddMilestoneType:     (id, title) => setGoals(prev => addMilestoneType(prev, id, title)),
        onRenameMilestoneType:  (id, mid, title) => setGoals(prev => renameMilestoneType(prev, id, mid, title)),
        onDeleteMilestoneType:  (id, mid) => setGoals(prev => deleteMilestoneType(prev, id, mid)),
        onReorderMilestoneType: (id, mid, dir) => setGoals(prev => reorderMilestoneType(prev, id, mid, dir)),
        allGoals: goals,
        onAddLinkedTask:    (parentId, linkedTaskId) => setGoals(prev => addLinkedTask(prev, parentId, linkedTaskId)),
        onUnlinkTask:       id              => setGoals(prev => deleteNode(prev, id)),
        onNestGoal:         (draggedId, targetId) => { setGoals(prev => nestGoalIntoGoal(prev, draggedId, targetId)); setActiveGoalId(targetId); },
        onPromoteSubGoal:   subGoalId       => setGoals(prev => promoteSubGoalToUltimate(prev, subGoalId)),
        onNestSubGoal:      (draggedId, targetId) => setGoals(prev => nestSubGoalIntoSubGoal(prev, draggedId, targetId)),
        onNestTask:         (draggedId, targetId) => setGoals(prev => nestTaskIntoTask(prev, draggedId, targetId)),
        onArrangeTask:      (draggedId, targetId, insertBefore) => setGoals(prev => reorderSibling(prev, draggedId, targetId, insertBefore)),
        onAddLinkedSubGoal: (parentId, linkedGoalId) => setGoals(prev => addLinkedSubGoal(prev, parentId, linkedGoalId)),
        onAddNote:         (taskId, note)   => setGoals(prev => addNoteToTask(prev, taskId, note)),
        onRemoveNote:      (taskId, noteId) => setGoals(prev => removeNoteFromTask(prev, taskId, noteId)),
        onUpdateNote:      (taskId, noteId, fields) => setGoals(prev => updateNoteInTask(prev, taskId, noteId, fields)),
        mms,
        sirDoneMap,
      };

      const activeGoal = goals.find(g => g.id === activeGoalId);
      const activeIdx  = goals.findIndex(g => g.id === activeGoalId);
      const goalColor  = activeGoal ? PALETTE[activeIdx % PALETTE.length] : '#6366f1';

      return (
        <div className="flex-1 flex flex-col min-h-0">

          {/* Goal tab bar */}
          <div
            className={`flex items-stretch gap-0.5 px-4 pt-3 border-b overflow-x-auto flex-shrink-0 transition-colors ${tabBarDragOver ? 'border-violet-500 bg-violet-950/20' : 'border-gray-800'}`}
            onDragOver={e => { if (e.dataTransfer.types.includes('application/subgoal-id')) { e.preventDefault(); setTabBarDragOver(true); } }}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setTabBarDragOver(false); }}
            onDrop={e => {
              e.preventDefault();
              const subGoalId = e.dataTransfer.getData('application/subgoal-id');
              if (subGoalId) handlers.onPromoteSubGoal(subGoalId);
              setTabBarDragOver(false);
            }}
          >
            {tabBarDragOver && (
              <div className="flex items-center gap-1 px-2 self-center text-[10px] text-violet-400 animate-pulse flex-shrink-0">↑ drop to promote</div>
            )}
            {goals.map((g, idx) => {
              const color = PALETTE[idx % PALETTE.length];
              const p = countProgress(g, id => findNode(goals, id));
              const pct = p.total ? Math.round(p.done / p.total * 100) : 0;
              const isActive = g.id === activeGoalId;
              const t = dragTabTarget;
              const isNestTarget = t && t.idx === idx && t.action === 'nest';
              const isLineBefore = t && t.idx === idx && t.action === 'before';
              const isLineAfter  = t && t.idx === idx && t.action === 'after';
              const isDragging   = dragTabFromIdx === idx;
              return (
                <React.Fragment key={g.id}>
                  {isLineBefore && (
                    <div className="divider-bar-v" />
                  )}
                  <button
                    draggable
                    onDragStart={e => {
                      setDragTabFromIdx(idx);
                      e.dataTransfer.setData('application/ultimate-goal-id', g.id);
                      e.dataTransfer.effectAllowed = 'move';
                    }}
                    onDragOver={e => {
                      if (!e.dataTransfer.types.includes('application/ultimate-goal-id')) return;
                      e.preventDefault();
                      const rect = e.currentTarget.getBoundingClientRect();
                      const xPct = (e.clientX - rect.left) / rect.width;
                      const action = xPct < 0.3 ? 'before' : xPct > 0.7 ? 'after' : 'nest';
                      setDragTabTarget({ idx, action });
                    }}
                    onDragLeave={() => setDragTabTarget(null)}
                    onDragEnd={() => { setDragTabFromIdx(null); setDragTabTarget(null); }}
                    onDrop={e => {
                      e.preventDefault();
                      const draggedId = e.dataTransfer.getData('application/ultimate-goal-id');
                      if (draggedId && draggedId !== g.id && dragTabTarget) {
                        if (dragTabTarget.action === 'nest') {
                          handlers.onNestGoal(draggedId, g.id);
                        } else {
                          const fromIdx = goals.findIndex(x => x.id === draggedId);
                          let insertAt = dragTabTarget.action === 'before' ? idx : idx + 1;
                          if (fromIdx < insertAt) insertAt--;
                          setGoals(prev => {
                            const arr = [...prev];
                            const [moved] = arr.splice(fromIdx, 1);
                            arr.splice(insertAt, 0, moved);
                            return arr;
                          });
                        }
                      }
                      setDragTabFromIdx(null); setDragTabTarget(null);
                    }}
                    onClick={() => setActiveGoalId(g.id)}
                    className={`relative flex items-center gap-2 px-4 py-2.5 rounded-t-lg text-xs font-medium transition-all flex-shrink-0 border border-b-0 ${
                      isNestTarget
                        ? 'bg-violet-900/30 border-violet-600 text-violet-300'
                        : isActive
                          ? 'bg-gray-900 border-gray-700 text-gray-100 -mb-px z-10'
                          : 'bg-transparent border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-900/40'
                    }`}
                    style={{
                      ...(isActive && !isNestTarget ? { borderTopColor: color, borderTopWidth: 2 } : {}),
                      opacity: isDragging ? 0.4 : 1,
                      cursor: dragTabFromIdx !== null ? 'grabbing' : 'grab',
                    }}
                  >
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: color }} />
                    <span className="max-w-[130px] truncate">{g.title}</span>
                    {p.total > 0 && (
                      <span className="text-[10px] tabular-nums font-mono" style={{ color: pct === 100 ? '#10b981' : color }}>
                        {pct}%
                      </span>
                    )}
                  </button>
                  {isLineAfter && (
                    <div className="divider-bar-v" />
                  )}
                </React.Fragment>
              );
            })}

            {adding ? (
              <div className="flex items-center gap-1 px-2 pb-1 flex-shrink-0">
                <input ref={inputRef} value={newTitle} onChange={e => setNewTitle(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter')  addGoal();
                    if (e.key === 'Escape') { setAdding(false); setNewTitle(''); }
                  }}
                  placeholder="Goal name…"
                  className="bg-gray-800 border border-indigo-500 rounded px-2 py-1 text-xs text-white outline-none w-40 placeholder-gray-600" />
                <button onClick={addGoal} className="text-xs px-2 py-1 bg-indigo-700 hover:bg-indigo-600 text-white rounded">add</button>
                <button onClick={() => { setAdding(false); setNewTitle(''); }} className="text-xs text-gray-600 hover:text-gray-300 px-1">×</button>
              </div>
            ) : (
              <button onClick={() => setAdding(true)}
                className="px-4 py-2 text-xs text-gray-600 hover:text-indigo-400 transition-colors flex-shrink-0 self-center">
                + goal
              </button>
            )}
          </div>

          {/* Detail view */}
          {activeGoal ? (
            <div className="flex-1 flex min-h-0 overflow-hidden">

              {/* Left: original task management */}
              <div className="w-[40%] flex-shrink-0 overflow-y-auto border-r border-gray-800 py-5 px-4">
                <div className="flex items-center gap-2 mb-4 px-1">
                  <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: goalColor }} />
                  <span className="text-xs font-bold text-gray-300 tracking-wide truncate">{activeGoal.title}</span>
                </div>
                <GoalNode
                  key={activeGoal.id}
                  node={activeGoal}
                  depth={0}
                  handlers={handlers}
                  goalColor={goalColor}
                  inDetailView={true}
                />
              </div>

              {/* Right: progress panel */}
              <div className="flex-1 overflow-y-auto p-6">
                <div className="text-[10px] tracking-widest text-gray-700 mb-6">PROGRESSION</div>
                <GoalProgressPanel
                  node={activeGoal}
                  goalColor={goalColor}
                  mms={mms}
                  sirDoneMap={sirDoneMap}
                  goals={goals}
                />
              </div>
            </div>
          ) : (
            <div className="flex-1 flex items-center justify-center">
              <div className="text-center text-gray-700">
                <div className="text-3xl mb-3">◎</div>
                <div className="text-sm">No goals yet.</div>
                <button onClick={() => setAdding(true)}
                  className="mt-3 text-xs text-indigo-400 hover:text-indigo-300 transition-colors">
                  + add ultimate goal
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SupportingActionsPanel ────────────────────────────────────────────────

    function SupportingActionsPanel({ saActions, setSaActions, saEntries, setSaEntries }) {
      const [adding, setAdding]               = useState(false);
      const [newTitle, setNewTitle]           = useState('');
      const [newEmoji, setNewEmoji]           = useState('');
      const [newColor, setNewColor]           = useState(SA_COLORS[0]);
      const [newDesc, setNewDesc]             = useState('');
      const [expanded, setExpanded]           = useState({});
      const [addingSubTo, setAddingSubTo]     = useState(null);
      const [subTitle, setSubTitle]           = useState('');
      const [subEmoji, setSubEmoji]           = useState('');
      const [subTime, setSubTime]             = useState('09:00');
      const [subDur, setSubDur]               = useState(60);
      const [editingId, setEditingId]         = useState(null);
      const [editTitle, setEditTitle]         = useState('');
      const [editEmoji, setEditEmoji]         = useState('');
      const [editColor, setEditColor]         = useState(SA_COLORS[0]);
      const [editDesc, setEditDesc]           = useState('');
      const [editTime, setEditTime]           = useState('09:00');
      const [editDur, setEditDur]             = useState(60);
      const newTitleRef = useRef(null);
      const subTitleRef = useRef(null);
      const [openNotePanel, setOpenNotePanel] = useState(null);
      const [saNoteDrafts, setSaNoteDrafts]   = useState({});
      const [editingNoteIds, setEditingNoteIds] = useState({});

      useEffect(() => { if (adding && newTitleRef.current) newTitleRef.current.focus(); }, [adding]);
      useEffect(() => { if (addingSubTo && subTitleRef.current) subTitleRef.current.focus(); }, [addingSubTo]);

      const rootActions = saActions.filter(a => !a.parentId);

      function addAction() {
        const v = newTitle.trim();
        if (!v) return;
        setSaActions(prev => [...prev, {
          id: uid(), title: v, emoji: newEmoji.trim() || '◆', color: newColor,
          description: newDesc.trim(), parentId: null, createdAt: Date.now(),
        }]);
        setNewTitle(''); setNewEmoji(''); setNewDesc(''); setNewColor(SA_COLORS[0]); setAdding(false);
      }

      function addSubAction(parentId, parentColor) {
        const v = subTitle.trim();
        if (!v) return;
        const existingSubs = saActions.filter(a => a.parentId === parentId);
        const isFirst = existingSubs.length === 0;
        const parentAction = saActions.find(a => a.id === parentId);
        const parentNotes = isFirst ? (parentAction?.notes || []) : [];
        setSaActions(prev => {
          const newSub = {
            id: uid(), title: v, emoji: subEmoji.trim() || '◆', color: parentColor,
            time: subTime, duration: Number(subDur) || 60, parentId, createdAt: Date.now(),
            ...(parentNotes.length > 0 ? { notes: [...parentNotes] } : {}),
          };
          return prev.map(a =>
            a.id === parentId && parentNotes.length > 0 ? { ...a, notes: [] } : a
          ).concat([newSub]);
        });
        setSubTitle(''); setSubEmoji(''); setSubTime('09:00'); setSubDur(60); setAddingSubTo(null);
      }

      function deleteAction(id) {
        const children = saActions.filter(a => a.parentId === id);
        const msg = children.length > 0
          ? 'Delete this action and all its sub-actions and entries?'
          : 'Delete this action and all its entries?';
        if (!window.confirm(msg)) return;
        const ids = [id, ...children.map(a => a.id)];
        setSaActions(prev => prev.filter(a => !ids.includes(a.id)));
        setSaEntries(prev => prev.filter(e => !ids.includes(e.actionId)));
      }

      function toggleEntryDone(id) {
        setSaEntries(prev => prev.map(e => e.id === id ? { ...e, done: !e.done } : e));
      }

      function deleteEntry(id) {
        setSaEntries(prev => prev.filter(e => e.id !== id));
      }

      function startEdit(action, isDir) {
        setEditingId(action.id);
        setEditTitle(action.title);
        setEditEmoji(action.emoji === '◆' ? '' : action.emoji);
        setEditColor(action.color);
        setEditDesc(action.description || '');
        setEditTime(action.time || '09:00');
        setEditDur(action.duration || 60);
      }

      function commitEdit(isDir) {
        const v = editTitle.trim();
        if (v) {
          setSaActions(prev => prev.map(a => a.id === editingId
            ? { ...a, title: v, emoji: editEmoji.trim() || '◆', color: editColor,
                ...(isDir
                  ? { description: editDesc.trim() }
                  : { time: editTime, duration: Number(editDur) || 60 }) }
            : a));
        }
        setEditingId(null);
      }

      function renderScheduledDates(action) {
        const entries = saEntries.filter(e => e.actionId === action.id).sort((a, b) => a.date.localeCompare(b.date));
        if (entries.length === 0) return (
          <span className="text-[10px] text-gray-700 italic">no days yet — add from schedule</span>
        );
        return (
          <div className="flex flex-wrap gap-1">
            {entries.map(entry => (
              <span key={entry.id}
                className={`inline-flex items-center gap-0.5 text-[10px] font-mono px-1.5 py-0.5 rounded ${entry.done ? 'opacity-40' : ''}`}
                style={{ backgroundColor: action.color + '22', color: action.color }}>
                <input type="checkbox" checked={entry.done} onChange={() => toggleEntryDone(entry.id)}
                  className="cursor-pointer" style={{ accentColor: action.color, width: 9, height: 9 }} />
                <span className={entry.done ? 'line-through' : ''}>{entry.date.slice(5)}</span>
                <button onClick={() => deleteEntry(entry.id)}
                  className="hover:text-red-400 leading-none ml-0.5 opacity-60 hover:opacity-100">×</button>
              </span>
            ))}
          </div>
        );
      }

      return (
        <div>
          {rootActions.length === 0 && !adding && (
            <div className="text-center py-16 text-gray-700">
              <div className="text-3xl mb-3">◈</div>
              <div className="text-sm">No supporting actions yet.</div>
              <div className="text-xs mt-1 text-gray-600">Define an action, add sub-actions, then add to any day from the schedule.</div>
            </div>
          )}

          {rootActions.map(action => {
            const subActions = saActions.filter(a => a.parentId === action.id);
            const isDir      = subActions.length > 0 || addingSubTo === action.id;
            const isExpanded = !!expanded[action.id];
            const isEditing  = editingId === action.id;

            return (
              <div key={action.id} className="rounded-xl border mb-4"
                style={{ borderColor: action.color + '40', backgroundColor: action.color + '0a' }}>

                {/* Root action header */}
                <div className="flex items-start gap-2 px-4 py-3">
                  <div className="w-1 self-stretch rounded-full flex-shrink-0 mt-0.5" style={{ backgroundColor: action.color }} />
                  {isDir && <span className="text-[10px] text-gray-600 flex-shrink-0 select-none mt-1">{isExpanded ? '▼' : '▶'}</span>}

                  {isEditing ? (
                    <div className="flex-1 flex flex-col gap-2 min-w-0">
                      <div className="flex items-center gap-2">
                        <input value={editEmoji} onChange={e => setEditEmoji(e.target.value)} maxLength={2}
                          placeholder="icon" autoFocus
                          className="w-10 text-center bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-sm text-white outline-none flex-shrink-0" />
                        <input value={editTitle} onChange={e => setEditTitle(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') commitEdit(isDir); if (e.key === 'Escape') setEditingId(null); }}
                          className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-sm text-white outline-none min-w-0" />
                        {!isDir && (
                          <>
                            <input type="time" value={editTime} onChange={e => setEditTime(e.target.value)}
                              className="w-28 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-xs text-gray-300 outline-none flex-shrink-0" />
                            <div className="flex items-center gap-1 flex-shrink-0">
                              <input type="number" value={editDur} onChange={e => setEditDur(e.target.value)}
                                min={5} max={480} step={5}
                                className="w-14 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                              <span className="text-gray-600 text-xs">min</span>
                            </div>
                          </>
                        )}
                      </div>
                      {isDir && (
                        <textarea value={editDesc} onChange={e => setEditDesc(e.target.value)}
                          placeholder="Description / explanation…"
                          rows={2}
                          className="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-300 outline-none resize-none placeholder-gray-600 focus:border-gray-500" />
                      )}
                      <div className="flex items-center gap-2">
                        <div className="flex gap-1 flex-wrap">
                          {SA_COLORS.map(c => (
                            <button key={c} onClick={() => setEditColor(c)}
                              style={{ backgroundColor: c, width: 16, height: 16 }}
                              className={`rounded-full flex-shrink-0 ${editColor === c ? 'ring-2 ring-white ring-offset-1 ring-offset-gray-900' : ''}`} />
                          ))}
                        </div>
                        <button onClick={() => commitEdit(isDir)}
                          className="text-xs px-2 py-0.5 bg-gray-700 hover:bg-gray-600 text-white rounded">save</button>
                        <button onClick={() => setEditingId(null)}
                          className="text-xs text-gray-500 hover:text-gray-300">cancel</button>
                      </div>
                    </div>
                  ) : (
                    <>
                      <span className="text-base flex-shrink-0 leading-none mt-0.5">{action.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="flex-1 text-sm font-bold text-gray-100 truncate">{action.title}</span>
                          {isDir ? (
                            <span className="text-[10px] text-gray-600 flex-shrink-0">{subActions.length} sub-actions</span>
                          ) : (
                            <>
                              <span className="text-[10px] font-mono flex-shrink-0" style={{ color: action.color }}>
                                {formatTime12(action.time || '09:00')}
                              </span>
                              <span className="text-[10px] text-gray-600 flex-shrink-0">{action.duration || 60}min</span>
                            </>
                          )}
                          <button onClick={() => startEdit(action, isDir)}
                            className="text-gray-600 hover:text-gray-300 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">✎</button>
                          {!isDir && (
                            <button
                              onClick={() => setOpenNotePanel(prev => prev === action.id ? null : action.id)}
                              title="add note"
                              className={`text-[11px] px-0.5 py-0.5 rounded transition-colors ${(action.notes || []).length > 0 ? 'text-indigo-400' : 'text-gray-600 hover:text-indigo-400'}`}>📌</button>
                          )}
                          <button onClick={() => deleteAction(action.id)}
                            className="text-gray-600 hover:text-red-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">×</button>
                          <button onClick={() => setExpanded(prev => ({ ...prev, [action.id]: !isExpanded }))}
                            className="text-gray-600 hover:text-gray-300 text-xs px-1.5 py-0.5 rounded hover:bg-gray-700/60">
                            {isExpanded ? '▲' : '▼'}
                          </button>
                        </div>
                        {isDir && action.description && (
                          <div className="text-[11px] text-gray-500 mt-0.5 leading-snug">{action.description}</div>
                        )}
                        {!isDir && (action.notes || []).length > 0 && (
                          <div className="flex flex-wrap gap-1 mt-1">
                            {(action.notes || []).map(nt => (
                              <span key={nt.id} className="text-[10px] bg-gray-800/80 border border-indigo-500/40 rounded px-1.5 py-0.5 text-indigo-300 cursor-default leading-tight">
                                📌 {nt.title}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    </>
                  )}
                </div>

                {/* Expanded body */}
                {isExpanded && (
                  <div className="border-t px-4 pb-3 pt-2" style={{ borderColor: action.color + '30' }}>

                    {isDir ? (
                      /* Directory: list sub-actions */
                      <div className="flex flex-col gap-3">
                        {subActions.map(sub => {
                          const isEditingSub = editingId === sub.id;
                          return (
                            <div key={sub.id} className="pl-3 border-l-2 flex flex-col gap-1"
                              style={{ borderColor: action.color + '60' }}>
                              <div className="flex items-center gap-2">
                                {isEditingSub ? (
                                  <>
                                    <input value={editEmoji} onChange={e => setEditEmoji(e.target.value)} maxLength={2}
                                      placeholder="icon" autoFocus
                                      className="w-8 text-center bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-xs text-white outline-none" />
                                    <input value={editTitle} onChange={e => setEditTitle(e.target.value)}
                                      onKeyDown={e => { if (e.key === 'Enter') commitEdit(false); if (e.key === 'Escape') setEditingId(null); }}
                                      className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-xs text-white outline-none min-w-0" />
                                    <input type="time" value={editTime} onChange={e => setEditTime(e.target.value)}
                                      className="w-24 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                                    <div className="flex items-center gap-1">
                                      <input type="number" value={editDur} onChange={e => setEditDur(e.target.value)}
