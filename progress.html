    // ── MGPanel ───────────────────────────────────────────────────────────────

    function MGPanel({ mms, mgChanges, mgSchedule, setMgSchedule, kolbs }) {
      const t2mms = (mms || []).filter(m => String(m.type) === '2');
      const today = toDateStr(new Date());
      const [selDate, setSelDate] = useState(today);
      const isPast = selDate < today;

      const latestChange = Object.fromEntries(
        t2mms.map(mm => {
          const sorted = (mgChanges || [])
            .filter(c => c.mmId === mm.id)
            .sort((a, b) => b.date.localeCompare(a.date));
          return [mm.id, sorted[0] || null];
        })
      );

      const activeMGs = getMGsForDay(selDate, mgSchedule);
      const isCarried = !Object.prototype.hasOwnProperty.call(mgSchedule, selDate) && activeMGs.length > 0;

      const sortedMMs = [...t2mms].sort((a, b) => {
        const aActive = activeMGs.includes(a.id) ? 0 : 1;
        const bActive = activeMGs.includes(b.id) ? 0 : 1;
        if (aActive !== bActive) return aActive - bActive;
        const aRating = (a.rating != null) ? a.rating : Infinity;
        const bRating = (b.rating != null) ? b.rating : Infinity;
        return aRating - bRating;
      });

      if (!t2mms.length) {
        return (
          <div className="text-gray-600 text-center py-20 text-xs">
            No T2 Mind Maps yet. Add MGs in the KS02 Tracker.
          </div>
        );
      }

      return (
        <div className="p-6 max-w-2xl mx-auto w-full">
          <div className="flex items-center justify-between mb-4">
            <div className="text-gray-700 tracking-widest text-xs">MG — MINDSET / GOAL · T2 MIND MAPS</div>
            <button onClick={() => window.location.href = 'sir-ks02.html#mg'}
              className="bg-emerald-800 hover:bg-emerald-700 text-white px-3 py-1 rounded text-xs font-bold tracking-widest">SCHEDULE FOCUS →</button>
          </div>

          <div className="flex items-center gap-3 mb-6">
            <span className="text-gray-600 text-xs">SCHEDULE FOR</span>
            <input
              type="date"
              value={selDate}
              onChange={e => setSelDate(e.target.value)}
              className="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-white outline-none focus:border-emerald-600"
            />
            {isCarried && <span className="text-xs text-gray-600 italic">↑ carried from previous day</span>}
            {isPast && <span className="text-xs text-gray-600 italic">past · view only</span>}
          </div>

          <div className="flex flex-col gap-3">
            {sortedMMs.map(mm => {
              const mgText = isPast
                ? getMGTextForDay(mm.id, selDate, mgChanges)
                : (mm.currentMG || latestChange[mm.id]?.newMG || '');
              const active = activeMGs.includes(mm.id);
              const sessionCount = (kolbs||[]).filter(k => k.mmId === mm.id).length;
              return (
                <div key={mm.id} className={`border rounded-lg p-4 transition-colors ${active ? 'border-emerald-700 bg-emerald-950/30' : 'border-gray-800 bg-gray-900/50'}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <div className="text-xs text-gray-500 tracking-widest">{mm.name}</div>
                        {mm.rating != null && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-gray-800 text-gray-400">Lv {mm.rating}</span>}
                      </div>
                      {mgText
                        ? <div className="text-sm text-emerald-200 leading-snug">{mgText}</div>
                        : <div className="text-xs text-gray-600 italic">No MG yet</div>
                      }
                      {(() => {
                        const relevantChange = isPast
                          ? (mgChanges || []).filter(c => c.mmId === mm.id && c.date <= selDate).sort((a,b) => b.date.localeCompare(a.date))[0]
                          : latestChange[mm.id];
                        return relevantChange ? <div className="text-[10px] text-gray-600 mt-1">Updated {relevantChange.date}</div> : null;
                      })()}
                      {sessionCount > 0 && <div className="text-[10px] text-indigo-400 mt-1">{sessionCount} Kolb{sessionCount !== 1 ? 's' : ''} on this focus</div>}
                    </div>
                    <button
                      onClick={() => !isPast && toggleMGDay(selDate, mm.id, mgSchedule, setMgSchedule)}
                      disabled={isPast}
                      className={`flex-shrink-0 px-3 py-1 rounded text-xs font-bold transition-colors ${isPast ? 'bg-gray-800 text-gray-700 cursor-not-allowed' : active ? 'bg-emerald-700 hover:bg-emerald-600 text-white' : 'bg-gray-800 hover:bg-gray-700 text-gray-400'}`}
                    >
                      {active ? '✓ scheduled' : '+ schedule'}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── SchedulePanel ─────────────────────────────────────────────────────────

    function SchedulePanel({ goals, setGoals, saActions, saEntries, setSaEntries, mms, mmEntries, setMmEntries, sessions, mgChanges, mgSchedule, setMgSchedule, sourceDumps, selectedMilestone }) {
      const START_HOUR  = 4;
      const END_HOUR    = 23;
      const TIME_COL_W  = 56;
      const DAY_MIN_W   = 140;
      const TOTAL_W     = TIME_COL_W + 7 * DAY_MIN_W;
      const HOURS       = Array.from({ length: END_HOUR - START_HOUR }, (_, i) => START_HOUR + i);

      const STAGE_COLORS_SCHED = {1:'#7c3aed',2:'#2563eb',3:'#0891b2',4:'#0d9488',sir:'#059669',sir1:'#059669',sir2:'#059669',sir3:'#059669',sir4:'#059669',sir5:'#059669',finished:'#4b5563'};
      const stageLabel = s => s==='finished'?'FIN':s==='sir'?'SIR T1':s==='sir1'?'SIR T2':s==='sir2'?'SIR T3':s==='sir3'?'SIR T4':s==='sir4'?'SIR T5':s==='sir5'?'FIN':s?`S${s}`:null;
      const sirStageLabel = (mm) => { if (mm.ksStage==='sir') { const d=(sirDoneMap[mm.id]||0); return d>=5?'FIN':`SIR T${d+1}`; } return stageLabel(mm.ksStage); };

      const ultimateMMs = useMemo(() => {
        const ids = new Set(goals.flatMap(g => g.toLearn || []));
        return (mms || []).filter(m => ids.has(m.id));
      }, [goals, mms]);

      const sirDoneMap = useMemo(() => buildSirDoneMap(sessions), [sessions]);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const [anchor, setAnchor]   = useState(new Date(today));
      const [pickerDay, setPickerDay] = useState(null);
      const [mmPickerDay, setMmPickerDay] = useState(null);
      const [mgPickerDay, setMgPickerDay] = useState(null);
      const [search, setSearch]   = useState('');
      const [pickerView, setPickerView] = useState('tree');
      const [expandedNodes, setExpandedNodes] = useState(new Set());
      const [ghost, setGhost]     = useState(null);
      const [nowY, setNowY]       = useState(null);
      const [selectedForResize, setSelectedForResize] = useState(null);
      const [selectedForDrag,   setSelectedForDrag]   = useState(null);
      const [mouseDownInfo, setMouseDownInfo] = useState(null);
      const [pxPerHour, setPxPerHour] = useState(64);
      const pxPerHourRef = useRef(64);
      pxPerHourRef.current = pxPerHour;

      const selectedForDragRef   = useRef(null);
      const selectedForResizeRef = useRef(null);
      selectedForDragRef.current   = selectedForDrag;
      selectedForResizeRef.current = selectedForResize;

      const [schedView, setSchedView] = useState('timeline');
      const [calDate,   setCalDate]   = useState({ year: new Date().getFullYear(), month: new Date().getMonth() });
      const [selDay,    setSelDay]    = useState(null);

      const [timelineMode,  setTimelineMode]  = useState('week'); // 'week' | 'day'
      const [dayFocusDate,  setDayFocusDate]  = useState(new Date(today));
      const [openComments,     setOpenComments]     = useState(new Set());
      const [openMMComments,   setOpenMMComments]   = useState(new Set());
      const [noteDrafts,       setNoteDrafts]       = useState({});
      const [timelineEditingNoteIds, setTimelineEditingNoteIds] = useState({});
      const [viewingNote,      setViewingNote]      = useState(null);
      const [openSourcePicker, setOpenSourcePicker] = useState(new Set());
      const [sourcePickerMode, setSourcePickerMode] = useState({});
      const [viewingSource,    setViewingSource]    = useState(null);
      const [overlapFronts,    setOverlapFronts]    = useState({});

      const [priorityMatrix, setPriorityMatrix] = useState(() => {
        try { return JSON.parse(localStorage.getItem('trackPriorityMatrix') || '{}'); } catch { return {}; }
      });
      const [matrixDragId,   setMatrixDragId]   = useState(null);
      const [matrixDragOver, setMatrixDragOver] = useState(null);
      const [dissectModal, setDissectModal] = useState(null); // null | { goalId }
      const [dissectInput, setDissectInput] = useState('');

      const sessionsByDate = useMemo(() => {
        const m = {};
        (sessions || []).forEach(s => { (m[s.date] = m[s.date] || []).push(s); });
        return m;
      }, [sessions]);

      const mmColor = (id) => {
        const i = (mms || []).findIndex(m => m.id === id);
        return i >= 0 ? PALETTE[i % PALETTE.length] : "#6b7280";
      };

      const TOTAL_H = (END_HOUR - START_HOUR) * pxPerHour;

      const containerRef    = useRef(null);
      const headerRef       = useRef(null);
      const ghostRef        = useRef(null);
      const dragRef         = useRef(null);
      const resizeRef       = useRef(null);
      const daysRef         = useRef(null);
      const searchRef       = useRef(null);
      const shiftScrollRef  = useRef(0);
      const touchRef        = useRef(null); // { type, item, offsetY, startX, startY, moved }
      const longPressTimerRef = useRef(null);
      const mouseDownRef      = useRef(null); // { type, id, startX, startY } — desktop click-to-arm
      const suppressMouseRef  = useRef(false); // suppress synthetic mouse events after touch
      const scrollRafRef      = useRef(null);

      useEffect(() => { ghostRef.current = ghost; }, [ghost]);

      function getWeekStart(d) {
        const date = new Date(d);
        const day  = date.getDay();
        date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
        return date;
      }

      const weekStart = new Date(anchor);
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart);
        d.setDate(d.getDate() + i);
        return d;
      });
      const displayDays = timelineMode === 'week' ? days : [new Date(dayFocusDate)];
      useEffect(() => { daysRef.current = displayDays; });

      useEffect(() => {
        function update() {
          const now = new Date();
          const h = now.getHours() + now.getMinutes() / 60;
          setNowY(h >= START_HOUR && h < END_HOUR ? (h - START_HOUR) * pxPerHour : null);
        }
        update();
        const id = setInterval(update, 60000);
        return () => clearInterval(id);
      }, [pxPerHour]);

      // Scroll to 8 AM on mount, accounting for sticky header height
      useEffect(() => {
        if (containerRef.current) {
          const headerH = headerRef.current ? headerRef.current.offsetHeight : 0;
          containerRef.current.scrollTop = headerH + (8 - START_HOUR) * pxPerHour;
        }
      }, []);

      // Shift + wheel → navigate one day left or right (1 notch = 1 day)
      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const handler = (e) => {
          if (!e.shiftKey) return;
          e.preventDefault();
          shiftScrollRef.current += e.deltaY;
          if (Math.abs(shiftScrollRef.current) < 50) return;
          const dir = shiftScrollRef.current > 0 ? 1 : -1;
          shiftScrollRef.current = 0;
          setAnchor(prev => {
            const d = new Date(prev);
            d.setDate(d.getDate() + dir);
            return d;
          });
        };
        el.addEventListener('wheel', handler, { passive: false });
        return () => el.removeEventListener('wheel', handler);
      }, []);

      useEffect(() => {
        const EDGE_ZONE = 80;
        const MAX_SPEED = 12;

        function stopEdgeScroll() {
          if (scrollRafRef.current) {
            cancelAnimationFrame(scrollRafRef.current);
            scrollRafRef.current = null;
          }
        }

        function startEdgeScroll(clientY) {
          stopEdgeScroll();
          const el = containerRef.current;
          if (!el) return;
          const rect = el.getBoundingClientRect();
          const distTop    = clientY - rect.top;
          const distBottom = rect.bottom - clientY;
          let speed = 0;
          if (distTop < EDGE_ZONE && distTop >= 0) {
            speed = -MAX_SPEED * (1 - distTop / EDGE_ZONE);
          } else if (distBottom < EDGE_ZONE && distBottom >= 0) {
            speed = MAX_SPEED * (1 - distBottom / EDGE_ZONE);
          }
          if (speed === 0) return;
          function tick() {
            if (!containerRef.current) return;
            containerRef.current.scrollTop += speed;
            scrollRafRef.current = requestAnimationFrame(tick);
          }
          scrollRafRef.current = requestAnimationFrame(tick);
        }

        function handlePointerMove(clientX, clientY) {
          if (dragRef.current || resizeRef.current) {
            startEdgeScroll(clientY);
          } else {
            stopEdgeScroll();
          }
          // Handle resize drag
          if (resizeRef.current) {
            const { type, id, edge, startY, startDuration, startTotalMin } = resizeRef.current;
            const deltaY = clientY - startY;
            const deltaMins = Math.round((deltaY / pxPerHourRef.current * 60) / 5) * 5;
            if (edge === 'bottom') {
              const newDuration = Math.max(5, startDuration + deltaMins);
              resizeRef.current.previewDuration = newDuration;
              setGhost(g => ({ ...(g || { type, id, _resize: true }), duration: newDuration }));
            } else {
              const newDuration = Math.max(5, startDuration - deltaMins);
              const newTotalMin = Math.max(START_HOUR * 60, Math.min((END_HOUR - 1) * 60, startTotalMin + deltaMins));
              const hh = Math.floor(newTotalMin / 60);
              const mm = newTotalMin % 60;
              const newTime = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
              resizeRef.current.previewDuration = newDuration;
              resizeRef.current.previewTime = newTime;
              setGhost(g => ({ ...(g || { type, id, _resize: true }), duration: newDuration, time: newTime }));
            }
            return;
          }
          if (!dragRef.current || !containerRef.current) return;
          const el   = containerRef.current;
          const rect = el.getBoundingClientRect();

          // Y → 5-min snapped time (subtract sticky header height)
          const headerH  = headerRef.current ? headerRef.current.offsetHeight : 0;
          const relY     = clientY - rect.top + el.scrollTop - dragRef.current.offsetY - headerH;
          let totalMin   = Math.round(((relY / pxPerHourRef.current) * 60 + START_HOUR * 60) / 5) * 5;
          totalMin       = Math.max(START_HOUR * 60, Math.min((END_HOUR - 1) * 60, totalMin));
          const hh       = Math.floor(totalMin / 60);
          const mm       = totalMin % 60;
          const newTime  = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;

          // X → day column (account for horizontal scroll + sticky time col)
          const currDays = daysRef.current;
          if (!currDays) return;
          const relX   = clientX - rect.left + el.scrollLeft - TIME_COL_W;
          const colW   = (el.scrollWidth - TIME_COL_W) / currDays.length;
          const dayIdx = Math.max(0, Math.min(currDays.length - 1, Math.floor(relX / colW)));
          const newDate = toDateStr(currDays[dayIdx]);

          const prev = ghostRef.current;
          if (prev && (prev.date !== newDate || prev.time !== newTime)) {
            const next = { ...prev, date: newDate, time: newTime };
            ghostRef.current = next;
            setGhost(next);
          }
        }

        function handlePointerUp() {
          stopEdgeScroll();
          // Commit resize
          if (resizeRef.current) {
            const { type, id, previewDuration, previewTime, dateStr } = resizeRef.current;
            if (previewDuration !== undefined) {
              const update = { duration: previewDuration, ...(previewTime ? (type === 'goal' ? { scheduledTime: previewTime } : { time: previewTime }) : {}) };
              if (type === 'goal') {
                setGoals(prev => {
                  function applyUpdate(goals) {
                    return goals.map(g => {
                      if (g.id !== id) return { ...g, children: applyUpdate(g.children || []) };
                      if (g.taskType === 'routine' && previewTime && dateStr) {
                        const { scheduledTime, ...rest } = update;
                        return { ...g, ...rest, routineDates: { ...(g.routineDates || {}), [dateStr]: { ...(g.routineDates?.[dateStr] || {}), time: previewTime } } };
                      }
                      return { ...g, ...update };
                    });
                  }
                  return applyUpdate(prev);
                });
              }
              else if (type === 'entry') setSaEntries(prev => prev.map(e => e.id === id ? { ...e, ...update } : e));
              else if (type === 'mmEntry') setMmEntries(prev => prev.map(e => e.id === id ? { ...e, ...update } : e));
            }
            resizeRef.current = null;
            setGhost(null);
            return;
          }
          const g = ghostRef.current;
          const d = dragRef.current;
          if (g && d) {
            if (d.type === 'goal') {
              setGoals(prev => updateSchedule(prev, g.taskId, g.date, g.time));
            } else if (d.type === 'entry') {
              setSaEntries(prev => prev.map(e => e.id === g.entryId ? { ...e, date: g.date, time: g.time } : e));
            } else if (d.type === 'mmEntry') {
              setMmEntries(prev => prev.map(e => e.id === g.entryId ? { ...e, date: g.date, time: g.time } : e));
            }
          }
          dragRef.current  = null;
          ghostRef.current = null;
          setGhost(null);
        }

        function onMouseMove(e) {
          if (mouseDownRef.current) {
            const dx = Math.abs(e.clientX - mouseDownRef.current.startX);
            const dy = Math.abs(e.clientY - mouseDownRef.current.startY);
            if (dx > 8 || dy > 8) {
              dragRef.current = mouseDownRef.current.dragInfo;
              const g = mouseDownRef.current.ghostInfo;
              ghostRef.current = g;
              setGhost(g);
              mouseDownRef.current = null;
              setMouseDownInfo(null);
            }
          }
          handlePointerMove(e.clientX, e.clientY);
        }
        function onMouseUp() {
          mouseDownRef.current = null;
          setMouseDownInfo(null);
          handlePointerUp();
        }

        function onTouchMove(e) {
          const t = e.touches[0];
          if (resizeRef.current) {
            e.preventDefault();
            handlePointerMove(t.clientX, t.clientY);
            return;
          }
          if (!touchRef.current) return;
          const dx = Math.abs(t.clientX - touchRef.current.startX);
          const dy = Math.abs(t.clientY - touchRef.current.startY);
          if (!touchRef.current.moved && (dx > 8 || dy > 8)) {
            if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
            const { type, item, offsetY, blockHeight } = touchRef.current;
            const isArmed = (selectedForDragRef.current && selectedForDragRef.current.id === item.id) ||
                            (selectedForResizeRef.current && selectedForResizeRef.current.id === item.id);
            if (isArmed) {
              touchRef.current.moved = true;
              const HANDLE_PX = 16;
              const isExpandable = selectedForResizeRef.current && selectedForResizeRef.current.id === item.id;
              const inTopHandle = isExpandable && offsetY < HANDLE_PX;
              const inBottomHandle = isExpandable && blockHeight !== undefined && offsetY > blockHeight - HANDLE_PX;
              if (inTopHandle || inBottomHandle) {
                const timeStr = touchRef.current.resolvedTime || (type === 'goal' ? (item.scheduledTime || '09:00') : (item.time || '09:00'));
                const [th, tm] = timeStr.split(':').map(Number);
                resizeRef.current = { type, id: item.id, edge: inTopHandle ? 'top' : 'bottom', startY: t.clientY, startDuration: item.duration || 60, startTotalMin: th * 60 + tm, dateStr: touchRef.current.resizeDate };
              } else {
                if (type === 'goal') {
                  dragRef.current = { type: 'goal', taskId: item.id, offsetY };
                  const g = { type:'goal', taskId:item.id, date:item.scheduledDate, time:item.scheduledTime||'09:00', duration:item.duration||60 };
                  ghostRef.current = g; setGhost(g);
                } else if (type === 'entry') {
                  dragRef.current = { type: 'entry', entryId: item.id, offsetY };
                  const g = { type:'entry', entryId:item.id, date:item.date, time:item.time||'09:00', duration:item.duration||60 };
                  ghostRef.current = g; setGhost(g);
                } else if (type === 'mmEntry') {
                  dragRef.current = { type: 'mmEntry', entryId: item.id, offsetY };
                  const g = { type:'mmEntry', entryId:item.id, date:item.date, time:item.time||'09:00', duration:item.duration||60 };
                  ghostRef.current = g; setGhost(g);
                }
              }
            }
          }
          if (touchRef.current.moved) {
            e.preventDefault();
            handlePointerMove(t.clientX, t.clientY);
          }
        }

        function onTouchEnd() {
          stopEdgeScroll();
          if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
          if (resizeRef.current || (touchRef.current && touchRef.current.moved)) {
            handlePointerUp();
          } else if (touchRef.current) {
            const { type, item } = touchRef.current;
            if (selectedForResizeRef.current && selectedForResizeRef.current.id === item.id) {
              setSelectedForResize(null);
            } else if (selectedForDragRef.current && selectedForDragRef.current.id === item.id) {
              setSelectedForDrag(null);
            } else {
              setSelectedForDrag({ type, id: item.id });
              setSelectedForResize(null);
            }
            dragRef.current = null; ghostRef.current = null; setGhost(null);
          }
          touchRef.current = null;
          suppressMouseRef.current = true;
          setTimeout(() => { suppressMouseRef.current = false; }, 500);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup',   onMouseUp);
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend',  onTouchEnd);
        return () => {
          stopEdgeScroll();
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup',   onMouseUp);
          document.removeEventListener('touchmove', onTouchMove);
          document.removeEventListener('touchend',  onTouchEnd);
        };
      }, []);

      useEffect(() => {
        if (pickerDay) {
          if (searchRef.current) searchRef.current.focus();
          setExpandedNodes(getAllParentNodeIds(goals));
        } else {
          setExpandedNodes(new Set());
        }
      }, [pickerDay]);

      const allTasks   = flattenAll(goals).filter(t => !t.isLink);
      const inProgress = allTasks.filter(t => !isMilestoneNode(t) && getLeaves(t, goals).length > 0 && !isComplete(t, goals));
      const filtered   = search.trim()
        ? inProgress.filter(t => (t.title || '').toLowerCase().includes(search.toLowerCase()))
        : inProgress;
      const selectedMilestoneSchedule = useMemo(() => {
        let owner, milestone;

        if (selectedMilestone) {
          owner = findNode(goals || [], selectedMilestone.ownerId);
          if (!owner) return null;
          milestone = (owner.milestones || []).find(m => m.id === selectedMilestone.milestoneId);
          if (!milestone) return null;
        } else {
          const todayStr = toDateStr(new Date());
          let found = false;
          for (const goal of goals || []) {
            if (found) break;
            for (const o of collectMilestoneOwners(goal, goals || [])) {
              if (found) break;
              for (const m of o.milestones || []) {
                if (m.startDate && m.endDate && todayStr >= m.startDate && todayStr <= m.endDate) {
                  owner = o; milestone = m; found = true; break;
                }
              }
            }
          }
          if (!found) return null;
        }

        const taskMap = new Map();
        collectMilestoneBlocks(owner, milestone.id, goals || []).forEach(block => {
          flattenAll(block.children || []).forEach(task => {
            const target = task.isLink ? findNode(goals || [], task.linkedTaskId) : task;
            if (!target || isMilestoneNode(target) || getLeaves(target, goals || []).length === 0 || isComplete(target, goals || [])) return;
            if (!taskMap.has(target.id)) taskMap.set(target.id, target);
          });
        });

        return { owner, milestone, tasks: [...taskMap.values()] };
      }, [goals, selectedMilestone]);

      function taskMatchesSearch(task) {
        return !search.trim() || (task.title || '').toLowerCase().includes(search.toLowerCase());
      }

      function getPickerTaskGroups(dateStr) {
        const activeMilestone = selectedMilestoneSchedule &&
          selectedMilestoneSchedule.milestone.startDate &&
          selectedMilestoneSchedule.milestone.endDate &&
          dateStr >= selectedMilestoneSchedule.milestone.startDate &&
          dateStr <= selectedMilestoneSchedule.milestone.endDate;
        const activeTasks = activeMilestone
          ? selectedMilestoneSchedule.tasks.filter(taskMatchesSearch)
          : [];
        const activeIds = new Set(activeTasks.map(t => t.id));
        return {
          activeMilestone,
          activeTasks,
          normalTasks: filtered.filter(t => !activeIds.has(t.id)),
        };
      }

      function getAllParentNodeIds(nodes) {
        const ids = new Set();
        function traverse(node) {
          if (!node || node.isLink || isMilestoneNode(node) || isComplete(node, goals)) return;
          if (getLeaves(node, goals).length === 0) return;
          const visibleChildren = (node.children || []).flatMap(c => {
            if (!c || c.isLink) return [];
            if (isMilestoneNode(c)) {
              return (c.children || []).filter(sub =>
                sub && !sub.isLink && !isMilestoneNode(sub) && !isComplete(sub, goals) && getLeaves(sub, goals).length > 0
              );
            }
            if (isComplete(c, goals) || getLeaves(c, goals).length === 0) return [];
            return [c];
          });
          if (visibleChildren.length > 0) {
            ids.add(node.id);
            visibleChildren.forEach(traverse);
          }
        }
        (nodes || []).forEach(traverse);
        return ids;
      }

      function renderPickerTreeNode(node, depth, ds) {
        if (!node || node.isLink || isMilestoneNode(node) || isComplete(node, goals)) return null;
        if (getLeaves(node, goals).length === 0) return null;
        const visibleChildren = (node.children || []).flatMap(c => {
          if (!c || c.isLink) return [];
          if (isMilestoneNode(c)) {
            return (c.children || []).filter(sub =>
              sub && !sub.isLink && !isMilestoneNode(sub) && !isComplete(sub, goals) && getLeaves(sub, goals).length > 0
            );
          }
          if (isComplete(c, goals) || getLeaves(c, goals).length === 0) return [];
          return [c];
        });
        const hasChildren = visibleChildren.length > 0;
        const isExpanded = search.trim() ? true : expandedNodes.has(node.id);
        const isRoutine = node.taskType === 'routine';
        const leafCount = getLeaves(node, goals).length;
        const milestoneIds = selectedMilestoneSchedule ? new Set(selectedMilestoneSchedule.tasks.map(t => t.id)) : new Set();
        const isMilestoneTask = milestoneIds.has(node.id);
        if (search.trim()) {
          const selfMatch = (node.title || '').toLowerCase().includes(search.toLowerCase());
          if (!selfMatch && !hasChildren) return null;
        }
        return (
          <div key={node.id}>
            <div
              className="flex items-center hover:bg-gray-800 transition-colors"
              style={{ paddingLeft: `${depth * 14 + 10}px` }}
            >
              <div
                onClick={hasChildren
                  ? () => setExpandedNodes(prev => { const n = new Set(prev); n.has(node.id) ? n.delete(node.id) : n.add(node.id); return n; })
                  : undefined
                }
                className={`flex-1 flex items-center gap-1.5 py-1.5 text-xs min-w-0 ${hasChildren ? 'cursor-pointer' : ''}`}
              >
                {hasChildren
                  ? <span className="text-gray-600 w-3 text-center flex-shrink-0">{isExpanded ? '▾' : '▸'}</span>
                  : <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${isMilestoneTask ? 'bg-cyan-400' : isRoutine ? 'bg-amber-500' : 'bg-gray-600'}`} />
                }
                <span className={`flex-1 truncate ${isMilestoneTask ? 'text-cyan-200' : isRoutine ? 'text-amber-400' : hasChildren ? 'text-gray-200 font-medium' : 'text-gray-400'}`}>
                  {node.title}
                </span>
                {hasChildren && <span className="text-gray-600 text-[10px] ml-1 flex-shrink-0">{leafCount}</span>}
              </div>
              <button
                onClick={e => { e.stopPropagation(); assignToDate(node, ds); }}
                className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-gray-600 hover:text-indigo-400 transition-colors text-base mr-1"
              >+</button>
            </div>
            {hasChildren && isExpanded && visibleChildren.map(c => renderPickerTreeNode(c, depth + 1, ds))}
          </div>
        );
      }

      const tasksForDate = ds => allTasks.filter(t => {
        const scheduled = t.taskType === 'routine'
          ? (t.routineDates ? Object.prototype.hasOwnProperty.call(t.routineDates, ds) : t.scheduledDate === ds)
          : t.scheduledDate === ds;
        if (!scheduled || (isMilestoneNode(t) && getLeaves(t, goals).length === 0)) return false;
        if (t.children && t.children.length > 0 && t.children.some(c => c.scheduledDate === ds)) return false;
        return true;
      });
      const entriesForDate = ds => saEntries.filter(e => e.date === ds);
      const mmEntriesForDate = ds => (mmEntries || []).filter(e => e.date === ds);

      const blockMetaMap = useMemo(() => {
        const map = {};
        const walkGoals = (list) => list.forEach(g => {
          map[g.id] = { title: g.title, color: '#6366f1' };
          if (g.children?.length) walkGoals(g.children);
        });
        walkGoals(goals);
        saEntries.forEach(e => {
          const a = saActions.find(x => x.id === e.actionId);
          if (a) map[e.id] = { title: `${a.emoji} ${a.title}`, color: a.color };
        });
        (mmEntries || []).forEach(e => {
          const mm = (mms || []).find(m => m.id === e.mmId);
          if (mm) map[e.id] = { title: mm.name, color: mm.color || '#6366f1' };
        });
        return map;
      }, [goals, saEntries, saActions, mmEntries, mms]);

      const matrixDayIds = useMemo(() => {
        if (timelineMode !== 'day') return [];
        const ds = toDateStr(dayFocusDate);
        return [
          ...tasksForDate(ds).map(t => t.id),
          ...entriesForDate(ds).map(e => e.id),
          ...mmEntriesForDate(ds).map(e => e.id),
        ];
      }, [timelineMode, dayFocusDate, goals, saEntries, mmEntries]);

      const matrixByQuadrant = useMemo(() => {
        const buckets = { ui: [], niu: [], uni: [], nuni: [] };
        matrixDayIds.forEach(id => {
          const pm = priorityMatrix[id];
          const q  = pm?.quadrant || 'ui';
          buckets[q].push({ id, order: pm?.order ?? 0 });
        });
        Object.values(buckets).forEach(arr => arr.sort((a, b) => a.order - b.order));
        return buckets;
      }, [matrixDayIds, priorityMatrix]);

      function computeOverlapInfo(blocks) {
        const n = blocks.length;
        const adj = Array.from({length: n}, () => []);
        for (let i = 0; i < n; i++) {
          for (let j = i + 1; j < n; j++) {
            if (blocks[i].top < blocks[j].top + blocks[j].height &&
                blocks[j].top < blocks[i].top + blocks[i].height) {
              adj[i].push(j); adj[j].push(i);
            }
          }
        }
        const visited = new Set();
        const info = {};
        for (let i = 0; i < n; i++) {
          if (visited.has(i)) continue;
          const group = [], stack = [i];
          while (stack.length) {
            const v = stack.pop();
            if (visited.has(v)) continue;
            visited.add(v); group.push(v);
            adj[v].forEach(u => stack.push(u));
          }
          if (group.length < 2) continue;
          const orderedIds = group.sort((a, b) => a - b).map(idx => blocks[idx].id);
          const key = [...orderedIds].sort().join('|');
          orderedIds.forEach(id => { info[id] = { key, orderedIds }; });
        }
        return info;
      }

      function startDrag(e, task, dateStr) {
        if (suppressMouseRef.current) return;
        if (e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const rect = e.currentTarget.getBoundingClientRect();
        const date = task.taskType === 'routine' ? dateStr : task.scheduledDate;
        const time = (task.taskType === 'routine' ? task.routineDates?.[dateStr]?.time : task.scheduledTime) || '09:00';
        mouseDownRef.current = {
          startX: e.clientX, startY: e.clientY,
          dragInfo: { type: 'goal', taskId: task.id, offsetY: e.clientY - rect.top },
          ghostInfo: { type: 'goal', taskId: task.id, date, time, duration: task.duration || 60 }
        };
        setMouseDownInfo({ blockType: 'goal', id: task.id });
      }

      function startDragEntry(e, entry) {
        if (suppressMouseRef.current) return;
        if (e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const rect = e.currentTarget.getBoundingClientRect();
        mouseDownRef.current = {
          startX: e.clientX, startY: e.clientY,
          dragInfo: { type: 'entry', entryId: entry.id, offsetY: e.clientY - rect.top },
          ghostInfo: { type: 'entry', entryId: entry.id, date: entry.date, time: entry.time || '09:00', duration: entry.duration || 60 }
        };
        setMouseDownInfo({ blockType: 'entry', id: entry.id });
      }

      function startDragMMEntry(e, entry) {
        if (suppressMouseRef.current) return;
        if (e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const rect = e.currentTarget.getBoundingClientRect();
        mouseDownRef.current = {
          startX: e.clientX, startY: e.clientY,
          dragInfo: { type: 'mmEntry', entryId: entry.id, offsetY: e.clientY - rect.top },
          ghostInfo: { type: 'mmEntry', entryId: entry.id, date: entry.date, time: entry.time || '09:00', duration: entry.duration || 60 }
        };
        setMouseDownInfo({ blockType: 'mmEntry', id: entry.id });
      }

      function startResize(e, item, edge, type, resolvedTime, dateStr) {
        e.preventDefault();
        e.stopPropagation();
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const timeStr = resolvedTime || (type === 'goal' ? (item.scheduledTime || '09:00') : (item.time || '09:00'));
        const [th, tm] = timeStr.split(':').map(Number);
        const startTotalMin = th * 60 + tm;
        const startDuration = item.duration || 60;
        const id = item.id;
        resizeRef.current = { type, id, edge, startY: clientY, startDuration, startTotalMin, dateStr };
      }

      function assignToDate(task, dateStr) {
        const targets = isCountableLeaf(task) ? [task] : getLeaves(task, goals);
        setGoals(prev => targets.reduce((g, leaf, i) => {
          const h    = Math.min(9 + i, 21);
          const time = leaf.scheduledTime || `${String(h).padStart(2,'0')}:00`;
          return updateSchedule(g, leaf.id, dateStr, time);
        }, prev));
        setOpenComments(prev => { const n = new Set(prev); targets.forEach(leaf => n.add(leaf.id)); return n; });
        setPickerDay(null);
        setSearch('');
      }

      function unschedule(taskId) {
        setGoals(prev => updateSchedule(prev, taskId, null, null));
      }

      function unscheduleRoutineDate(goals, id, dateStr) {
        return goals.map(g => {
          if (g.id === id) {
            const { [dateStr]: _, ...rest } = g.routineDates || {};
            return { ...g, routineDates: rest };
          }
          return { ...g, children: unscheduleRoutineDate(g.children || [], id, dateStr) };
        });
      }

      function assignSAToDate(action, dateStr) {
        const newEntryId = uid();
        setSaEntries(prev => [...prev, {
          id: newEntryId, actionId: action.id, date: dateStr,
          time: action.time || '09:00', duration: action.duration || 60, done: false,
        }]);
        setOpenComments(prev => new Set(prev).add(newEntryId));
        setPickerDay(null);
        setSearch('');
      }

      function assignDirectoryToDate(parentAction, dateStr) {
        const children = saActions.filter(a => a.parentId === parentAction.id);
        setSaEntries(prev => {
          let next = [...prev];
          children.forEach(child => {
            next.push({
              id: uid(), actionId: child.id, date: dateStr,
              time: child.time || '09:00', duration: child.duration || 60, done: false,
            });
          });
          return next;
        });
        setPickerDay(null);
        setSearch('');
      }

      function assignMMToDate(mm, dateStr) {
        setMmEntries(prev => [...prev, { id: uid(), mmId: mm.id, date: dateStr, time: '09:00', duration: 60, done: false }]);
        setPickerDay(null);
        setSearch('');
      }

      const todayStr  = toDateStr(today);
      const weekLabel = `${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${
        days[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

      useEffect(() => {
        if (!matrixDayIds.length) return;
        setPriorityMatrix(prev => {
          let changed = false;
          const next = { ...prev };
          matrixDayIds.forEach((id, i) => {
            if (!next[id]) {
              next[id] = { quadrant: 'ui', order: Date.now() + i };
              changed = true;
            }
          });
          if (changed) {
            localStorage.setItem('trackPriorityMatrix', JSON.stringify(next));
            return next;
          }
          return prev;
        });
      }, [matrixDayIds]);

      const handleMatrixDragStart = (id) => setMatrixDragId(id);

      const handleMatrixDrop = (quadrant, targetId) => {
        if (!matrixDragId) return;
        setPriorityMatrix(prev => {
          const next = { ...prev };
          const inQ = (matrixByQuadrant[quadrant] || []).filter(x => x.id !== matrixDragId);
          let insertIdx = targetId ? inQ.findIndex(x => x.id === targetId) : inQ.length;
          if (insertIdx === -1) insertIdx = inQ.length;
          const final = [...inQ.slice(0, insertIdx), { id: matrixDragId }, ...inQ.slice(insertIdx)];
          final.forEach((item, idx) => {
            next[item.id] = { ...(next[item.id] || {}), quadrant, order: idx * 100 };
          });
          localStorage.setItem('trackPriorityMatrix', JSON.stringify(next));
          return next;
        });
        setMatrixDragId(null);
        setMatrixDragOver(null);
      };

      return (
        <div className="flex flex-col h-full">

          {/* Nav bar */}
          <div className="flex-shrink-0 flex items-center gap-2 px-3 py-2 border-b border-gray-800">
            {schedView === 'timeline' && <>

                <button onClick={() => { const d = new Date(anchor); d.setDate(d.getDate()+1); setAnchor(d); }}

                <button onClick={() => setAnchor(new Date(today))}

            </div>

          {schedView === 'timeline' && (

                    <div className={`text-[10px] tracking-widest ${isToday ? 'text-indigo-400' : 'text-gray-600'}`}>
                      {day.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}
                    </div>
                    <div className={`flex items-center justify-center w-7 h-7 text-sm font-bold rounded-full mt-0.5 ${
                      isToday ? 'bg-indigo-500 text-white' : 'text-gray-600'

                      {day.getDate()}
                    </div>
                    <div className="mt-1 flex gap-1.5">
                      <button
                        onClick={() => { setPickerDay(pickerDay === ds ? null : ds); setMmPickerDay(null); setMgPickerDay(null); setPickerView('tree'); }}
                        className="text-base w-7 h-7 flex items-center justify-center text-gray-700 hover:text-indigo-400 transition-colors rounded">+</button>
                      <button
                        onClick={() => { setMmPickerDay(mmPickerDay === ds ? null : ds); setPickerDay(null); setMgPickerDay(null); setSearch(''); }}
                        className="text-base w-7 h-7 flex items-center justify-center text-gray-700 hover:text-emerald-400 transition-colors rounded">◎</button>
                      {!isPast && <button
                        onClick={() => { setMgPickerDay(mgPickerDay === ds ? null : ds); setPickerDay(null); setMmPickerDay(null); setSearch(''); }}
                        className="text-base w-7 h-7 flex items-center justify-center text-gray-700 hover:text-emerald-400 transition-colors rounded">⊕</button>}
                    </div>

                    {/* MG list — top of day */}
                    {(() => {
                      const dayMGs  = getMGsForDay(ds, mgSchedule);
                      const carried = !Object.prototype.hasOwnProperty.call(mgSchedule, ds) && dayMGs.length > 0;
                      const t2mms   = (mms || []).filter(m => String(m.type) === '2');
                      if (!dayMGs.length) return null;
                      return (
                        <div className="w-full px-1 mt-1 text-left">
                          {carried && <div className="text-[9px] text-gray-600 italic text-center">↑ carried</div>}
                          <ul className="text-[10px] space-y-0.5 list-none">
                            {dayMGs.map(mmId => {

                              if (!mm) return null;
                              return (
                                <li key={mmId} className="flex items-start gap-1 group">
                                  <span className="text-emerald-600 mt-px flex-shrink-0">•</span>
                                  <span className="flex-1 text-emerald-300 leading-tight">{getMGTextForDay(mmId, ds, mgChanges) || mm.name}</span>
                                  {!isPast && <button
                                    onClick={() => toggleMGDay(ds, mmId, mgSchedule, setMgSchedule)}
                                    className="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 transition-opacity ml-1 flex-shrink-0 p-1"
                                  >×</button>}
                                </li>
                              );
                            })}
                          </ul>
                        </div>
                      );
                    })()}

                    {/* MG picker dropdown */}
                    {mgPickerDay === ds && !isPast && (() => {
                      const t2mms = (mms || []).filter(m => String(m.type) === '2');
                      const dayMGs = getMGsForDay(ds, mgSchedule);
                      return (
                        <>
                          <div className="fixed inset-0 z-20" onClick={() => setMgPickerDay(null)} />
                          <div className="absolute top-full left-0 mt-1 w-60 bg-gray-900 border border-gray-700 rounded-lg shadow-xl z-30 overflow-hidden">
                            <div className="px-3 py-1.5 text-[9px] text-gray-600 tracking-widest border-b border-gray-800">MG — MINDSET / GOAL</div>
                            <div className="max-h-52 overflow-y-auto">
                              {t2mms.length === 0 && (
                                <div className="px-3 py-3 text-[10px] text-gray-600">No T2 MGs yet.</div>
                              )}
                              {t2mms.map(mm => {
                                const active = dayMGs.includes(mm.id);
                                return (
                                  <button key={mm.id}
                                    onClick={() => toggleMGDay(ds, mm.id, mgSchedule, setMgSchedule)}
                                    className="w-full text-left px-3 py-2 text-xs hover:bg-gray-800 flex items-start gap-2 transition-colors">
                                    <span className={`flex-shrink-0 mt-px ${active ? 'text-emerald-400' : 'text-gray-600'}`}>
                                      {active ? '✓' : '○'}
                                    </span>
                                    <div className="flex-1 min-w-0">
                                      <div className="text-gray-500 text-[9px] truncate">{mm.name}</div>
                                      {mm.currentMG && <div className="text-emerald-300 text-[10px] leading-snug line-clamp-2">{mm.currentMG}</div>}
                                    </div>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        </>
                      );
                    })()}

                    {pickerDay === ds && (() => {
                      const { activeTasks, normalTasks } = getPickerTaskGroups(ds);
                      const rootActions = saActions.filter(a => !a.parentId);
                      const hasGoalTasks = activeTasks.length > 0 || normalTasks.length > 0;
                      const routineTasks = allTasks.filter(t => t.taskType === 'routine' && !isComplete(t, goals) && taskMatchesSearch(t));
                      return (
                        <>
                          <div className="fixed inset-0 z-40 bg-black/50" onClick={() => { setPickerDay(null); setMmPickerDay(null); setSearch(''); }} />
                          <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[440px] max-h-[78vh] bg-gray-900 border border-gray-700 rounded-xl shadow-2xl z-50 flex flex-col overflow-hidden">
                            {/* Search */}
                            <div className="p-3 border-b border-gray-800 flex-shrink-0">
                              <input ref={searchRef} value={search} onChange={e => setSearch(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Escape') { setPickerDay(null); setSearch(''); } }}
                                placeholder="filter tasks..."
                                className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-xs text-white outline-none placeholder-gray-600 focus:border-indigo-600" />
                            </div>
                            {/* Tab bar */}
                            <div className="flex border-b border-gray-800 flex-shrink-0">
                              <button
                                onClick={() => setPickerView('tree')}
                                className={`flex-1 py-2 text-xs font-medium tracking-wide transition-colors ${pickerView === 'tree' ? 'text-indigo-400 border-b-2 border-indigo-500 bg-indigo-950/20' : 'text-gray-600 hover:text-gray-400'}`}>
                                Directory
                              </button>
                              <button
                                onClick={() => setPickerView('routines')}
                                className={`flex-1 py-2 text-xs font-medium tracking-wide transition-colors ${pickerView === 'routines' ? 'text-amber-400 border-b-2 border-amber-500 bg-amber-950/20' : 'text-gray-600 hover:text-gray-400'}`}>
                                Routines
                              </button>
                              <button
                                onClick={() => setPickerView('milestone')}
                                className={`flex-1 py-2 text-xs font-medium tracking-wide transition-colors ${pickerView === 'milestone' ? 'text-cyan-400 border-b-2 border-cyan-500 bg-cyan-950/20' : 'text-gray-600 hover:text-gray-400'}`}>
                                Milestone
                              </button>
                            </div>
                            {/* Tab content */}
                            <div className="overflow-y-auto flex-1">
                              {pickerView === 'tree' && (
                                <>
                                  {/* Goals tree */}
                                  {(goals || []).map(g => renderPickerTreeNode(g, 0, ds))}
                                  {/* Actions */}
                                  {rootActions.length > 0 && (
                                    <>
                                      <div className="border-t border-gray-800/50 mt-1" />
                                      <div className="px-3 py-1 text-[9px] text-gray-600 tracking-widest border-b border-gray-800/50">ACTIONS</div>
                                      {rootActions.map(action => {
                                        const hasChildren = saActions.some(a => a.parentId === action.id);
                                        const childCount  = saActions.filter(a => a.parentId === action.id).length;
                                        return (
                                          <button key={action.id}
                                            onClick={() => hasChildren ? assignDirectoryToDate(action, ds) : assignSAToDate(action, ds)}
                                            className="w-full text-left px-3 py-1.5 text-xs hover:bg-gray-800 flex items-center gap-2 transition-colors">
                                            <span className="flex-shrink-0 leading-none">{action.emoji}</span>
                                            <span className="flex-1 truncate" style={{ color: action.color }}>{action.title}</span>
                                            {hasChildren
                                              ? <span className="text-gray-600 flex-shrink-0 text-[10px]">+{childCount} all</span>
                                              : <span className="text-gray-600 flex-shrink-0 font-mono text-[10px]">{formatTime12(action.time)}</span>
                                            }
                                          </button>
                                        );
                                      })}
                                    </>
                                  )}
                                  {!hasGoalTasks && rootActions.length === 0 && (goals || []).every(g => renderPickerTreeNode(g, 0, ds) === null) && (
                                    <div className="px-3 py-4 text-xs text-gray-600 text-center">nothing to add</div>
                                  )}
                                </>
                              )}
                              {pickerView === 'routines' && (
                                <>
                                  {routineTasks.length === 0
                                    ? <div className="px-3 py-4 text-xs text-gray-600 text-center">no routines</div>
                                    : routineTasks.map(t => (
                                        <button key={t.id} onClick={() => assignToDate(t, ds)}
                                          className="w-full text-left px-3 py-2 text-xs hover:bg-amber-950/30 flex items-center gap-2.5 transition-colors border-b border-gray-800/40">
                                          <span className="w-1.5 h-1.5 rounded-full bg-amber-500 flex-shrink-0" />
                                          <span className="text-amber-400 truncate flex-1">{t.title}</span>
                                        </button>

                                  }

                              )}
                              {pickerView === 'milestone' && (
                                <>
                                  {!selectedMilestoneSchedule
                                    ? <div className="px-3 py-4 text-xs text-gray-600 text-center">no active milestone</div>
                                    : (() => {
                                        const ms = selectedMilestoneSchedule;
                                        const msTasks = ms.tasks.filter(taskMatchesSearch);
                                        return (
                                          <>
                                            <div className="px-3 py-2 border-b border-cyan-900/50 bg-cyan-950/20 flex-shrink-0">
                                              <div className="text-xs text-cyan-300 font-medium truncate">{ms.milestone.title || ms.owner.title}</div>

                                                    </div>
                                                    <button
                                                      onClick={() => assignToDate(t, ds)}
                                                      className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-cyan-800 hover:text-cyan-400 transition-colors text-base mr-1"

                      );
                      const hasDue = dueMMIds.size > 0;
                      const visibleMMs = (mms || []).filter(m =>
                        !search.trim() || m.name.toLowerCase().includes(search.toLowerCase())
                      );

              <div className="flex items-center justify-between mb-4">
                <button onClick={()=>{setCalDate(p=>p.month===0?{year:p.year-1,month:11}:{...p,month:p.month-1});setSelDay(null);}}
                  className="text-gray-400 hover:text-white px-2">◀</button>
                <span className="font-bold tracking-widest">{MONTH_NAMES[calDate.month]} {calDate.year}</span>
                <button onClick={()=>{setCalDate(p=>p.month===11?{year:p.year+1,month:0}:{...p,month:p.month+1});setSelDay(null);}}
                  className="text-gray-400 hover:text-white px-2">▶</button>
              </div>
              <div className="grid grid-cols-7 mb-1">
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="text-center text-gray-500 text-xs py-1">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {Array(getFirstDay(calDate.year,calDate.month)).fill(null).map((_,i)=><div key={`e${i}`}/>)}
                {Array(getDIM(calDate.year,calDate.month)).fill(null).map((_,i)=>{
                  const day=i+1, ds=dStr(calDate.year,calDate.month,day);
                  const active=(sessionsByDate[ds]||[]).filter(s=>!s.done&&!s.skipped);
                  const isToday=ds===toDateStr(new Date()), isSel=selDay===day;
                  return (
                    <div key={day} onClick={()=>setSelDay(isSel?null:day)}
                      className={`rounded p-1 cursor-pointer min-h-[48px] border transition ${isSel?"border-white":"border-gray-800 hover:border-gray-600"} ${isToday?"bg-gray-800":"bg-gray-900"}`}>
                      <div className={`text-xs mb-1 ${isToday?"text-white font-bold":"text-gray-400"}`}>{day}</div>
                      <div className="flex flex-wrap gap-0.5">
                        {active.slice(0,4).map(s=><div key={s.id} className="w-2 h-2 rounded-full" style={{backgroundColor:mmColor(s.mmId)}}/>)}
                        {active.length>4&&<span className="text-gray-500 text-xs">+{active.length-4}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
              {selDay&&(()=>{
                const selSessions=sessionsByDate[dStr(calDate.year,calDate.month,selDay)]||[];
                return (
                  <div className="mt-4 bg-gray-900 rounded border border-gray-700 p-3">
                    <div className="font-bold mb-2 text-xs tracking-widest text-gray-300">{MONTH_NAMES[calDate.month]} {selDay}</div>
                    {!selSessions.length&&<div className="text-gray-500 text-xs">No sessions.</div>}
                    {selSessions.map(s=>{
                      const mm=(mms||[]).find(m=>m.id===s.mmId);
                      return (
                        <div key={s.id}
                          className="flex items-center justify-between rounded px-3 py-2 mb-1 bg-emerald-900 text-emerald-200">
                          <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full" style={{backgroundColor:mmColor(s.mmId)}}/>
                            <span className="font-bold">{mm?.name||"?"}</span>
                          </div>
                          <span className="text-xs opacity-70">rep {s.repIndex+1} · D{SIR_INTERVALS[s.repIndex]}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          )}

        {/* Dissect modal */}
        {dissectModal && (() => {
          const parent = flattenAll(goals).find(t => t.id === dissectModal.goalId);
          if (!parent) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={() => setDissectModal(null)}>
              <div className="bg-gray-900 border border-indigo-700/60 rounded-lg shadow-2xl w-80 max-w-full mx-4 overflow-hidden"
                onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800">
                  <div>
                    <div className="text-[9px] text-indigo-500 uppercase tracking-widest font-semibold">Dissect</div>
                    <div className="text-sm font-semibold text-white truncate">{parent.title}</div>
                  </div>
                  <button className="text-gray-500 hover:text-white text-base leading-none px-1" onClick={() => setDissectModal(null)}>×</button>
                </div>
                {(parent.children || []).length === 0 && (
                  <div className="px-4 py-2 text-[11px] text-gray-500 italic">Add sub-tasks below — they'll appear in the schedule instead.</div>
                )}
                {(parent.children || []).length > 0 && (
                  <div className="px-4 py-2 flex flex-col gap-1 max-h-48 overflow-y-auto">
                    {(parent.children || []).map(child => {
                      const childDone = isComplete(child, goals);
                      return (
                        <div key={child.id} className="flex items-center gap-2 group/child py-0.5">
                          <span className={`flex-1 text-xs truncate ${childDone ? 'line-through text-emerald-400' : 'text-gray-200'}`}>
                            {childDone ? '✓ ' : ''}{child.title}
                          </span>
                          <button
                            className="text-[10px] text-gray-600 hover:text-red-400 opacity-0 group-hover/child:opacity-100 transition-opacity leading-none flex-shrink-0"
                            onClick={() => setGoals(prev => removeDissectChild(prev, parent.id, child.id))}
                          >×</button>
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="px-4 py-3 border-t border-gray-800 flex gap-2">
                  <input
                    className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500"
                    placeholder="Sub-task name…"
                    value={dissectInput}
                    onChange={e => setDissectInput(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && dissectInput.trim()) {
                        setGoals(prev => addDissectChild(prev, parent.id, dissectInput.trim()));
                        setDissectInput('');
                      }
                    }}
                    autoFocus
                  />
                  <button
                    className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-3 py-1.5 rounded transition-colors disabled:opacity-40"
                    disabled={!dissectInput.trim()}
                    onClick={() => {
                      if (dissectInput.trim()) {
                        setGoals(prev => addDissectChild(prev, parent.id, dissectInput.trim()));
                        setDissectInput('');
                      }
                    }}
                  >Add</button>
                </div>
              </div>
            </div>
          );
        })()}
        </div>
      );
    }

    function computeLinActiveDays(linChanges) {
      const days = new Set();
      linChanges.forEach(lc => {
        if ((lc.items || []).some(it => it.change?.type !== 'stageRevert'))
          days.add(lc.date);
      });
      return days;
    }

    function calcStreak(activeDays) {
      const prev = d => { const dt = new Date(d); dt.setDate(dt.getDate()-1); return dt.toISOString().split('T')[0]; };
      const todayStr = new Date().toISOString().split('T')[0];
      let cursor = activeDays.has(todayStr) ? todayStr : prev(todayStr);
      if (!activeDays.has(cursor)) return 0;
      let n = 0;
      while (activeDays.has(cursor)) { n++; cursor = prev(cursor); }
      return n;
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [goals,      setGoals]      = useState(() => expandAnchorToLearn(_readP('goals', []), _readMMs()));
      const [saActions,  setSaActions]  = useState(() => _readP('saActions',  []));
      const [saEntries,  setSaEntries]  = useState(() => _readP('saEntries',  []));
      const [mmEntries,  setMmEntries]  = useState(() => _readP('mmEntries',  []));
      const [mms]                       = useState(() => _readMMs());
      const [kolbs]                     = useState(() => _readP('kolbs', []));
      const [sessions]                  = useState(() => _readSessions());
      const [mgChanges]                 = useState(() => _readMGChanges());
      const [sourceDumps]               = useState(() => _readP('sourceDumps', []));
      const [mgSchedule, setMgSchedule] = useState(() => _readP('mgSchedule', {}));
      const [linChanges] = useState(() => _readP('linChanges', []));
      const [tab, setTab] = useState(() => window.location.hash.slice(1) || 'progress');
      const [selectedMilestone, setSelectedMilestone] = useState(null);

      useEffect(() => { _writeP('goals',      goals);      }, [goals]);
      useEffect(() => { _writeP('saActions',  saActions);  }, [saActions]);
      useEffect(() => { _writeP('saEntries',  saEntries);  }, [saEntries]);
      useEffect(() => { _writeP('mmEntries',  mmEntries);  }, [mmEntries]);
      useEffect(() => { _writeP('mgSchedule', mgSchedule); }, [mgSchedule]);

      useEffect(() => {
        function onVisible() {
          if (document.visibilityState === 'visible') {
            const freshMms = _readMMs();
            setGoals(prev => expandAnchorToLearn(prev, freshMms));
          }
        }
        document.addEventListener('visibilitychange', onVisible);
        return () => document.removeEventListener('visibilitychange', onVisible);
      }, []);

      const sirDoneMap = useMemo(() => buildSirDoneMap(sessions), [sessions]);

      const allLeaves  = flattenAll(goals).filter(isCountableLeaf);
      const doneLeaves = allLeaves.filter(n => {
        const ac = computeMMAutoComplete(n, mms, sirDoneMap);
        return ac !== null ? ac : n.completed;
      });
      let mmDone = 0, mmTotal = 0;
      flattenAll(goals).forEach(n => {
        (n.toLearn || []).forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = (n.mmTargets || {})[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          mmDone += mmProgressFraction(mm, tgt, sirDoneMap);
          mmTotal++;
        });
      });
      const toActionFrac = allLeaves.length === 0 ? 0 : doneLeaves.length / allLeaves.length;
      const toLearnFrac  = mmTotal === 0 ? 0 : mmDone / mmTotal;
      const hasBoth = allLeaves.length > 0 && mmTotal > 0;
      const pct = hasBoth                ? Math.round((toActionFrac + toLearnFrac) / 2 * 100)
                : allLeaves.length > 0   ? Math.round(toActionFrac * 100)
                : mmTotal > 0            ? Math.round(toLearnFrac * 100)
                : 0;

      const streak = useMemo(
        () => calcStreak(computeLinActiveDays(linChanges)),
        [linChanges]
      );

      return (
        <div className="h-screen bg-gray-950 text-gray-300 font-mono flex flex-col text-xs overflow-hidden">

          {/* Header */}
          <header className="sticky top-0 z-10 flex items-center gap-0 border-b border-gray-800 bg-gray-900/90 backdrop-blur-sm">
            <a href="index.html"
              className="px-4 py-3 text-gray-600 hover:text-gray-300 transition-colors border-r border-gray-800">
              ← TRACK
            </a>

            <button
              onClick={() => setTab('progress')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'progress'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              PROGRESS
            </button>
            <button
              onClick={() => setTab('milestones')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'milestones'
                  ? 'border-cyan-500 text-cyan-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              MILESTONES
            </button>
            <button
              onClick={() => setTab('schedule')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'schedule'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              SCHEDULE
            </button>
            <button
              onClick={() => setTab('actions')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'actions'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              ACTIONS
            </button>
            <button
              onClick={() => setTab('mindmaps')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'mindmaps'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              MIND MAPS
            </button>
            <button
              onClick={() => setTab('mg')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'mg'
                  ? 'border-emerald-500 text-emerald-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              MG
            </button>

            <div className="flex items-center gap-4 ml-auto">
              {streak > 0 && (
                <div className="streak-fire">
                  <span className="streak-fire-num">{streak}</span>
                  <span className="streak-fire-label">DAY</span>
                </div>
              )}
              {allLeaves.length > 0 && (
                <div className="flex items-center gap-3 px-4">
                  <span className="text-gray-600">{doneLeaves.length}/{allLeaves.length}</span>
                  <div className="w-28 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div
                      className="h-full rounded-full transition-all duration-500"
                      style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#10b981' : '#6366f1' }}
                    />
                  </div>
                  <span className={`w-8 text-right tabular-nums ${pct === 100 ? 'text-emerald-400' : 'text-gray-600'}`}>
                    {pct}%
                  </span>
                </div>
              )}
            </div>
          </header>

          {/* Tab: PROGRESS */}
          {tab === 'progress' && (
            <div className="flex-1 flex flex-col min-h-0">
              <GoalTabsPanel goals={goals} setGoals={setGoals} mms={mms} sirDoneMap={sirDoneMap} />
            </div>
          )}

          {/* Tab: MILESTONES */}
          {tab === 'milestones' && (
            <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
              <MilestonesPanel
                goals={goals} setGoals={setGoals}
                selectedMilestone={selectedMilestone}
                setSelectedMilestone={setSelectedMilestone}
              />
            </div>
          )}

          {/* Tab: SCHEDULE */}
          {tab === 'schedule' && (
            <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
              <SchedulePanel
                goals={goals} setGoals={setGoals}
                saActions={saActions} saEntries={saEntries} setSaEntries={setSaEntries}
                mms={mms} mmEntries={mmEntries} setMmEntries={setMmEntries}
                sessions={sessions}
                mgChanges={mgChanges} mgSchedule={mgSchedule} setMgSchedule={setMgSchedule}
                sourceDumps={sourceDumps}
                selectedMilestone={selectedMilestone}
              />
            </div>
          )}

          {/* Tab: ACTIONS */}
          {tab === 'actions' && (
            <div className="flex-1 overflow-y-auto p-6 max-w-3xl mx-auto w-full">
              <div className="text-gray-700 tracking-widest mb-6 text-xs">
                SUPPORTING ACTIONS — define a time slot · add to any day from the schedule
              </div>
              <SupportingActionsPanel
                saActions={saActions} setSaActions={setSaActions}
                saEntries={saEntries} setSaEntries={setSaEntries}
              />
            </div>
          )}

          {/* Tab: MIND MAPS */}
          {tab === 'mindmaps' && (
            <div className="flex-1 overflow-y-auto p-6 max-w-3xl mx-auto w-full">
              <MindMapsPanel />
            </div>
          )}

          {/* Tab: MG */}
          {tab === 'mg' && (
            <div className="flex-1 overflow-y-auto">
              <MGPanel
                mms={mms}
                mgChanges={mgChanges}
                mgSchedule={mgSchedule}
                setMgSchedule={setMgSchedule}
                kolbs={kolbs}
              />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="notes-widget.js"></script>
</body>
</html>
