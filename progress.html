      const effectiveToLearn = isGoalContainer
        ? [...new Set(collectToLearn(node))]
        : (node.toLearn || []);
      const effectiveMmTargets = isGoalContainer
        ? collectMmTargets(node)
        : (node.mmTargets || {});

      // Collect unique leaves — resolve links to originals, deduplicate by canonical ID
      function collectUniqueLeaves() {
        function walk(n) {
          if ((n.children || []).length === 0) {
            if (n.isLink) {
              const orig = goals && findNode(goals, n.linkedTaskId);
              return orig ? [orig] : [];
            }
            return [n];
          }
          return (n.children || []).flatMap(c => walk(c));
        }
        const all = walk(node);
        const seen = new Set();
        return all.filter(leaf => {
          if (seen.has(leaf.id)) return false;
          seen.add(leaf.id);
          return true;
        });
      }

      const uniqueLeaves = collectUniqueLeaves();
      const uniqueDone   = uniqueLeaves.filter(l => l.completed).length;
      const uniqueTotal  = uniqueLeaves.length;
      const uniquePct    = uniqueTotal ? Math.round(uniqueDone / uniqueTotal * 100) : 0;
      const uniqueFull   = uniqueDone === uniqueTotal && uniqueTotal > 0;
      const uniqueColor  = uniqueFull ? '#10b981' : goalColor;

      // Per-subgoal MM targets helper
      function subGoalMmProg(sg) {
        const tl = sg.toLearn || [];
        const targets = sg.mmTargets || {};
        let done = 0, total = 0;
        tl.forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = targets[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          total++;
          done += mmProgressFraction(mm, tgt, sirDoneMap);
        });
        return { done, total };
      }

      // MM progress for UNIQUE TOTAL view (deduplicated across subgoals)
      const mmProg = (() => {
        let done = 0, total = 0;
        effectiveToLearn.forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = effectiveMmTargets[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          total++;
          done += mmProgressFraction(mm, tgt, sirDoneMap);
        });
        return { done, total };
      })();

      const mmPct = mmProg.total > 0 ? mmProg.done / mmProg.total * 100 : null;
      const combinedUniquePct =
        uniqueTotal > 0 && mmPct !== null ? Math.round((uniquePct + mmPct) / 2)
        : mmPct !== null                  ? Math.round(mmPct)
        :                                    uniquePct;

      const activeView = isGoalContainer ? viewType : 'unique';
      const heroColor  = activeView === 'subgoal' ? displayColor : uniqueColor;
      const heroPct    = activeView === 'subgoal' ? pct : combinedUniquePct;
      const heroProg   = activeView === 'subgoal' ? prog : { done: uniqueDone, total: uniqueTotal };

      return (
        <div className="flex flex-col gap-7">

          {/* View toggle */}
          {isGoalContainer && (
            <div className="flex gap-1">
              <button onClick={() => setViewType('subgoal')}
                className={`px-3 py-1 text-[10px] rounded-full tracking-wider transition-colors ${
                  viewType === 'subgoal' ? 'bg-indigo-700 text-white' : 'bg-gray-800 text-gray-500 hover:text-gray-300'}`}>
                BY SUBGOAL
              </button>
              <button onClick={() => setViewType('unique')}
                className={`px-3 py-1 text-[10px] rounded-full tracking-wider transition-colors ${
                  viewType === 'unique' ? 'bg-indigo-700 text-white' : 'bg-gray-800 text-gray-500 hover:text-gray-300'}`}>
                UNIQUE TOTAL
              </button>
            </div>
          )}

          {/* Hero ring + stats */}
          <div className="flex items-center gap-6">
            <div className="relative flex-shrink-0">
              <svg width={130} height={130} viewBox="0 0 130 130">
                <circle cx={65} cy={65} r={r} fill="none" stroke="#1e293b" strokeWidth={14}/>
                <circle cx={65} cy={65} r={r} fill="none"
                  stroke={heroColor} strokeWidth={14}
                  strokeLinecap="round"
                  strokeDasharray={`${(heroPct / 100) * circ} ${circ}`}
                  transform="rotate(-90 65 65)"
                  style={{ transition: 'stroke-dasharray 0.6s ease' }}/>
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-3xl font-black tabular-nums leading-none" style={{ color: heroColor }}>{heroPct}%</span>
                <span className="text-[10px] text-gray-600 mt-0.5 font-mono">{heroProg.done}/{heroProg.total}</span>
              </div>
            </div>
            <div className="flex flex-col gap-2.5 flex-1">
              <div className="flex gap-2">
                <StatCard label="TOTAL"  value={heroProg.total}                         color="#6b7280" />
                <StatCard label="DONE"   value={heroProg.done}                          color={heroColor} />
                <StatCard label="LEFT"   value={heroProg.total - heroProg.done}         color={heroProg.total - heroProg.done === 0 ? '#10b981' : '#f59e0b'} />
              </div>
              <div className="h-2 bg-gray-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-500"
                  style={{ width: `${heroPct}%`, backgroundColor: heroColor }} />
              </div>
            </div>
          </div>

          {/* BY SUBGOAL: per-subgoal mini rings */}
          {activeView === 'subgoal' && subGoals.length > 0 && (() => {
            const rS = 28, circS = 2 * Math.PI * rS;
            return (
              <div>
                <div className="text-[10px] tracking-widest text-gray-600 mb-3">SUBGOALS</div>
                <div className="flex flex-col gap-3">
                  {subGoals.map(sg => {
                    const sp = countProgress(sg);
                    const spPct = sp.total ? Math.round(sp.done / sp.total * 100) : 0;
                    const spFull = sp.done === sp.total && sp.total > 0;
                    const spColor = spFull ? '#10b981' : goalColor;
                    const sgMm = subGoalMmProg(sg);
                    return (
                      <div key={sg.id} className="flex items-center gap-4 px-3 py-2.5 rounded-xl bg-gray-900/40">
                        <div className="relative flex-shrink-0">
                          <svg width={70} height={70} viewBox="0 0 70 70">
                            <circle cx={35} cy={35} r={rS} fill="none" stroke="#1e293b" strokeWidth={8}/>
                            <circle cx={35} cy={35} r={rS} fill="none"
                              stroke={spColor} strokeWidth={8}
                              strokeLinecap="round"
                              strokeDasharray={`${(spPct / 100) * circS} ${circS}`}
                              transform="rotate(-90 35 35)"
                              style={{ transition: 'stroke-dasharray 0.5s ease' }}/>
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-sm font-bold tabular-nums leading-none" style={{ color: spColor }}>{spPct}%</span>
                          </div>
                        </div>
                        <div className="flex flex-col gap-1 flex-1 min-w-0">
                          <span className="text-xs font-semibold text-gray-200 truncate">{sg.title}</span>
                          <div className="flex items-center gap-3 flex-wrap">
                            <span className="text-[10px] font-mono text-gray-500 tabular-nums">{sp.done}/{sp.total} tasks</span>
                            {sgMm.total > 0 && (
                              <span className={`text-[10px] font-mono tabular-nums ${sgMm.done >= sgMm.total ? 'text-emerald-500' : 'text-purple-400'}`}>
                                {Math.round(sgMm.done * 10) / 10}/{sgMm.total} learned
                              </span>
                            )}
                          </div>
                          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden mt-0.5">
                            <div className="h-full rounded-full transition-all duration-500"
                              style={{ width: `${spPct}%`, backgroundColor: spColor }} />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* UNIQUE TOTAL: deduplicated task list */}
          {activeView === 'unique' && uniqueLeaves.length > 0 && (
            <div>
              <div className="flex items-center justify-between mb-3">
                <span className="text-[10px] tracking-widest text-gray-600">UNIQUE TASKS</span>
                <span className="text-[10px] text-gray-600 font-mono">{uniqueDone}/{uniqueTotal}</span>
              </div>
              <div className="flex flex-col gap-0.5 pr-1">
                {uniqueLeaves.map((leaf, i) => (
                  <div key={leaf.id || i}
                    className={`flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg transition-colors ${leaf.completed ? 'bg-gray-900/30' : 'bg-gray-900/60'}`}>
                    <span className="flex-shrink-0 w-3 h-3 rounded-sm transition-all"
                      style={{
                        backgroundColor: leaf.completed ? uniqueColor : 'transparent',
                        border: `1.5px solid ${leaf.completed ? uniqueColor : '#4b5563'}`,
                      }} />
                    <span className={`text-xs flex-1 truncate ${leaf.completed ? 'line-through text-gray-600' : 'text-gray-300'}`}>
                      {leaf.title}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* TO LEARN (unique total view) */}
          {activeView === 'unique' && effectiveToLearn.length > 0 && (
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] tracking-widest text-gray-600">TO LEARN</span>
                {mmProg.total > 0 && (
                  <span className="text-[10px] font-mono text-gray-600">{Math.round(mmProg.done * 10) / 10}/{mmProg.total} targets met</span>
                )}
              </div>
              {mmProg.total > 0 && (
                <div className="h-2 bg-gray-800 rounded-full overflow-hidden mb-2">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{ width: `${Math.round(mmProg.done/mmProg.total*100)}%`, backgroundColor: mmProg.done === mmProg.total ? '#10b981' : '#8b5cf6' }} />
                </div>
              )}
              <div className="flex flex-col gap-1">
                {effectiveToLearn.map(mmId => {
                  const mm = (mms || []).find(m => m.id === mmId);
                  if (!mm) return null;
                  const tgt = effectiveMmTargets[mmId] || {};
                  const hasTarget = !!(tgt.stage || tgt.level);
                  const met = hasTarget && isMMTargetMet(mm, tgt, sirDoneMap);
                  return (
                    <div key={mmId} className="flex items-center gap-2">
                      <MindMapsBadge mm={mm} sirDoneMap={sirDoneMap} />
                      {hasTarget && (
                        <span className={`text-[10px] ml-auto ${met ? 'text-emerald-400' : 'text-amber-400'}`}>
                          {met ? '✓ met' : '○ unmet'}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {heroProg.total === 0 && (
            <div className="text-center py-8 text-gray-700 text-xs italic">Add tasks in the left panel to track progress here.</div>
          )}
        </div>
      );
    }

    // ── GoalTabsPanel ─────────────────────────────────────────────────────────

    function GoalTabsPanel({ goals, setGoals, mms, sirDoneMap }) {
      const [activeGoalId, setActiveGoalId] = useState(goals[0]?.id || null);
      const [adding, setAdding]             = useState(false);
      const [newTitle, setNewTitle]         = useState('');
      const [dragTabFromIdx, setDragTabFromIdx] = useState(null);
      const [dragTabTarget, setDragTabTarget]   = useState(null);
      const [tabBarDragOver, setTabBarDragOver] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { if (adding && inputRef.current) inputRef.current.focus(); }, [adding]);

      useEffect(() => {
        if (activeGoalId && !goals.find(g => g.id === activeGoalId)) {
          setActiveGoalId(goals[0]?.id || null);
        } else if (!activeGoalId && goals.length > 0) {
          setActiveGoalId(goals[0].id);
        }
      }, [goals]);

      function addGoal() {
        const v = newTitle.trim();
        if (!v) return;
        const newGoal = { id: uid(), title: v, children: [], completed: false, createdAt: Date.now(), scheduledDate: null, toLearn: [], mmTargets: {} };
        setGoals(prev => [...prev, newGoal]);
        setActiveGoalId(newGoal.id);
        setNewTitle('');
        setAdding(false);
      }

      const handlers = {
        onToggle:          id              => setGoals(prev => toggleLeaf(prev, id)),
        onAddChild:        (pid, child)    => setGoals(prev => addChild(prev, pid, child)),
        onAddSubGoal:      (pid, subGoal)  => setGoals(prev => addSubGoalAndMigrateTasks(prev, pid, subGoal)),
        onDelete:          id              => setGoals(prev => deleteNode(prev, id)),
        onUpdateTitle:     (id, title)     => setGoals(prev => updateTitle(prev, id, title)),
        onUpdateDate:      (id, date)      => setGoals(prev => updateDate(prev, id, date)),
        onUpdateToLearn:   (id, mmIds)     => setGoals(prev => updateGoalToLearn(prev, id, mmIds)),
        onUpdateMmTargets: (id, mmTargets) => setGoals(prev => updateGoalMmTargets(prev, id, mmTargets)),
        allGoals: goals,
        onAddLinkedTask:    (parentId, linkedTaskId) => setGoals(prev => addLinkedTask(prev, parentId, linkedTaskId)),
        onUnlinkTask:       id              => setGoals(prev => deleteNode(prev, id)),
        onNestGoal:         (draggedId, targetId) => { setGoals(prev => nestGoalIntoGoal(prev, draggedId, targetId)); setActiveGoalId(targetId); },
        onPromoteSubGoal:   subGoalId       => setGoals(prev => promoteSubGoalToUltimate(prev, subGoalId)),
        onAddLinkedSubGoal: (parentId, linkedGoalId) => setGoals(prev => addLinkedSubGoal(prev, parentId, linkedGoalId)),
        mms,
        sirDoneMap,
      };

      const activeGoal = goals.find(g => g.id === activeGoalId);
      const activeIdx  = goals.findIndex(g => g.id === activeGoalId);
      const goalColor  = activeGoal ? PALETTE[activeIdx % PALETTE.length] : '#6366f1';

      return (
        <div className="flex-1 flex flex-col min-h-0">

          {/* Goal tab bar */}
          <div
            className={`flex items-stretch gap-0.5 px-4 pt-3 border-b overflow-x-auto flex-shrink-0 transition-colors ${tabBarDragOver ? 'border-violet-500 bg-violet-950/20' : 'border-gray-800'}`}
            onDragOver={e => { if (e.dataTransfer.types.includes('application/subgoal-id')) { e.preventDefault(); setTabBarDragOver(true); } }}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setTabBarDragOver(false); }}
            onDrop={e => {
              e.preventDefault();
              const subGoalId = e.dataTransfer.getData('application/subgoal-id');
              if (subGoalId) handlers.onPromoteSubGoal(subGoalId);
              setTabBarDragOver(false);
            }}
          >
            {tabBarDragOver && (
              <div className="flex items-center gap-1 px-2 self-center text-[10px] text-violet-400 animate-pulse flex-shrink-0">↑ drop to promote</div>
            )}
            {goals.map((g, idx) => {
              const color = PALETTE[idx % PALETTE.length];
              const p = countProgress(g);
              const pct = p.total ? Math.round(p.done / p.total * 100) : 0;
              const isActive = g.id === activeGoalId;
              const t = dragTabTarget;
              const isNestTarget = t && t.idx === idx && t.action === 'nest';
              const isLineBefore = t && t.idx === idx && t.action === 'before';
              const isLineAfter  = t && t.idx === idx && t.action === 'after';
              const isDragging   = dragTabFromIdx === idx;
              return (
                <React.Fragment key={g.id}>
                  {isLineBefore && (
                    <div className="divider-bar-v" />
                  )}
                  <button
                    draggable
                    onDragStart={e => {
                      setDragTabFromIdx(idx);
                      e.dataTransfer.setData('application/ultimate-goal-id', g.id);
                      e.dataTransfer.effectAllowed = 'move';
                    }}
                    onDragOver={e => {
                      if (!e.dataTransfer.types.includes('application/ultimate-goal-id')) return;
                      e.preventDefault();
                      const rect = e.currentTarget.getBoundingClientRect();
                      const xPct = (e.clientX - rect.left) / rect.width;
                      const action = xPct < 0.3 ? 'before' : xPct > 0.7 ? 'after' : 'nest';
                      setDragTabTarget({ idx, action });
                    }}
                    onDragLeave={() => setDragTabTarget(null)}
                    onDragEnd={() => { setDragTabFromIdx(null); setDragTabTarget(null); }}
                    onDrop={e => {
                      e.preventDefault();
                      const draggedId = e.dataTransfer.getData('application/ultimate-goal-id');
                      if (draggedId && draggedId !== g.id && dragTabTarget) {
                        if (dragTabTarget.action === 'nest') {
                          handlers.onNestGoal(draggedId, g.id);
                        } else {
                          const fromIdx = goals.findIndex(x => x.id === draggedId);
                          let insertAt = dragTabTarget.action === 'before' ? idx : idx + 1;
                          if (fromIdx < insertAt) insertAt--;
                          setGoals(prev => {
                            const arr = [...prev];
                            const [moved] = arr.splice(fromIdx, 1);
                            arr.splice(insertAt, 0, moved);
                            return arr;
                          });
                        }
                      }
                      setDragTabFromIdx(null); setDragTabTarget(null);
                    }}
                    onClick={() => setActiveGoalId(g.id)}
                    className={`relative flex items-center gap-2 px-4 py-2.5 rounded-t-lg text-xs font-medium transition-all flex-shrink-0 border border-b-0 ${
                      isNestTarget
                        ? 'bg-violet-900/30 border-violet-600 text-violet-300'
                        : isActive
                          ? 'bg-gray-900 border-gray-700 text-gray-100 -mb-px z-10'
                          : 'bg-transparent border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-900/40'
                    }`}
                    style={{
                      ...(isActive && !isNestTarget ? { borderTopColor: color, borderTopWidth: 2 } : {}),
                      opacity: isDragging ? 0.4 : 1,
                      cursor: dragTabFromIdx !== null ? 'grabbing' : 'grab',
                    }}
                  >
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: color }} />
                    <span className="max-w-[130px] truncate">{g.title}</span>
                    {p.total > 0 && (
                      <span className="text-[10px] tabular-nums font-mono" style={{ color: pct === 100 ? '#10b981' : color }}>
                        {pct}%
                      </span>
                    )}
                  </button>
                  {isLineAfter && (
                    <div className="divider-bar-v" />
                  )}
                </React.Fragment>
              );
            })}

            {adding ? (
              <div className="flex items-center gap-1 px-2 pb-1 flex-shrink-0">
                <input ref={inputRef} value={newTitle} onChange={e => setNewTitle(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter')  addGoal();
                    if (e.key === 'Escape') { setAdding(false); setNewTitle(''); }
                  }}
                  placeholder="Goal name…"
                  className="bg-gray-800 border border-indigo-500 rounded px-2 py-1 text-xs text-white outline-none w-40 placeholder-gray-600" />
                <button onClick={addGoal} className="text-xs px-2 py-1 bg-indigo-700 hover:bg-indigo-600 text-white rounded">add</button>
                <button onClick={() => { setAdding(false); setNewTitle(''); }} className="text-xs text-gray-600 hover:text-gray-300 px-1">×</button>
              </div>
            ) : (
              <button onClick={() => setAdding(true)}
                className="px-4 py-2 text-xs text-gray-600 hover:text-indigo-400 transition-colors flex-shrink-0 self-center">
                + goal
              </button>
            )}
          </div>

          {/* Detail view */}
          {activeGoal ? (
            <div className="flex-1 flex min-h-0 overflow-hidden">

              {/* Left: original task management */}
              <div className="w-[40%] flex-shrink-0 overflow-y-auto border-r border-gray-800 py-5 px-4">
                <div className="flex items-center gap-2 mb-4 px-1">
                  <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: goalColor }} />
                  <span className="text-xs font-bold text-gray-300 tracking-wide truncate">{activeGoal.title}</span>
                </div>
                <GoalNode
                  key={activeGoal.id}
                  node={activeGoal}
                  depth={0}
                  handlers={handlers}
                  goalColor={goalColor}
                  inDetailView={true}
                />
              </div>

              {/* Right: progress panel */}
              <div className="flex-1 overflow-y-auto p-6">
                <div className="text-[10px] tracking-widest text-gray-700 mb-6">PROGRESSION</div>
                <GoalProgressPanel
                  node={activeGoal}
                  goalColor={goalColor}
                  mms={mms}
                  sirDoneMap={sirDoneMap}
                  goals={goals}
                />
              </div>
            </div>
          ) : (
            <div className="flex-1 flex items-center justify-center">
              <div className="text-center text-gray-700">
                <div className="text-3xl mb-3">◎</div>
                <div className="text-sm">No goals yet.</div>
                <button onClick={() => setAdding(true)}
                  className="mt-3 text-xs text-indigo-400 hover:text-indigo-300 transition-colors">
                  + add ultimate goal
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SupportingActionsPanel ────────────────────────────────────────────────

    function SupportingActionsPanel({ saActions, setSaActions, saEntries, setSaEntries }) {
      const [adding, setAdding]               = useState(false);
      const [newTitle, setNewTitle]           = useState('');
      const [newEmoji, setNewEmoji]           = useState('');
      const [newColor, setNewColor]           = useState(SA_COLORS[0]);
      const [newDesc, setNewDesc]             = useState('');
      const [expanded, setExpanded]           = useState({});
      const [addingSubTo, setAddingSubTo]     = useState(null);
      const [subTitle, setSubTitle]           = useState('');
      const [subEmoji, setSubEmoji]           = useState('');
      const [subTime, setSubTime]             = useState('09:00');
      const [subDur, setSubDur]               = useState(60);
      const [editingId, setEditingId]         = useState(null);
      const [editTitle, setEditTitle]         = useState('');
      const [editEmoji, setEditEmoji]         = useState('');
      const [editColor, setEditColor]         = useState(SA_COLORS[0]);
      const [editDesc, setEditDesc]           = useState('');
      const [editTime, setEditTime]           = useState('09:00');
      const [editDur, setEditDur]             = useState(60);
      const newTitleRef = useRef(null);
      const subTitleRef = useRef(null);

      useEffect(() => { if (adding && newTitleRef.current) newTitleRef.current.focus(); }, [adding]);
      useEffect(() => { if (addingSubTo && subTitleRef.current) subTitleRef.current.focus(); }, [addingSubTo]);

      const rootActions = saActions.filter(a => !a.parentId);

      function addAction() {
        const v = newTitle.trim();
        if (!v) return;
        setSaActions(prev => [...prev, {
          id: uid(), title: v, emoji: newEmoji.trim() || '◆', color: newColor,
          description: newDesc.trim(), parentId: null, createdAt: Date.now(),
        }]);
        setNewTitle(''); setNewEmoji(''); setNewDesc(''); setNewColor(SA_COLORS[0]); setAdding(false);
      }

      function addSubAction(parentId, parentColor) {
        const v = subTitle.trim();
        if (!v) return;
        setSaActions(prev => [...prev, {
          id: uid(), title: v, emoji: subEmoji.trim() || '◆', color: parentColor,
          time: subTime, duration: Number(subDur) || 60, parentId, createdAt: Date.now(),
        }]);
        setSubTitle(''); setSubEmoji(''); setSubTime('09:00'); setSubDur(60); setAddingSubTo(null);
      }

      function deleteAction(id) {
        const children = saActions.filter(a => a.parentId === id);
        const msg = children.length > 0
          ? 'Delete this action and all its sub-actions and entries?'
          : 'Delete this action and all its entries?';
        if (!window.confirm(msg)) return;
        const ids = [id, ...children.map(a => a.id)];
        setSaActions(prev => prev.filter(a => !ids.includes(a.id)));
        setSaEntries(prev => prev.filter(e => !ids.includes(e.actionId)));
      }

      function toggleEntryDone(id) {
        setSaEntries(prev => prev.map(e => e.id === id ? { ...e, done: !e.done } : e));
      }

      function deleteEntry(id) {
        setSaEntries(prev => prev.filter(e => e.id !== id));
      }

      function startEdit(action, isDir) {
        setEditingId(action.id);
        setEditTitle(action.title);
        setEditEmoji(action.emoji === '◆' ? '' : action.emoji);
        setEditColor(action.color);
        setEditDesc(action.description || '');
        setEditTime(action.time || '09:00');
        setEditDur(action.duration || 60);
      }

      function commitEdit(isDir) {
        const v = editTitle.trim();
        if (v) {
          setSaActions(prev => prev.map(a => a.id === editingId
            ? { ...a, title: v, emoji: editEmoji.trim() || '◆', color: editColor,
                ...(isDir
                  ? { description: editDesc.trim() }
                  : { time: editTime, duration: Number(editDur) || 60 }) }
            : a));
        }
        setEditingId(null);
      }

      function renderScheduledDates(action) {
        const entries = saEntries.filter(e => e.actionId === action.id).sort((a, b) => a.date.localeCompare(b.date));
        if (entries.length === 0) return (
          <span className="text-[10px] text-gray-700 italic">no days yet — add from schedule</span>
        );
        return (
          <div className="flex flex-wrap gap-1">
            {entries.map(entry => (
              <span key={entry.id}
                className={`inline-flex items-center gap-0.5 text-[10px] font-mono px-1.5 py-0.5 rounded ${entry.done ? 'opacity-40' : ''}`}
                style={{ backgroundColor: action.color + '22', color: action.color }}>
                <input type="checkbox" checked={entry.done} onChange={() => toggleEntryDone(entry.id)}
                  className="cursor-pointer" style={{ accentColor: action.color, width: 9, height: 9 }} />
                <span className={entry.done ? 'line-through' : ''}>{entry.date.slice(5)}</span>
                <button onClick={() => deleteEntry(entry.id)}
                  className="hover:text-red-400 leading-none ml-0.5 opacity-60 hover:opacity-100">×</button>
              </span>
            ))}
          </div>
        );
      }

      return (
        <div>
          {rootActions.length === 0 && !adding && (
            <div className="text-center py-16 text-gray-700">
              <div className="text-3xl mb-3">◈</div>
              <div className="text-sm">No supporting actions yet.</div>
              <div className="text-xs mt-1 text-gray-600">Define an action, add sub-actions, then add to any day from the schedule.</div>
            </div>
          )}

          {rootActions.map(action => {
            const subActions = saActions.filter(a => a.parentId === action.id);
            const isDir      = subActions.length > 0 || addingSubTo === action.id;
            const isExpanded = !!expanded[action.id];
            const isEditing  = editingId === action.id;

            return (
              <div key={action.id} className="rounded-xl border mb-4"
                style={{ borderColor: action.color + '40', backgroundColor: action.color + '0a' }}>

                {/* Root action header */}
                <div className="flex items-start gap-2 px-4 py-3">
                  <div className="w-1 self-stretch rounded-full flex-shrink-0 mt-0.5" style={{ backgroundColor: action.color }} />
                  {isDir && <span className="text-[10px] text-gray-600 flex-shrink-0 select-none mt-1">{isExpanded ? '▼' : '▶'}</span>}

                  {isEditing ? (
                    <div className="flex-1 flex flex-col gap-2 min-w-0">
                      <div className="flex items-center gap-2">
                        <input value={editEmoji} onChange={e => setEditEmoji(e.target.value)} maxLength={2}
                          placeholder="icon" autoFocus
                          className="w-10 text-center bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-sm text-white outline-none flex-shrink-0" />
                        <input value={editTitle} onChange={e => setEditTitle(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') commitEdit(isDir); if (e.key === 'Escape') setEditingId(null); }}
                          className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-sm text-white outline-none min-w-0" />
                        {!isDir && (
                          <>
                            <input type="time" value={editTime} onChange={e => setEditTime(e.target.value)}
                              className="w-28 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-xs text-gray-300 outline-none flex-shrink-0" />
                            <div className="flex items-center gap-1 flex-shrink-0">
                              <input type="number" value={editDur} onChange={e => setEditDur(e.target.value)}
                                min={5} max={480} step={5}
                                className="w-14 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                              <span className="text-gray-600 text-xs">min</span>
                            </div>
                          </>
                        )}
                      </div>
                      {isDir && (
                        <textarea value={editDesc} onChange={e => setEditDesc(e.target.value)}
                          placeholder="Description / explanation…"
                          rows={2}
                          className="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-300 outline-none resize-none placeholder-gray-600 focus:border-gray-500" />
                      )}
                      <div className="flex items-center gap-2">
                        <div className="flex gap-1 flex-wrap">
                          {SA_COLORS.map(c => (
                            <button key={c} onClick={() => setEditColor(c)}
                              style={{ backgroundColor: c, width: 16, height: 16 }}
                              className={`rounded-full flex-shrink-0 ${editColor === c ? 'ring-2 ring-white ring-offset-1 ring-offset-gray-900' : ''}`} />
                          ))}
                        </div>
                        <button onClick={() => commitEdit(isDir)}
                          className="text-xs px-2 py-0.5 bg-gray-700 hover:bg-gray-600 text-white rounded">save</button>
                        <button onClick={() => setEditingId(null)}
                          className="text-xs text-gray-500 hover:text-gray-300">cancel</button>
                      </div>
                    </div>
                  ) : (
                    <>
                      <span className="text-base flex-shrink-0 leading-none mt-0.5">{action.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="flex-1 text-sm font-bold text-gray-100 truncate">{action.title}</span>
                          {isDir ? (
                            <span className="text-[10px] text-gray-600 flex-shrink-0">{subActions.length} sub-actions</span>
                          ) : (
                            <>
                              <span className="text-[10px] font-mono flex-shrink-0" style={{ color: action.color }}>
                                {formatTime12(action.time || '09:00')}
                              </span>
                              <span className="text-[10px] text-gray-600 flex-shrink-0">{action.duration || 60}min</span>
                            </>
                          )}
                          <button onClick={() => startEdit(action, isDir)}
                            className="text-gray-600 hover:text-gray-300 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">✎</button>
                          <button onClick={() => deleteAction(action.id)}
                            className="text-gray-600 hover:text-red-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">×</button>
                          <button onClick={() => setExpanded(prev => ({ ...prev, [action.id]: !isExpanded }))}
                            className="text-gray-600 hover:text-gray-300 text-xs px-1.5 py-0.5 rounded hover:bg-gray-700/60">
                            {isExpanded ? '▲' : '▼'}
                          </button>
                        </div>
                        {isDir && action.description && (
                          <div className="text-[11px] text-gray-500 mt-0.5 leading-snug">{action.description}</div>
                        )}
                      </div>
                    </>
                  )}
                </div>

                {/* Expanded body */}
                {isExpanded && (
                  <div className="border-t px-4 pb-3 pt-2" style={{ borderColor: action.color + '30' }}>

                    {isDir ? (
                      /* Directory: list sub-actions */
                      <div className="flex flex-col gap-3">
                        {subActions.map(sub => {
                          const isEditingSub = editingId === sub.id;
                          return (
                            <div key={sub.id} className="pl-3 border-l-2 flex flex-col gap-1"
                              style={{ borderColor: action.color + '60' }}>
                              <div className="flex items-center gap-2">
                                {isEditingSub ? (
                                  <>
                                    <input value={editEmoji} onChange={e => setEditEmoji(e.target.value)} maxLength={2}
                                      placeholder="icon" autoFocus
                                      className="w-8 text-center bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-xs text-white outline-none" />
                                    <input value={editTitle} onChange={e => setEditTitle(e.target.value)}
                                      onKeyDown={e => { if (e.key === 'Enter') commitEdit(false); if (e.key === 'Escape') setEditingId(null); }}
                                      className="flex-1 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-xs text-white outline-none min-w-0" />
                                    <input type="time" value={editTime} onChange={e => setEditTime(e.target.value)}
                                      className="w-24 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                                    <div className="flex items-center gap-1">
                                      <input type="number" value={editDur} onChange={e => setEditDur(e.target.value)}
                                        min={5} max={480} step={5}
                                        className="w-12 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                                      <span className="text-gray-600 text-[10px]">min</span>
                                    </div>
                                    <button onClick={() => commitEdit(false)}
                                      className="text-xs px-1.5 py-0.5 bg-gray-700 hover:bg-gray-600 text-white rounded">save</button>
                                    <button onClick={() => setEditingId(null)}
                                      className="text-xs text-gray-500 hover:text-gray-300">cancel</button>
                                  </>
                                ) : (
                                  <>
                                    <span className="text-sm flex-shrink-0">{sub.emoji}</span>
                                    <span className="flex-1 text-xs font-semibold text-gray-200 truncate">{sub.title}</span>
                                    <span className="text-[10px] font-mono flex-shrink-0" style={{ color: action.color }}>
                                      {formatTime12(sub.time || '09:00')}
                                    </span>
                                    <span className="text-[10px] text-gray-600 flex-shrink-0">{sub.duration || 60}min</span>
                                    <button onClick={() => startEdit(sub)}
                                      className="text-gray-600 hover:text-gray-300 text-[10px] px-1 py-0.5 rounded hover:bg-gray-700/60">✎</button>
                                    <button onClick={() => deleteAction(sub.id)}
                                      className="text-gray-600 hover:text-red-400 text-[10px] px-1 py-0.5 rounded hover:bg-gray-700/60">×</button>
                                  </>
                                )}
                              </div>
                              {!isEditingSub && (
                                <div className="pl-6">{renderScheduledDates({ ...sub, color: action.color })}</div>
                              )}
                            </div>
                          );
                        })}

                        {/* Add sub-action inline form */}
                        {addingSubTo === action.id ? (
                          <div className="pl-3 border-l-2 border-dashed flex flex-wrap items-center gap-2"
                            style={{ borderColor: action.color + '40' }}>
                            <input value={subEmoji} onChange={e => setSubEmoji(e.target.value)} maxLength={2}
                              placeholder="◆"
                              className="w-8 text-center bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-xs text-white outline-none" />
                            <input ref={subTitleRef} value={subTitle} onChange={e => setSubTitle(e.target.value)}
                              onKeyDown={e => {
                                if (e.key === 'Enter')  addSubAction(action.id, action.color);
                                if (e.key === 'Escape') { setAddingSubTo(null); setSubTitle(''); }
                              }}
                              placeholder="Sub-action name…"
                              className="flex-1 min-w-24 bg-gray-800 border border-gray-700 rounded px-2 py-0.5 text-xs text-white outline-none placeholder-gray-600" />
                            <input type="time" value={subTime} onChange={e => setSubTime(e.target.value)}
                              className="w-24 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                            <div className="flex items-center gap-1">
                              <input type="number" value={subDur} onChange={e => setSubDur(e.target.value)}
                                min={5} max={480} step={5}
                                className="w-12 bg-gray-800 border border-gray-700 rounded px-1.5 py-0.5 text-xs text-gray-300 outline-none" />
                              <span className="text-gray-600 text-xs">min</span>
                            </div>
                            <button onClick={() => addSubAction(action.id, action.color)}
                              className="text-xs px-2 py-0.5 rounded text-white font-bold flex-shrink-0"
                              style={{ backgroundColor: action.color }}>add</button>
                            <button onClick={() => { setAddingSubTo(null); setSubTitle(''); }}
                              className="text-xs text-gray-500 hover:text-gray-300 flex-shrink-0">cancel</button>
                          </div>
                        ) : (
                          <button onClick={() => setAddingSubTo(action.id)}
                            className="text-xs text-gray-600 hover:text-gray-400 transition-colors pl-3">
                            + add sub-action
                          </button>
                        )}
                      </div>
                    ) : (
                      /* Leaf root action: show scheduled dates + option to add sub-action */
                      <div className="flex flex-col gap-2">
                        {renderScheduledDates(action)}
                        <button onClick={() => { setAddingSubTo(action.id); }}
                          className="text-[10px] text-gray-700 hover:text-gray-500 transition-colors text-left border-t border-gray-800/40 pt-2 mt-1">
                          + add sub-action (turns this into a directory)
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {/* Add root action form */}
          {adding ? (
            <div className="rounded-xl border border-gray-800 bg-gray-900/70 p-4 mb-4">
              <div className="flex items-center gap-2 mb-3">
                <input value={newEmoji} onChange={e => setNewEmoji(e.target.value)} maxLength={2}
                  placeholder="◆"
                  className="w-10 text-center bg-gray-800 border border-gray-700 rounded px-1 py-1 text-sm text-white outline-none" />
                <input ref={newTitleRef} value={newTitle} onChange={e => setNewTitle(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter')  addAction();
                    if (e.key === 'Escape') { setAdding(false); setNewTitle(''); setNewDesc(''); }
                  }}
                  placeholder="Action name…"
                  className="flex-1 bg-gray-800 border border-indigo-500 rounded px-3 py-1 text-sm text-white outline-none placeholder-gray-600" />
              </div>
              <textarea value={newDesc} onChange={e => setNewDesc(e.target.value)}
                placeholder="Description / explanation (optional)…"
                rows={2}
                className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-xs text-gray-300 outline-none resize-none placeholder-gray-600 focus:border-gray-500 mb-3" />
              <div className="flex items-center gap-3 mb-3">
                <span className="text-xs text-gray-600">color</span>
                <div className="flex gap-1.5 flex-wrap">
                  {SA_COLORS.map(c => (
                    <button key={c} onClick={() => setNewColor(c)}
                      style={{ backgroundColor: c, width: 20, height: 20 }}
                      className={`rounded-full flex-shrink-0 transition-transform ${newColor === c ? 'ring-2 ring-white ring-offset-1 ring-offset-gray-900 scale-110' : 'hover:scale-110'}`} />
                  ))}
                </div>
              </div>
              <div className="flex gap-2 items-center">
                <button onClick={addAction}
                  className="text-xs px-3 py-1.5 rounded text-white font-bold"
                  style={{ backgroundColor: newColor }}>
                  add action
                </button>
                <button onClick={() => { setAdding(false); setNewTitle(''); setNewEmoji(''); setNewDesc(''); setNewColor(SA_COLORS[0]); }}
                  className="text-xs px-2 py-1.5 bg-gray-800 text-gray-500 hover:text-white rounded">cancel</button>
              </div>
            </div>
          ) : (
            <button
              onClick={() => setAdding(true)}
              className="w-full text-left text-xs text-gray-600 hover:text-indigo-400 px-3 py-2 mt-1 rounded border border-dashed border-gray-800 hover:border-indigo-800 transition-colors">
              + add supporting action
            </button>
          )}
        </div>
      );
    }

    // ── MGPanel ───────────────────────────────────────────────────────────────

    function MGPanel({ mms, mgChanges, mgSchedule, setMgSchedule }) {
      const t2mms = (mms || []).filter(m => String(m.type) === '2');
      const today = toDateStr(new Date());
      const [selDate, setSelDate] = useState(today);
      const isPast = selDate < today;

      const latestChange = Object.fromEntries(
        t2mms.map(mm => {
          const sorted = (mgChanges || [])
            .filter(c => c.mmId === mm.id)
            .sort((a, b) => b.date.localeCompare(a.date));
          return [mm.id, sorted[0] || null];
        })
      );

      const activeMGs = getMGsForDay(selDate, mgSchedule);
      const isCarried = !Object.prototype.hasOwnProperty.call(mgSchedule, selDate) && activeMGs.length > 0;

      const sortedMMs = [...t2mms].sort((a, b) => {
        const aActive = activeMGs.includes(a.id) ? 0 : 1;
        const bActive = activeMGs.includes(b.id) ? 0 : 1;
        if (aActive !== bActive) return aActive - bActive;
        const aRating = (a.rating != null) ? a.rating : Infinity;
        const bRating = (b.rating != null) ? b.rating : Infinity;
        return aRating - bRating;
      });

      if (!t2mms.length) {
        return (
          <div className="text-gray-600 text-center py-20 text-xs">
            No T2 Mind Maps yet. Add MGs in the KS02 Tracker.
          </div>
        );
      }

      return (
        <div className="p-6 max-w-2xl mx-auto w-full">
          <div className="flex items-center justify-between mb-4">
            <div className="text-gray-700 tracking-widest text-xs">MG — MINDSET / GOAL · T2 MIND MAPS</div>
            <button onClick={() => window.location.href = 'sir-ks02.html#mg'}
              className="bg-emerald-800 hover:bg-emerald-700 text-white px-3 py-1 rounded text-xs font-bold tracking-widest">SCHEDULE FOCUS →</button>
          </div>

          <div className="flex items-center gap-3 mb-6">
            <span className="text-gray-600 text-xs">SCHEDULE FOR</span>
            <input
              type="date"
              value={selDate}
              onChange={e => setSelDate(e.target.value)}
              className="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-white outline-none focus:border-emerald-600"
            />
            {isCarried && <span className="text-xs text-gray-600 italic">↑ carried from previous day</span>}
            {isPast && <span className="text-xs text-gray-600 italic">past · view only</span>}
          </div>

          <div className="flex flex-col gap-3">
            {sortedMMs.map(mm => {
              const mgText = isPast
                ? getMGTextForDay(mm.id, selDate, mgChanges)
                : (mm.currentMG || latestChange[mm.id]?.newMG || '');
              const active = activeMGs.includes(mm.id);
              return (
                <div key={mm.id} className={`border rounded-lg p-4 transition-colors ${active ? 'border-emerald-700 bg-emerald-950/30' : 'border-gray-800 bg-gray-900/50'}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <div className="text-xs text-gray-500 tracking-widest">{mm.name}</div>
                        {mm.rating != null && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-gray-800 text-gray-400">Lv {mm.rating}</span>}
                      </div>
                      {mgText
                        ? <div className="text-sm text-emerald-200 leading-snug">{mgText}</div>
                        : <div className="text-xs text-gray-600 italic">No MG yet</div>
                      }
                      {(() => {
                        const relevantChange = isPast
                          ? (mgChanges || []).filter(c => c.mmId === mm.id && c.date <= selDate).sort((a,b) => b.date.localeCompare(a.date))[0]
                          : latestChange[mm.id];
                        return relevantChange ? <div className="text-[10px] text-gray-600 mt-1">Updated {relevantChange.date}</div> : null;
                      })()}
                    </div>
                    <button
                      onClick={() => !isPast && toggleMGDay(selDate, mm.id, mgSchedule, setMgSchedule)}
                      disabled={isPast}
                      className={`flex-shrink-0 px-3 py-1 rounded text-xs font-bold transition-colors ${isPast ? 'bg-gray-800 text-gray-700 cursor-not-allowed' : active ? 'bg-emerald-700 hover:bg-emerald-600 text-white' : 'bg-gray-800 hover:bg-gray-700 text-gray-400'}`}
                    >
                      {active ? '✓ scheduled' : '+ schedule'}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── SchedulePanel ─────────────────────────────────────────────────────────

    function SchedulePanel({ goals, setGoals, saActions, saEntries, setSaEntries, mms, mmEntries, setMmEntries, sessions, mgChanges, mgSchedule, setMgSchedule, sourceDumps }) {
      const PX_PER_HOUR = 64;
      const START_HOUR  = 4;
      const END_HOUR    = 23;
      const TIME_COL_W  = 56;
      const DAY_MIN_W   = 140;
      const TOTAL_W     = TIME_COL_W + 7 * DAY_MIN_W;
      const TOTAL_H     = (END_HOUR - START_HOUR) * PX_PER_HOUR;
      const HOURS       = Array.from({ length: END_HOUR - START_HOUR }, (_, i) => START_HOUR + i);

      const STAGE_COLORS_SCHED = {1:'#7c3aed',2:'#2563eb',3:'#0891b2',4:'#0d9488',sir:'#059669',sir1:'#059669',sir2:'#059669',sir3:'#059669',sir4:'#059669',sir5:'#059669',finished:'#4b5563'};
      const stageLabel = s => s==='finished'?'FIN':s==='sir'?'SIR':s==='sir1'?'SIR-1':s==='sir2'?'SIR-2':s==='sir3'?'SIR-3':s==='sir4'?'SIR-4':s==='sir5'?'SIR-5':s?`S${s}`:null;

      const ultimateMMs = useMemo(() => {
        const ids = new Set(goals.flatMap(g => g.toLearn || []));
        return (mms || []).filter(m => ids.has(m.id));
      }, [goals, mms]);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const [anchor, setAnchor]   = useState(new Date(today));
      const [pickerDay, setPickerDay] = useState(null);
      const [mmPickerDay, setMmPickerDay] = useState(null);
      const [mgPickerDay, setMgPickerDay] = useState(null);
      const [search, setSearch]   = useState('');
      const [ghost, setGhost]     = useState(null);
      const [nowY, setNowY]       = useState(null);
      const [selectedForResize, setSelectedForResize] = useState(null);

      const [schedView, setSchedView] = useState('timeline');
      const [calDate,   setCalDate]   = useState({ year: new Date().getFullYear(), month: new Date().getMonth() });
      const [selDay,    setSelDay]    = useState(null);

      const [timelineMode,  setTimelineMode]  = useState('week'); // 'week' | 'day'
      const [dayFocusDate,  setDayFocusDate]  = useState(new Date(today));
      const [openComments,     setOpenComments]     = useState(new Set());
      const [noteDrafts,       setNoteDrafts]       = useState({});
      const [viewingNote,      setViewingNote]      = useState(null);
      const [openSourcePicker, setOpenSourcePicker] = useState(new Set());
      const [sourcePickerMode, setSourcePickerMode] = useState({});
      const [viewingSource,    setViewingSource]    = useState(null);
      const [overlapFronts,    setOverlapFronts]    = useState({});

      const sessionsByDate = useMemo(() => {
        const m = {};
        (sessions || []).forEach(s => { (m[s.date] = m[s.date] || []).push(s); });
        return m;
      }, [sessions]);

      const mmColor = (id) => {
        const i = (mms || []).findIndex(m => m.id === id);
        return i >= 0 ? PALETTE[i % PALETTE.length] : "#6b7280";
      };

      const containerRef    = useRef(null);
      const headerRef       = useRef(null);
      const ghostRef        = useRef(null);
      const dragRef         = useRef(null);
      const resizeRef       = useRef(null);
      const daysRef         = useRef(null);
      const searchRef       = useRef(null);
      const shiftScrollRef  = useRef(0);

      useEffect(() => { ghostRef.current = ghost; }, [ghost]);

      function getWeekStart(d) {
        const date = new Date(d);
        const day  = date.getDay();
        date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
        return date;
      }

      const weekStart = new Date(anchor);
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart);
        d.setDate(d.getDate() + i);
        return d;
      });
      const displayDays = timelineMode === 'week' ? days : [new Date(dayFocusDate)];
      useEffect(() => { daysRef.current = displayDays; });

      useEffect(() => {
        function update() {
          const now = new Date();
          const h = now.getHours() + now.getMinutes() / 60;
          setNowY(h >= START_HOUR && h < END_HOUR ? (h - START_HOUR) * PX_PER_HOUR : null);
        }
        update();
        const id = setInterval(update, 60000);
        return () => clearInterval(id);
      }, []);

      // Scroll to 8 AM on mount, accounting for sticky header height
      useEffect(() => {
        if (containerRef.current) {
          const headerH = headerRef.current ? headerRef.current.offsetHeight : 0;
          containerRef.current.scrollTop = headerH + (8 - START_HOUR) * PX_PER_HOUR;
        }
      }, []);

      // Shift + wheel → navigate one day left or right (1 notch = 1 day)
      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const handler = (e) => {
          if (!e.shiftKey) return;
          e.preventDefault();
          shiftScrollRef.current += e.deltaY;
          if (Math.abs(shiftScrollRef.current) < 50) return;
          const dir = shiftScrollRef.current > 0 ? 1 : -1;
          shiftScrollRef.current = 0;
          setAnchor(prev => {
            const d = new Date(prev);
            d.setDate(d.getDate() + dir);
            return d;
          });
        };
        el.addEventListener('wheel', handler, { passive: false });
        return () => el.removeEventListener('wheel', handler);
      }, []);

      useEffect(() => {
        function onMouseMove(e) {
          // Handle resize drag
          if (resizeRef.current) {
            const { type, id, edge, startY, startDuration, startTotalMin } = resizeRef.current;
            const deltaY = e.clientY - startY;
            const deltaMins = Math.round((deltaY / PX_PER_HOUR * 60) / 15) * 15;
            if (edge === 'bottom') {
              const newDuration = Math.max(15, startDuration + deltaMins);
              resizeRef.current.previewDuration = newDuration;
              setGhost(g => ({ ...(g || { type, id, _resize: true }), duration: newDuration }));
            } else {
              const newDuration = Math.max(15, startDuration - deltaMins);
              const newTotalMin = Math.max(START_HOUR * 60, Math.min((END_HOUR - 1) * 60, startTotalMin + deltaMins));
              const hh = Math.floor(newTotalMin / 60);
              const mm = newTotalMin % 60;
              const newTime = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
              resizeRef.current.previewDuration = newDuration;
              resizeRef.current.previewTime = newTime;
              setGhost(g => ({ ...(g || { type, id, _resize: true }), duration: newDuration, time: newTime }));
            }
            return;
          }
          if (!dragRef.current || !containerRef.current) return;
          const el   = containerRef.current;
          const rect = el.getBoundingClientRect();

          // Y → 15-min snapped time (subtract sticky header height)
          const headerH  = headerRef.current ? headerRef.current.offsetHeight : 0;
          const relY     = e.clientY - rect.top + el.scrollTop - dragRef.current.offsetY - headerH;
          let totalMin   = Math.round(((relY / PX_PER_HOUR) * 60 + START_HOUR * 60) / 15) * 15;
          totalMin       = Math.max(START_HOUR * 60, Math.min((END_HOUR - 1) * 60, totalMin));
          const hh       = Math.floor(totalMin / 60);
          const mm       = totalMin % 60;
          const newTime  = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;

          // X → day column (account for horizontal scroll + sticky time col)
          const currDays = daysRef.current;
          if (!currDays) return;
          const relX   = e.clientX - rect.left + el.scrollLeft - TIME_COL_W;
          const colW   = (el.scrollWidth - TIME_COL_W) / currDays.length;
          const dayIdx = Math.max(0, Math.min(currDays.length - 1, Math.floor(relX / colW)));
          const newDate = toDateStr(currDays[dayIdx]);

          const prev = ghostRef.current;
          if (prev && (prev.date !== newDate || prev.time !== newTime)) {
            const next = { ...prev, date: newDate, time: newTime };
            ghostRef.current = next;
            setGhost(next);
          }
        }

        function onMouseUp() {
          // Commit resize
          if (resizeRef.current) {
            const { type, id, previewDuration, previewTime } = resizeRef.current;
            if (previewDuration !== undefined) {
              const update = { duration: previewDuration, ...(previewTime ? (type === 'goal' ? { scheduledTime: previewTime } : { time: previewTime }) : {}) };
              if (type === 'goal') setGoals(prev => updateTaskProps(prev, id, update));
              else if (type === 'entry') setSaEntries(prev => prev.map(e => e.id === id ? { ...e, ...update } : e));
              else if (type === 'mmEntry') setMmEntries(prev => prev.map(e => e.id === id ? { ...e, ...update } : e));
            }
            resizeRef.current = null;
            setGhost(null);
            return;
          }
          const g = ghostRef.current;
          const d = dragRef.current;
          if (g && d) {
            if (d.type === 'goal') {
              setGoals(prev => updateSchedule(prev, g.taskId, g.date, g.time));
            } else if (d.type === 'entry') {
              setSaEntries(prev => prev.map(e => e.id === g.entryId ? { ...e, date: g.date, time: g.time } : e));
            } else if (d.type === 'mmEntry') {
              setMmEntries(prev => prev.map(e => e.id === g.entryId ? { ...e, date: g.date, time: g.time } : e));
            }
          }
          dragRef.current  = null;
          ghostRef.current = null;
          setGhost(null);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup',   onMouseUp);
        return () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup',   onMouseUp);
        };
      }, []);

      useEffect(() => {
        if (pickerDay && searchRef.current) searchRef.current.focus();
      }, [pickerDay]);

      const allTasks   = flattenAll(goals);
      const inProgress = allTasks.filter(t => !isComplete(t));
      const filtered   = search.trim()
        ? inProgress.filter(t => t.title.toLowerCase().includes(search.toLowerCase()))
        : inProgress;

      const tasksForDate = ds => allTasks.filter(t => t.scheduledDate === ds);
      const entriesForDate = ds => saEntries.filter(e => e.date === ds);
      const mmEntriesForDate = ds => (mmEntries || []).filter(e => e.date === ds);

      function computeOverlapInfo(blocks) {
        const n = blocks.length;
        const adj = Array.from({length: n}, () => []);
        for (let i = 0; i < n; i++) {
          for (let j = i + 1; j < n; j++) {
            if (blocks[i].top < blocks[j].top + blocks[j].height &&
                blocks[j].top < blocks[i].top + blocks[i].height) {
              adj[i].push(j); adj[j].push(i);
            }
          }
        }
        const visited = new Set();
        const info = {};
        for (let i = 0; i < n; i++) {
          if (visited.has(i)) continue;
          const group = [], stack = [i];
          while (stack.length) {
            const v = stack.pop();
            if (visited.has(v)) continue;
            visited.add(v); group.push(v);
            adj[v].forEach(u => stack.push(u));
          }
          if (group.length < 2) continue;
          const orderedIds = group.sort((a, b) => a - b).map(idx => blocks[idx].id);
          const key = [...orderedIds].sort().join('|');
          orderedIds.forEach(id => { info[id] = { key, orderedIds }; });
        }
        return info;
      }

      function startDrag(e, task) {
        e.preventDefault();
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        dragRef.current = { type: 'goal', taskId: task.id, offsetY: e.clientY - rect.top };
        const g = {
          type: 'goal', taskId: task.id,
          date: task.scheduledDate, time: task.scheduledTime || '09:00', duration: task.duration || 60,
        };
        ghostRef.current = g;
        setGhost(g);
      }

      function startDragEntry(e, entry) {
        e.preventDefault();
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        dragRef.current = { type: 'entry', entryId: entry.id, offsetY: e.clientY - rect.top };
        const g = {
          type: 'entry', entryId: entry.id,
          date: entry.date, time: entry.time || '09:00', duration: entry.duration || 60,
        };
        ghostRef.current = g;
        setGhost(g);
      }

      function startDragMMEntry(e, entry) {
        e.preventDefault();
        e.stopPropagation();
        const rect = e.currentTarget.getBoundingClientRect();
        dragRef.current = { type: 'mmEntry', entryId: entry.id, offsetY: e.clientY - rect.top };
        const g = {
          type: 'mmEntry', entryId: entry.id,
          date: entry.date, time: entry.time || '09:00', duration: entry.duration || 60,
        };
        ghostRef.current = g;
        setGhost(g);
      }

      function startResize(e, item, edge, type) {
        e.preventDefault();
        e.stopPropagation();
        const timeStr = type === 'goal' ? (item.scheduledTime || '09:00') : (item.time || '09:00');
        const [th, tm] = timeStr.split(':').map(Number);
        const startTotalMin = th * 60 + tm;
        const startDuration = item.duration || 60;
        const id = item.id;
        resizeRef.current = { type, id, edge, startY: e.clientY, startDuration, startTotalMin };
      }

      function assignToDate(task, dateStr) {
        const targets = (task.children || []).length === 0 ? [task] : getLeaves(task);
        setGoals(prev => targets.reduce((g, leaf, i) => {
          const h    = Math.min(9 + i, 21);
          const time = leaf.scheduledTime || `${String(h).padStart(2,'0')}:00`;
          return updateSchedule(g, leaf.id, dateStr, time);
        }, prev));
        setPickerDay(null);
        setSearch('');
      }

      function unschedule(taskId) {
        setGoals(prev => updateSchedule(prev, taskId, null, null));
      }

      function assignSAToDate(action, dateStr) {
        setSaEntries(prev => {
          if (prev.some(e => e.actionId === action.id && e.date === dateStr)) return prev;
          return [...prev, {
            id: uid(), actionId: action.id, date: dateStr,
            time: action.time || '09:00', duration: action.duration || 60, done: false,
          }];
        });
        setPickerDay(null);
        setSearch('');
      }

      function assignDirectoryToDate(parentAction, dateStr) {
        const children = saActions.filter(a => a.parentId === parentAction.id);
        setSaEntries(prev => {
          let next = [...prev];
          children.forEach(child => {
            if (!next.some(e => e.actionId === child.id && e.date === dateStr)) {
              next.push({
                id: uid(), actionId: child.id, date: dateStr,
                time: child.time || '09:00', duration: child.duration || 60, done: false,
              });
            }
          });
          return next;
        });
        setPickerDay(null);
        setSearch('');
      }

      function assignMMToDate(mm, dateStr) {
        setMmEntries(prev => {
          if (prev.some(e => e.mmId === mm.id && e.date === dateStr)) return prev;
          return [...prev, { id: uid(), mmId: mm.id, date: dateStr, time: '09:00', duration: 60, done: false }];
        });
        setPickerDay(null);
        setSearch('');
      }

      const todayStr  = toDateStr(today);
      const weekLabel = `${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${
        days[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

      return (
        <div className="flex flex-col h-full">

          {/* Nav bar */}
          <div className="flex-shrink-0 flex items-center gap-2 px-3 py-2 border-b border-gray-800">
            {schedView === 'timeline' && <>
              {timelineMode === 'week' ? <>
                <button onClick={() => { const d = new Date(anchor); d.setDate(d.getDate()-1); setAnchor(d); }}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-400">&#8249;</button>
                <button onClick={() => { const d = new Date(anchor); d.setDate(d.getDate()+1); setAnchor(d); }}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-400">&#8250;</button>
                <button onClick={() => setAnchor(new Date(today))}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-500">today</button>
                <span className="text-xs text-gray-500 flex-1">{weekLabel}</span>
              </> : <>
                <button onClick={() => { const d = new Date(dayFocusDate); d.setDate(d.getDate()-1); setDayFocusDate(d); }}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-400">&#8249;</button>
                <button onClick={() => { const d = new Date(dayFocusDate); d.setDate(d.getDate()+1); setDayFocusDate(d); }}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-400">&#8250;</button>
                <button onClick={() => setDayFocusDate(new Date(today))}
                  className="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded text-gray-500">today</button>
                <span className="text-xs text-gray-500 flex-1">
                  {dayFocusDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
                </span>
              </>}
              <div className="flex gap-0.5 border border-gray-700 rounded overflow-hidden mr-1">
                {[['week','WEEK'],['day','DAY']].map(([m,l])=>(
                  <button key={m} onClick={()=>setTimelineMode(m)}
                    className={`text-xs px-2 py-1 font-bold transition ${timelineMode===m?'bg-gray-700 text-white':'text-gray-600 hover:text-gray-300'}`}>{l}</button>
                ))}
              </div>
            </>}
            {schedView === 'calendar' && <span className="flex-1" />}
            <div className="flex gap-1 ml-auto">
              {[['timeline','TIMELINE'],['calendar','CALENDAR']].map(([v,l])=>(
                <button key={v} onClick={()=>setSchedView(v)}
                  className={`text-xs px-2 py-1 rounded font-bold transition ${schedView===v?'bg-white text-gray-950':'text-gray-500 hover:text-white'}`}>{l}</button>
              ))}
            </div>
          </div>

          {/* Single scroll container — handles both x (day cols) and y (time) */}
          {schedView === 'timeline' && <div ref={containerRef} className="flex-1 overflow-auto relative select-none" onClick={() => setSelectedForResize(null)}>

            {/* Day header — sticky to top of scroll container */}
            <div ref={headerRef}
              className="flex border-b border-gray-800 sticky top-0 z-20"
              style={{ minWidth: timelineMode === 'week' ? TOTAL_W + 'px' : undefined, backgroundColor: '#080d18' }}>

              {/* Time col spacer — sticky left */}
              <div style={{ width: TIME_COL_W + 'px', position: 'sticky', left: 0, zIndex: 30, backgroundColor: '#080d18' }}
                className="flex-shrink-0 border-r border-gray-800/50" />

              {displayDays.map(day => {
                const ds      = toDateStr(day);
                const isToday = ds === todayStr;
                const isPast  = ds < todayStr;
                return (
                  <div key={ds}
                    style={timelineMode === 'week' ? { minWidth: DAY_MIN_W + 'px' } : undefined}
                    className="flex-1 flex flex-col items-center py-2 border-l border-gray-800 relative">
                    <div className={`text-[10px] tracking-widest ${isToday ? 'text-indigo-400' : 'text-gray-600'}`}>
                      {day.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}
                    </div>
                    <div className={`flex items-center justify-center w-7 h-7 text-sm font-bold rounded-full mt-0.5 ${
                      isToday ? 'bg-indigo-500 text-white' : 'text-gray-600'
                    }`}>
                      {day.getDate()}
                    </div>
                    <div className="mt-1 flex gap-1">
                      <button
                        onClick={() => { setPickerDay(pickerDay === ds ? null : ds); setMmPickerDay(null); setMgPickerDay(null); }}
                        className="text-[10px] text-gray-700 hover:text-indigo-400 transition-colors">+</button>
                      <button
                        onClick={() => { setMmPickerDay(mmPickerDay === ds ? null : ds); setPickerDay(null); setMgPickerDay(null); setSearch(''); }}
                        className="text-[10px] text-gray-700 hover:text-emerald-400 transition-colors">◎</button>
                      {!isPast && <button
                        onClick={() => { setMgPickerDay(mgPickerDay === ds ? null : ds); setPickerDay(null); setMmPickerDay(null); setSearch(''); }}
                        className="text-[10px] text-gray-700 hover:text-emerald-400 transition-colors">⊕</button>}
                    </div>

                    {/* MG list — top of day */}
                    {(() => {
                      const dayMGs  = getMGsForDay(ds, mgSchedule);
                      const carried = !Object.prototype.hasOwnProperty.call(mgSchedule, ds) && dayMGs.length > 0;
                      const t2mms   = (mms || []).filter(m => String(m.type) === '2');
                      if (!dayMGs.length) return null;
                      return (
                        <div className="w-full px-1 mt-1 text-left">
                          {carried && <div className="text-[9px] text-gray-600 italic text-center">↑ carried</div>}
                          <ul className="text-[10px] space-y-0.5 list-none">
                            {dayMGs.map(mmId => {
                              const mm = t2mms.find(m => m.id === mmId);
                              if (!mm) return null;
                              return (
                                <li key={mmId} className="flex items-start gap-1 group">
                                  <span className="text-emerald-600 mt-px flex-shrink-0">•</span>
                                  <span className="flex-1 text-emerald-300 leading-tight">{getMGTextForDay(mmId, ds, mgChanges) || mm.name}</span>
                                  {!isPast && <button
                                    onClick={() => toggleMGDay(ds, mmId, mgSchedule, setMgSchedule)}
                                    className="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 transition-opacity ml-1 flex-shrink-0"
                                  >×</button>}
                                </li>
                              );
                            })}
                          </ul>
                        </div>
                      );
                    })()}

                    {/* MG picker dropdown */}
                    {mgPickerDay === ds && !isPast && (() => {
                      const t2mms = (mms || []).filter(m => String(m.type) === '2');
                      const dayMGs = getMGsForDay(ds, mgSchedule);
                      return (
                        <>
                          <div className="fixed inset-0 z-20" onClick={() => setMgPickerDay(null)} />
                          <div className="absolute top-full left-0 mt-1 w-60 bg-gray-900 border border-gray-700 rounded-lg shadow-xl z-30 overflow-hidden">
                            <div className="px-3 py-1.5 text-[9px] text-gray-600 tracking-widest border-b border-gray-800">MG — MINDSET / GOAL</div>
                            <div className="max-h-52 overflow-y-auto">
                              {t2mms.length === 0 && (
                                <div className="px-3 py-3 text-[10px] text-gray-600">No T2 MGs yet.</div>
                              )}
                              {t2mms.map(mm => {
                                const active = dayMGs.includes(mm.id);
                                return (
                                  <button key={mm.id}
                                    onClick={() => toggleMGDay(ds, mm.id, mgSchedule, setMgSchedule)}

                      const [dth, dtm] = dispTime.split(':').map(Number);
