<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress & Schedule</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-sync.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { gray: { 950: '#080d18' } } } }
    };
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ── unified DB helpers ────────────────────────────────────────────────────

    function _getTrackDB() {
      try { return JSON.parse(localStorage.getItem('track_db') || '{}'); } catch { return {}; }
    }
    function _activeSlot() {
      const db=_getTrackDB(), slots=db.slots||[], id=db.activeSlotId;
      return slots.find(s=>s.id===id) || slots[0] || null;
    }
    function _readP(key, fallback) {
      const s=_activeSlot(); return (s && s[key]!==undefined) ? s[key] : fallback;
    }
    function _writeP(key, val) {
      const db=_getTrackDB(), id=db.activeSlotId;
      db.slots=(db.slots||[]).map(s=>s.id===id?{...s,[key]:val}:s);
      localStorage.setItem('track_db', JSON.stringify(db));
    }
    // migrate all prior states → unified {slots, activeSlotId} at top level
    (function() {
      const db=_getTrackDB();
      if (db.slots) return;

      let slots=[], activeId=null;
      let pGoals=[], pSA=[], pSE=[];

      if (db.progress) {
        pGoals=db.progress.goals||[]; pSA=db.progress.saActions||[]; pSE=db.progress.saEntries||[];
      } else {
        try{const r=localStorage.getItem('progress_goals');      if(r)pGoals=JSON.parse(r);}catch{}
        try{const r=localStorage.getItem('progress_sa_actions'); if(r)pSA  =JSON.parse(r);}catch{}
        try{const r=localStorage.getItem('progress_sa_entries'); if(r)pSE  =JSON.parse(r);}catch{}
      }

      if (db.ks02) {
        slots   =(db.ks02.slots||[]).map(s=>({...s,goals:s.goals||[],saActions:s.saActions||[],saEntries:s.saEntries||[]}));
        activeId=db.ks02.activeSlotId||null;
      } else {
        try{const r=localStorage.getItem('ks02_slots');        if(r)slots   =JSON.parse(r).map(s=>({...s,goals:[],saActions:[],saEntries:[]}));}catch{}
        try{const r=localStorage.getItem('ks02_activeSlotId'); if(r)activeId=r;}catch{}
      }

      if (!slots.length) {
        const createdAt=new Date().toISOString().slice(0,10);
        const s={id:"slot-"+Date.now(),name:"Default",createdAt,sessions:[],mms:[],kolbs:[],mgChanges:[],goals:pGoals,saActions:pSA,saEntries:pSE};
        slots=[s]; activeId=s.id;
      } else {
        const idx=activeId?Math.max(0,slots.findIndex(s=>s.id===activeId)):0;
        if(pGoals.length||pSA.length||pSE.length) slots[idx]={...slots[idx],goals:pGoals,saActions:pSA,saEntries:pSE};
      }

      if (!activeId||!slots.find(s=>s.id===activeId)) activeId=slots[0].id;
      localStorage.setItem('track_db', JSON.stringify({slots, activeSlotId:activeId}));
    })();

    (function migrateToLearn() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      db.slots = db.slots.map(slot => ({
        ...slot,
        goals: (slot.goals || []).map(g => {
          if (g.toLearn === undefined) { dirty = true; return { ...g, toLearn: [] }; }
          return g;
        }),
      }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateMmTargets() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      function walk(nodes) {
        return nodes.map(n => {
          const updated = { ...n, children: walk(n.children || []) };
          if (n.mmTargets === undefined) { dirty = true; updated.mmTargets = {}; }
          return updated;
        });
      }
      db.slots = db.slots.map(s => ({ ...s, goals: walk(s.goals || []) }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateSubGoalFields() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      function walk(nodes) {
        return nodes.map(n => {
          const updated = { ...n, children: walk(n.children || []) };
          if (n.isSubGoal) {
            if (n.toLearn === undefined)   { dirty = true; updated.toLearn = []; }
            if (n.mmTargets === undefined) { dirty = true; updated.mmTargets = {}; }
          }
          return updated;
        });
      }
      db.slots = db.slots.map(s => ({ ...s, goals: walk(s.goals || []) }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateMilestones() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      function walk(nodes, depth = 0) {
        return nodes.map(n => {
          const updated = { ...n, children: walk(n.children || [], depth + 1) };
          if ((depth === 0 || n.isSubGoal) && !Array.isArray(n.milestones)) {
            dirty = true;
            updated.milestones = [];
          }
          return updated;
        });
      }
      db.slots = db.slots.map(s => ({ ...s, goals: walk(s.goals || []) }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function migrateChildrenArray() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      function walk(nodes) {
        return nodes.map(n => {
          if (n.children == null) { dirty = true; n = { ...n, children: [] }; }
          return { ...n, children: walk(n.children) };
        });
      }
      db.slots = db.slots.map(s => ({ ...s, goals: walk(s.goals || []) }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    (function deduplicateToLearn() {
      const db = _getTrackDB();
      if (!db.slots) return;
      let dirty = false;
      function walk(nodes) {
        return nodes.map(n => {
          const deduped = [...new Set(n.toLearn || [])];
          if (deduped.length !== (n.toLearn || []).length) dirty = true;
          return { ...n, toLearn: deduped, children: walk(n.children || []) };
        });
      }
      db.slots = db.slots.map(s => ({ ...s, goals: walk(s.goals || []) }));
      if (dirty) localStorage.setItem('track_db', JSON.stringify(db));
    })();

    // ── pure helpers ──────────────────────────────────────────────────────────

    function uid() { return Math.random().toString(36).slice(2, 10); }

    function isMilestoneNode(node) {
      return node?.taskType === 'milestone';
    }

    function isCountableLeaf(node) {
      return !node?.isLink && !isMilestoneNode(node) && (node.children || []).length === 0;
    }

    function isComplete(node, allGoals) {
      if (!node) return false;
      if (node.isLink) {
        const orig = resolveLinkedTask(node, allGoals);
        return orig ? isComplete(orig, allGoals) : false;
      }
      if (isMilestoneNode(node) && (node.children || []).length === 0) return true;
      if ((node.children || []).length === 0) return !!node.completed;
      const progress = countProgress(node, allGoals ? id => findNode(allGoals, id) : null);
      if (progress.total === 0) return false;
      return progress.done >= progress.total;
    }

    function countProgress(node, resolveLink, checkSchedDone = false) {
      if (!node) return { done: 0, total: 0 };
      if (node.isLink) {
        const orig = resolveLink && resolveLink(node.linkedTaskId);
        if (!orig) return { done: 0, total: 0 };
        return countProgress(orig, resolveLink, checkSchedDone);
      }
      if (isMilestoneNode(node) && (node.children || []).length === 0)
        return { done: 0, total: 0 };
      if ((node.children || []).length === 0)
        return { done: node.completed ? 1 : 0, total: 1 };
      return (node.children || []).reduce((acc, c) => {
        const p = countProgress(c, resolveLink, checkSchedDone);
        return { done: acc.done + p.done, total: acc.total + p.total };
      }, { done: 0, total: 0 });
    }

    function toggleLeaf(goals, id) {
      return goals.map(g =>
        g.id === id && isCountableLeaf(g)
          ? { ...g, completed: !g.completed }
          : { ...g, children: toggleLeaf(g.children || [], id) }
      );
    }

    function toggleRoutineSchedForDate(goals, id, dateStr) {
      return goals.map(g =>
        g.id === id && isCountableLeaf(g)
          ? { ...g, routineDates: {
                ...(g.routineDates || {}),
                [dateStr]: {
                  time: (g.routineDates?.[dateStr]?.time || '09:00'),
                  done: !(g.routineDates?.[dateStr]?.done)
                }
              }}
          : { ...g, children: toggleRoutineSchedForDate(g.children || [], id, dateStr) }
      );
    }

    function addChild(goals, parentId, child) {
      function walk(nodes, insideMilestone = false) {
        return nodes.map(g => {
          const nextInsideMilestone = insideMilestone || isMilestoneNode(g);
          if (g.id === parentId) {
            if (
              isMilestoneNode(child) &&
              (nextInsideMilestone || parentHasMilestoneChild(g, child.milestoneId, child.id, goals))
            ) return g;
            return { ...g, children: [...(g.children || []), child] };
          }
          return { ...g, children: walk(g.children || [], nextInsideMilestone) };
        });
      }
      return walk(goals);
    }

    function addSubGoalAndMigrateTasks(goals, parentId, subGoal) {
      return goals.map(g => {
        if (g.id === parentId) {
          const existingTasks    = (g.children || []).filter(c => !c.isSubGoal);
          const existingSubGoals = (g.children || []).filter(c =>  c.isSubGoal);
          const newSubGoal = {
            ...subGoal,
            children:  [...existingTasks],
            toLearn:   [...(g.toLearn   || [])],
            mmTargets: { ...(g.mmTargets || {}) },
            milestones: [...(g.milestones || [])],
          };
          return {
            ...g,
            children:  [...existingSubGoals, newSubGoal],
            toLearn:   [],
            mmTargets: {},
            milestones: [],
          };
        }
        return { ...g, children: addSubGoalAndMigrateTasks(g.children || [], parentId, subGoal) };
      });
    }

    function deleteNode(goals, id) {
      return goals
        .filter(g => g.id !== id)
        .map(g => ({ ...g, children: deleteNode(g.children || [], id) }));
    }

    function deleteNodeKeepChildren(goals, id) {
      const result = [];
      for (const g of goals) {
        if (g.id === id) {
          result.push(...(g.children || []));
        } else {
          result.push({ ...g, children: deleteNodeKeepChildren(g.children || [], id) });
        }
      }
      return result;
    }

    function updateTitle(goals, id, title) {
      return goals.map(g =>
        g.id === id ? { ...g, title }
                    : { ...g, children: updateTitle(g.children || [], id, title) }
      );
    }

    function updateDate(goals, id, date) {
      return goals.map(g =>
        g.id === id ? { ...g, scheduledDate: date }
                    : { ...g, children: updateDate(g.children || [], id, date) }
      );
    }

    function flattenAll(goals) {
      const out = [];
      const walk = ns => ns.forEach(n => { out.push(n); walk(n.children || []); });
      walk(goals);
      return out;
    }

    function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

    function getLeaves(node, allGoals = null) {
      if (!node) return [];
      if (node.isLink) {
        const orig = resolveLinkedTask(node, allGoals);
        return orig ? getLeaves(orig, allGoals) : [];
      }
      if (isMilestoneNode(node) && (node.children || []).length === 0) return [];
      if ((node.children || []).length === 0) return [node];
      return (node.children || []).flatMap(c => getLeaves(c, allGoals));
    }

    function parentHasMilestoneChild(parent, milestoneId, excludeId = null, allGoals = null) {
      const seen = new Set();
      return (parent?.children || []).some(child => {
        if (!child || child.id === excludeId) return false;
        let node = child;
        if (child.isLink) {
          node = allGoals && findNode(allGoals, child.linkedTaskId);
          if (!node || seen.has(node.id)) return false;
          seen.add(node.id);
        }
        return node.id !== excludeId && isMilestoneNode(node) && node.milestoneId === milestoneId;
      });
    }

    function findNodePath(nodes, id, path = []) {
      for (const n of nodes) {
        const next = [...path, n];
        if (n.id === id) return next;
        const found = findNodePath(n.children || [], id, next);
        if (found) return found;
      }
      return null;
    }

    function addMilestoneType(goals, ownerId, title) {
      return goals.map(g => {
        if (g.id === ownerId) {
          return { ...g, milestones: [...(g.milestones || []), { id: uid(), title, createdAt: Date.now() }] };
        }
        return { ...g, children: addMilestoneType(g.children || [], ownerId, title) };
      });
    }

    function renameMilestoneType(goals, ownerId, milestoneId, title) {
      function updateBlockTitles(nodes) {
        return nodes.map(n => ({
          ...n,
          title: isMilestoneNode(n) && n.milestoneId === milestoneId ? title : n.title,
          children: updateBlockTitles(n.children || []),
        }));
      }
      return goals.map(g => {
        if (g.id === ownerId) {
          return {
            ...g,
            milestones: (g.milestones || []).map(m => m.id === milestoneId ? { ...m, title } : m),
            children: updateBlockTitles(g.children || []),
          };
        }
        return { ...g, children: renameMilestoneType(g.children || [], ownerId, milestoneId, title) };
      });
    }

    function deleteMilestoneType(goals, ownerId, milestoneId) {
      function convertBlocks(nodes) {
        return nodes.map(n => {
          const converted = isMilestoneNode(n) && n.milestoneId === milestoneId;
          return {
            ...n,
            taskType: converted ? 'task' : n.taskType,
            milestoneId: converted ? null : n.milestoneId,
            children: convertBlocks(n.children || []),
          };
        });
      }
      return goals.map(g => {
        if (g.id === ownerId) {
          return {
            ...g,
            milestones: (g.milestones || []).filter(m => m.id !== milestoneId),
            children: convertBlocks(g.children || []),
          };
        }
        return { ...g, children: deleteMilestoneType(g.children || [], ownerId, milestoneId) };
      });
    }

    function reorderMilestoneType(goals, ownerId, milestoneId, dir) {
      return goals.map(g => {
        if (g.id === ownerId) {
          const milestones = [...(g.milestones || [])];
          const idx = milestones.findIndex(m => m.id === milestoneId);
          const nextIdx = idx + dir;
          if (idx < 0 || nextIdx < 0 || nextIdx >= milestones.length) return g;
          const [moved] = milestones.splice(idx, 1);
          milestones.splice(nextIdx, 0, moved);
          return { ...g, milestones };
        }
        return { ...g, children: reorderMilestoneType(g.children || [], ownerId, milestoneId, dir) };
      });
    }

    function normalizeMilestonePeriod(startDate, endDate) {
      const clean = d => d && d >= MILESTONE_CAL_START && d <= MILESTONE_CAL_END ? d : null;
      const start = clean(startDate);
      const end = clean(endDate);
      if (!start && !end) return { startDate: null, endDate: null };
      if (start && !end) return { startDate: start, endDate: start };
      if (!start && end) return { startDate: end, endDate: end };
      return start <= end
        ? { startDate: start, endDate: end }
        : { startDate: end, endDate: start };
    }

    function withMilestonePeriod(milestone, startDate, endDate) {
      const next = { ...milestone };
      if (startDate && endDate) {
        next.startDate = startDate;
        next.endDate = endDate;
      } else {
        delete next.startDate;
        delete next.endDate;
      }
      return next;
    }

    function updateMilestonePeriod(goals, ownerId, milestoneId, startDate, endDate) {
      const period = normalizeMilestonePeriod(startDate, endDate);
      return goals.map(g => {
        if (g.id === ownerId) {
          return {
            ...g,
            milestones: (g.milestones || []).map(m =>
              m.id === milestoneId ? withMilestonePeriod(m, period.startDate, period.endDate) : m
            ),
          };
        }
        return { ...g, children: updateMilestonePeriod(g.children || [], ownerId, milestoneId, period.startDate, period.endDate) };
      });
    }

    function collectMilestoneOwners(node, allGoals) {
      const out = [];
      const seen = new Set();
      function walk(n) {
        if (!n) return;
        if (n.isLink) {
          const orig = allGoals && findNode(allGoals, n.linkedTaskId);
          if (orig) walk(orig);
          return;
        }
        const subGoals = (n.children || []).filter(c => c.isSubGoal);
        if (subGoals.length === 0) {
          if (!seen.has(n.id)) {
            seen.add(n.id);
            out.push(n);
          }
          return;
        }
        subGoals.forEach(walk);
      }
      walk(node);
      return out;
    }

    function collectMilestoneBlocks(owner, milestoneId, allGoals) {
      const out = [];
      const seen = new Set();
      function walk(n) {
        if (!n) return;
        if (n.isLink) {
          const orig = allGoals && findNode(allGoals, n.linkedTaskId);
          if (orig && !seen.has(orig.id)) {
            seen.add(orig.id);
            walk(orig);
          }
          return;
        }
        if (isMilestoneNode(n) && n.milestoneId === milestoneId) out.push(n);
        (n.children || []).forEach(walk);
      }
      (owner.children || []).forEach(walk);
      return out;
    }

    function updateSchedule(goals, id, date, time) {
      return goals.map(g => {
        if (g.id === id) {
          if (g.taskType === 'routine') {
            if (date === null) return { ...g, routineDates: {} };
            const prev = (g.routineDates || {})[date];
            return { ...g, routineDates: {
              ...(g.routineDates || {}),
              [date]: { time: time || prev?.time || '09:00', done: prev?.done || false }
            }};
          }
          return { ...g, scheduledDate: date, scheduledTime: time };
        }
        return { ...g, children: updateSchedule(g.children || [], id, date, time) };
      });
    }

    function addDissectChild(goals, parentId, childTitle) {
      return goals.map(g => {
        if (g.id === parentId) {
          const child = {
            id: String(Date.now()) + Math.random().toString(36).slice(2, 6),
            title: childTitle,
            children: [],
            completed: false,
            isSubGoal: false,
            scheduledDate: g.scheduledDate,
            scheduledTime: g.scheduledTime,
            duration: g.duration || 60,
            createdAt: Date.now(),
          };
          return { ...g, children: [...(g.children || []), child] };
        }
        return { ...g, children: addDissectChild(g.children || [], parentId, childTitle) };
      });
    }

    function removeDissectChild(goals, parentId, childId) {
      return goals.map(g => {
        if (g.id === parentId) {
          return { ...g, children: (g.children || []).filter(c => c.id !== childId) };
        }
        return { ...g, children: removeDissectChild(g.children || [], parentId, childId) };
      });
    }

    function updateNote(nodes, id, fields) {
      return nodes.map(n =>
        n.id === id
          ? { ...n, ...fields }
          : { ...n, children: updateNote(n.children || [], id, fields) }
      );
    }

    function updateNoteInTask(nodes, taskId, noteId, fields) {
      return nodes.map(n =>
        n.id === taskId
          ? { ...n, notes: (n.notes || []).map(nt => nt.id === noteId ? { ...nt, ...fields } : nt) }
          : { ...n, children: updateNoteInTask(n.children || [], taskId, noteId, fields) }
      );
    }

    function addNoteToTask(nodes, id, note) {
      return nodes.map(n =>
        n.id === id
          ? { ...n, notes: [...(n.notes || []), note] }
          : { ...n, children: addNoteToTask(n.children || [], id, note) }
      );
    }

    function removeNoteFromTask(nodes, id, noteId) {
      return nodes.map(n =>
        n.id === id
          ? { ...n, notes: (n.notes || []).filter(nt => nt.id !== noteId) }
          : { ...n, children: removeNoteFromTask(n.children || [], id, noteId) }
      );
    }

    function addNoteToSaAction(actions, id, note) {
      return actions.map(a => a.id === id ? { ...a, notes: [...(a.notes || []), note] } : a);
    }
    function removeNoteFromSaAction(actions, id, noteId) {
      return actions.map(a => a.id === id ? { ...a, notes: (a.notes || []).filter(n => n.id !== noteId) } : a);
    }

    function addChildAndTransferNotes(goals, parentId, child) {
      function walk(nodes, insideMilestone = false) {
        return nodes.map(g => {
          const nextInsideMilestone = insideMilestone || isMilestoneNode(g);
          if (g.id === parentId) {
            if (
              isMilestoneNode(child) &&
              (nextInsideMilestone || parentHasMilestoneChild(g, child.milestoneId, child.id, goals))
            ) return g;
            const isFirst = (g.children || []).length === 0;
            const parentNotes = g.notes || [];
            const newChild = isFirst && parentNotes.length > 0
              ? { ...child, notes: [...parentNotes] } : child;
            return {
              ...g,
              children: [...(g.children || []), newChild],
              ...(isFirst && parentNotes.length > 0 ? { notes: [] } : {}),
            };
          }
          return { ...g, children: walk(g.children || [], nextInsideMilestone) };
        });
      }
      return walk(goals);
    }

    function getSCTextBlocks(link) {
      const blocks = Array.isArray(link?.textBlocks) ? link.textBlocks : [];
      if (blocks.length) return blocks;
      const legacyText = (link?.text || '').trim();
      return legacyText ? [{ id: link.id + '_m', title: '', explanation: legacyText }] : [];
    }

    function addSourcePinToTask(nodes, id, pin) {
      return nodes.map(n =>
        n.id === id
          ? { ...n, sourcePins: [...(n.sourcePins || []), pin] }
          : { ...n, children: addSourcePinToTask(n.children || [], id, pin) }
      );
    }

    function removeSourcePinFromTask(nodes, id, pinId) {
      return nodes.map(n =>
        n.id === id
          ? { ...n, sourcePins: (n.sourcePins || []).filter(p => p.id !== pinId) }
          : { ...n, children: removeSourcePinFromTask(n.children || [], id, pinId) }
      );
    }

    function updateTaskProps(goals, id, props) {
      return goals.map(g =>
        g.id === id
          ? { ...g, ...props }
          : { ...g, children: updateTaskProps(g.children || [], id, props) }
      );
    }

    function findNode(goals, id) {
      for (const g of goals) {
        if (g.id === id) return g;
        if (g.children?.length) { const f = findNode(g.children, id); if (f) return f; }
      }
      return null;
    }

    function resolveLinkedTask(node, allGoals) {
      if (!node?.isLink) return node || null;
      return allGoals ? findNode(allGoals, node.linkedTaskId) : null;
    }

    function getSelectableTasks(goals) {
      const out = [];
      function walk(nodes, isTop) {
        for (const n of nodes) {
          if (n.isLink) continue;
          if (isMilestoneNode(n)) { walk(n.children || [], false); continue; }
          if (!isTop && !n.isSubGoal) out.push(n);
          walk(n.children || [], false);
        }
      }
      walk(goals, true);
      return out;
    }

    function addLinkedTask(goals, parentId, linkedTaskId) {
      return goals.map(g =>
        g.id === parentId
          ? { ...g, children: [...(g.children || []), { id: uid(), linkedTaskId, isLink: true }] }
          : { ...g, children: addLinkedTask(g.children || [], parentId, linkedTaskId) }
      );
    }

    function unlinkTask(goals, linkRefId) {
      return goals
        .filter(g => g.id !== linkRefId)
        .map(g => ({ ...g, children: unlinkTask(g.children || [], linkRefId) }));
    }

    function getSelectableGoals(goals, excludeId) {
      const excluded = new Set();
      function markExcluded(n) { excluded.add(n.id); (n.children||[]).forEach(markExcluded); }
      function findAndMark(nodes) {
        for (const n of nodes) {
          if (n.id === excludeId) { markExcluded(n); return; }
          findAndMark(n.children || []);
        }
      }
      findAndMark(goals);
      const out = [];
      function walk(nodes, depth) {
        for (const n of nodes) {
          if (n.isLink || excluded.has(n.id)) continue;
          if (depth === 0 || n.isSubGoal) out.push({ ...n, _depth: depth === 0 ? 0 : 1 });
          walk(n.children || [], depth + 1);
        }
      }
      walk(goals, 0);
      return out;
    }

    function nestGoalIntoGoal(goals, draggedId, targetId) {
      if (draggedId === targetId) return goals;
      const dragged = goals.find(g => g.id === draggedId);
      if (!dragged) return goals;
      return goals
        .filter(g => g.id !== draggedId)
        .map(g => {
          if (g.id !== targetId) return g;
          const existingSubGoals = (g.children || []).filter(c => c.isSubGoal);
          const existingTasks    = (g.children || []).filter(c => !c.isSubGoal);
          const hasData = (g.toLearn || []).length > 0
            || Object.keys(g.mmTargets || {}).length > 0
            || (g.milestones || []).length > 0
            || existingTasks.length > 0;

          if (existingSubGoals.length === 0 && hasData) {
            const originalSubGoal = {
              id: uid(),
              title: 'original',
              isSubGoal: true,
              completed: false,
              createdAt: Date.now(),
              children: [...existingTasks],
              toLearn: [...(g.toLearn || [])],
              mmTargets: { ...(g.mmTargets || {}) },
              milestones: [...(g.milestones || [])],
            };
            return {
              ...g,
              children: [originalSubGoal, { ...dragged, isSubGoal: true }],
              toLearn: [],
              mmTargets: {},
              milestones: [],
            };
          }

          return { ...g, children: [...(g.children || []), { ...dragged, isSubGoal: true }] };
        });
    }

    function promoteSubGoalToUltimate(goals, subGoalId) {
      let promoted = null;
      function remove(nodes) {
        return nodes
          .filter(n => { if (n.id === subGoalId) { promoted = { ...n, isSubGoal: false }; return false; } return true; })
          .map(n => ({ ...n, children: remove(n.children || []) }));
      }
      const updated = remove(goals);
      return promoted ? [...updated, promoted] : goals;
    }

    function containsId(nodes, id) {
      for (const n of nodes) {
        if (n.id === id) return true;
        if (containsId(n.children || [], id)) return true;
      }
      return false;
    }

    function nestSubGoalIntoSubGoal(goals, draggedId, targetId) {
      if (draggedId === targetId) return goals;
      const draggedNode = (function find(nodes) {
        for (const n of nodes) { if (n.id === draggedId) return n; const f = find(n.children||[]); if (f) return f; }
      })(goals);
      if (draggedNode && containsId(draggedNode.children || [], targetId)) return goals;
      let dragged = null;
      function removeDragged(nodes) {
        return nodes
          .filter(n => { if (n.id === draggedId) { dragged = n; return false; } return true; })
          .map(n => ({ ...n, children: removeDragged(n.children || []) }));
      }
      const withoutDragged = removeDragged(goals);
      if (!dragged) return goals;
      function insertIntoTarget(nodes) {
        return nodes.map(n => {
          if (n.id === targetId) {
            const existingSubGoals = (n.children || []).filter(c => c.isSubGoal);
            const existingTasks    = (n.children || []).filter(c => !c.isSubGoal);
            const hasData = (n.toLearn || []).length > 0
              || Object.keys(n.mmTargets || {}).length > 0
              || (n.milestones || []).length > 0
              || existingTasks.length > 0;
            if (existingSubGoals.length === 0 && hasData) {
              const defaultSubGoal = {
                id: uid(), title: 'default', isSubGoal: true,
                completed: false, createdAt: Date.now(),
                children: [...existingTasks],
                toLearn: [...(n.toLearn || [])],
                mmTargets: { ...(n.mmTargets || {}) },
                milestones: [...(n.milestones || [])],
              };
              return { ...n, children: [defaultSubGoal, { ...dragged, isSubGoal: true }], toLearn: [], mmTargets: {}, milestones: [] };
            }
            return { ...n, children: [...(n.children || []), { ...dragged, isSubGoal: true }] };
          }
          return { ...n, children: insertIntoTarget(n.children || []) };
        });
      }
      return insertIntoTarget(withoutDragged);
    }

    function nestTaskIntoTask(goals, draggedId, targetId) {
      if (draggedId === targetId) return goals;
      const draggedPath = findNodePath(goals, draggedId);
      const targetPath = findNodePath(goals, targetId);
      const draggedNode = draggedPath?.[draggedPath.length - 1];
      const targetNode = targetPath?.[targetPath.length - 1];
      if (isMilestoneNode(draggedNode)) {
        if ((targetPath || []).some(isMilestoneNode)) return goals;
        if (targetNode && parentHasMilestoneChild(targetNode, draggedNode.milestoneId, draggedNode.id, goals)) return goals;
      }
      if (draggedNode && containsId(draggedNode.children || [], targetId)) return goals;
      let dragged = null;
      function removeDragged(nodes) {
        return nodes
          .filter(n => { if (n.id === draggedId) { dragged = n; return false; } return true; })
          .map(n => ({ ...n, children: removeDragged(n.children || []) }));
      }
      const withoutDragged = removeDragged(goals);
      if (!dragged) return goals;
      function insertIntoTarget(nodes) {
        return nodes.map(n => {
          if (n.id === targetId) {
            const existingChildren = n.children || [];
            const targetNotes = n.notes || [];
            const isFirstChild = existingChildren.length === 0 && targetNotes.length > 0;
            const newDragged = isFirstChild
              ? { ...dragged, notes: [...(dragged.notes || []), ...targetNotes] }
              : dragged;
            return {
              ...n,
              children: [...existingChildren, newDragged],
              ...(isFirstChild ? { notes: [] } : {}),
            };
          }
          return { ...n, children: insertIntoTarget(n.children || []) };
        });
      }
      return insertIntoTarget(withoutDragged);
    }

    function reorderSibling(nodes, draggedId, targetId, insertBefore) {
      const di = nodes.findIndex(n => n.id === draggedId);
      const ti = nodes.findIndex(n => n.id === targetId);
      if (di !== -1 && ti !== -1) {
        const arr = [...nodes];
        const [moved] = arr.splice(di, 1);
        const newTi = arr.findIndex(n => n.id === targetId);
        arr.splice(insertBefore ? newTi : newTi + 1, 0, moved);
        return arr;
      }
      return nodes.map(n => ({ ...n, children: reorderSibling(n.children || [], draggedId, targetId, insertBefore) }));
    }

    function addLinkedSubGoal(goals, parentId, linkedGoalId) {
      return goals.map(g =>
        g.id === parentId
          ? { ...g, children: [...(g.children||[]), { id: uid(), linkedTaskId: linkedGoalId, isLink: true, isSubGoal: true }] }
          : { ...g, children: addLinkedSubGoal(g.children||[], parentId, linkedGoalId) }
      );
    }

    function formatTime12(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const p   = h >= 12 ? 'pm' : 'am';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12}:${String(m).padStart(2, '0')}${p}`;
    }
    function addMins(t, mins) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const total = h * 60 + m + mins;
      const eh = Math.floor(total / 60) % 24;
      const em = total % 60;
      return String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
    }

    function _readMMs()        { return _readP('mms',        []); }
    function _readSessions()   { return _readP('sessions',   []); }
    function _readMGChanges()  { return _readP('mgChanges',  []); }

    function getMGsForDay(ds, mgSchedule) {
      if (Object.prototype.hasOwnProperty.call(mgSchedule, ds)) return mgSchedule[ds];
      const d = new Date(ds + 'T12:00:00');
      for (let i = 1; i <= 30; i++) {
        d.setDate(d.getDate() - 1);
        const prev = toDateStr(d);
        if (Object.prototype.hasOwnProperty.call(mgSchedule, prev)) return mgSchedule[prev];
      }
      return [];
    }

    function getMGTextForDay(mmId, date, mgChanges) {
      const relevant = (mgChanges || [])
        .filter(c => c.mmId === mmId && c.date <= date)
        .sort((a, b) => b.date.localeCompare(a.date));
      return relevant[0]?.newMG || '';
    }

    function toggleMGDay(ds, mmId, mgSchedule, setMgSchedule) {
      const cur  = getMGsForDay(ds, mgSchedule);
      const next = cur.includes(mmId) ? cur.filter(id => id !== mmId) : [...cur, mmId];
      setMgSchedule(prev => ({ ...prev, [ds]: next }));
    }

    const SIR_INTERVALS = [1, 3, 7, 14, 30];
    const PALETTE = ["#6366f1","#ec4899","#f59e0b","#10b981","#3b82f6","#8b5cf6","#14b8a6","#f97316","#06b6d4","#a3e635"];
    const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const MILESTONE_CAL_START = "2026-01-01";
    const MILESTONE_CAL_END   = "2033-12-31";
    const getDIM      = (y,m) => new Date(y,m+1,0).getDate();
    const getFirstDay = (y,m) => new Date(y,m,1).getDay();
    const dStr        = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    function buildSirDoneMap(sessions) {
      const map = {};
      (sessions || []).forEach(s => { if (s.done) map[s.mmId] = (map[s.mmId] || 0) + 1; });
      return map;
    }

    function buildMMTree(mms) {
      const byId = Object.fromEntries(mms.map(m => [m.id, m]));
      const roots = mms.filter(m => !(m.parentIds || []).some(pid => byId[pid]));
      function buildNode(mm) {
        const children = mms.filter(m => (m.parentIds || []).includes(mm.id));
        return { mm, children: children.map(buildNode) };
      }
      return roots.map(buildNode);
    }

    function getMMDescendants(mmId, mms, _visited = new Set()) {
      const children = mms.filter(m => (m.parentIds || []).includes(mmId));
      return children.flatMap(c => {
        if (_visited.has(c.id)) return [];
        _visited.add(c.id);
        return [c.id, ...getMMDescendants(c.id, mms, _visited)];
      });
    }

    function buildToLearnTree(toLearnIds, mms) {
      const set = new Set(toLearnIds);
      function buildChildren(parentId) {
        return toLearnIds
          .map(id => mms.find(m => m.id === id))
          .filter(mm => mm && (mm.parentIds || []).includes(parentId))
          .map(mm => ({ mm, children: buildChildren(mm.id) }));
      }
      return toLearnIds
        .map(id => mms.find(m => m.id === id))
        .filter(mm => mm && !(mm.parentIds || []).some(pid => set.has(pid)))
        .map(mm => ({ mm, children: buildChildren(mm.id) }));
    }

    function updateGoalToLearn(goals, goalId, mmIds) {
      return goals.map(g =>
        g.id === goalId
          ? { ...g, toLearn: mmIds }
          : { ...g, children: updateGoalToLearn(g.children || [], goalId, mmIds) }
      );
    }

    function updateGoalMmTargets(goals, goalId, mmTargets) {
      return goals.map(g =>
        g.id === goalId
          ? { ...g, mmTargets }
          : { ...g, children: updateGoalMmTargets(g.children || [], goalId, mmTargets) }
      );
    }

    function expandAnchorToLearn(goals, mms) {
      function walk(nodes) {
        return nodes.map(n => {
          const updated = { ...n, children: walk(n.children || []) };
          const tl = n.toLearn || [];
          if (tl.length === 0) return updated;
          const existing = new Set(tl);
          const extraSet = new Set(existing);
          const extra = tl
            .filter(id => { const mm = mms.find(m => m.id === id); return mm && mm.type === 'anchor'; })
            .flatMap(id => getMMDescendants(id, mms))
            .filter(id => {
              if (extraSet.has(id)) return false;
              extraSet.add(id);
              return true;
            });
          if (extra.length === 0) return updated;
          return { ...updated, toLearn: [...tl, ...extra] };
        });
      }
      return walk(goals);
    }

    // ── MM goal-target helpers ────────────────────────────────────────────────

    const STAGE_ORDER = { 1:1, 2:2, 3:3, 4:4, sir:5, sir1:6, sir2:7, sir3:8, sir4:9, sir5:10, finished:11 };
    const STAGE_COLORS_SIR = ["#7c3aed","#2563eb","#0891b2","#0d9488","#059669"];

    // target = { stage?: stageKey, level?: number }
    function isMMTargetMet(mm, target, sirDoneMap) {
      if (!target) return true;
      let effOrder;
      if (mm.ksStage === 'sir') {
        const done = (sirDoneMap || {})[mm.id] || 0;
        effOrder = 5 + done; // sir=5, sir1=6, ..., sir5=10
      } else {
        effOrder = STAGE_ORDER[mm.ksStage] || 0;
      }
      const stageMet = !target.stage || effOrder >= (STAGE_ORDER[target.stage] || 0);
      const levelMet = !target.level || (mm.rating || 0) >= Number(target.level);
      return stageMet && levelMet;
    }

    // Returns null (no active targets), true (all met), or false (some unmet)
    function computeMMAutoComplete(goal, mms, sirDoneMap) {
      const entries = Object.entries(goal.mmTargets || {});
      const active = entries.filter(([, t]) => t && (t.stage || t.level));
      if (active.length === 0) return null;
      return active.every(([mmId, target]) => {
        const mm = mms.find(m => m.id === mmId);
        return mm && isMMTargetMet(mm, target, sirDoneMap);
      });
    }

    // Returns 0.0–1.0 for a single MM's fractional progress toward its target
    function mmProgressFraction(mm, target, sirDoneMap) {
      if (!mm || !target) return 0;
      let stageFrac = null, levelFrac = null;
      if (target.stage) {
        const targetOrder = STAGE_ORDER[target.stage] || 1;
        const effOrder = mm.ksStage === 'sir'
          ? 5 + ((sirDoneMap || {})[mm.id] || 0)
          : (STAGE_ORDER[mm.ksStage] || 0);
        stageFrac = Math.min(1, effOrder / targetOrder);
      }
      if (target.level) {
        levelFrac = Math.min(1, (mm.rating || 0) / Number(target.level));
      }
      if (stageFrac !== null && levelFrac !== null) return (stageFrac + levelFrac) / 2;
      return stageFrac !== null ? stageFrac : (levelFrac !== null ? levelFrac : 0);
    }

    // ── SA colour palette ─────────────────────────────────────────────────────

    const SA_COLORS = [
      '#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316',
      '#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6',
    ];

    // ── MindMapsBadge ─────────────────────────────────────────────────────────

    function MindMapsBadge({ mm, sirDoneMap }) {
      const sirDone = mm.ksStage === 'sir' ? ((sirDoneMap || {})[mm.id] || 0) : 0;
      const stageLabel =
        mm.ksStage === 'sir'       ? (sirDone >= 5 ? 'FIN' : `SIR T${sirDone+1}`)
        : mm.ksStage === 'finished' ? 'FIN'
        : mm.ksStage               ? `S${mm.ksStage}`
        : null;
      const typeLabel = mm.type === 'anchor' ? 'Anchor' : `T${mm.type}`;
      const color = mm.color || '#6366f1';
      return (
        <span className="inline-flex items-center gap-1 flex-shrink-0 flex-wrap">
          <span className="text-[10px] px-1.5 py-0.5 rounded font-mono font-bold"
            style={{ backgroundColor: color + '22', color }}>
            {mm.name}
          </span>
          <span className="text-[9px] px-1 py-0.5 rounded bg-gray-800 text-gray-500">{typeLabel}</span>
          {stageLabel && (
            <span className="text-[9px] px-1 py-0.5 rounded bg-indigo-900/50 text-indigo-300">{stageLabel}</span>
          )}
          {mm.ksStage === 'sir' && (
            <span className="inline-flex gap-0.5 items-center">
              {[0,1,2,3,4].map(i => (
                <span key={i} style={{
                  width:6, height:6, borderRadius:2, display:'inline-block',
                  backgroundColor: i < sirDone ? STAGE_COLORS_SIR[i] : '#1f2937',
                  border: `1px solid ${i < sirDone ? STAGE_COLORS_SIR[i] : '#374151'}`
                }}/>
              ))}
            </span>
          )}
          {String(mm.type) === '2' && mm.rating != null && (
            <span className="text-[9px] px-1 py-0.5 rounded font-bold"
              style={{ backgroundColor: '#312e81', color: '#a5b4fc' }}>
              {mm.rating}/10
            </span>
          )}
        </span>
      );
    }

    // ── MMTreeNode + MindMapsPanel ────────────────────────────────────────────

    function MMTreeNode({ node, depth, sirDoneMap }) {
      const [collapsed, setCollapsed] = useState(false);
      const { mm, children } = node;
      const sirDone = mm.ksStage === 'sir' ? ((sirDoneMap || {})[mm.id] || 0) : 0;
      return (
        <div>
          <div style={{ paddingLeft: depth * 20 }}
            className="flex flex-col gap-1 py-1 px-2 rounded hover:bg-gray-800/40">
            <div className="flex items-center gap-2">
              {children.length > 0
                ? <button onClick={() => setCollapsed(c => !c)}
                    className="text-gray-600 hover:text-gray-300 text-xs w-3 flex-shrink-0">
                    {collapsed ? '▶' : '▼'}
                  </button>
                : <span className="w-3 flex-shrink-0" />
              }
              <MindMapsBadge mm={mm} sirDoneMap={sirDoneMap} />
            </div>
            {mm.ksStage === 'sir' && (
              <div style={{ paddingLeft: 20 }} className="flex items-center gap-1 pb-1">
                {SIR_INTERVALS.map((iv, i) => {
                  const done = i < sirDone;
                  const isNext = i === sirDone;
                  const col = STAGE_COLORS_SIR[i];
                  return (
                    <React.Fragment key={i}>
                      <div className="flex flex-col items-center" style={{ minWidth: 32 }}>
                        <div className="rounded px-1 py-0.5 text-[9px] font-bold text-center w-full"
                          style={{
                            backgroundColor: col,
                            opacity: done ? 1 : isNext ? 0.6 : 0.25,
                            color: 'white',
                            boxShadow: isNext ? `0 0 4px ${col}` : 'none',
                          }}>
                          {done ? '✓' : `D${iv}`}
                        </div>
                      </div>
                      {i < 4 && <div style={{ flex:1, height:1, backgroundColor: done ? col : '#1f2937', minWidth:4 }}/>}
                    </React.Fragment>
                  );
                })}
                <span className="text-[9px] text-gray-600 ml-1">{sirDone >= 5 ? 'FIN' : `T${sirDone+1}`}</span>
              </div>
            )}
          </div>
          {children.length > 0 && !collapsed && children.map(child => (
            <MMTreeNode key={child.mm.id} node={child} depth={depth + 1} sirDoneMap={sirDoneMap} />
          ))}
        </div>
      );
    }

    function MindMapsPanel() {
      const mms = _readMMs();
      const sessions = _readSessions();
      const sirDoneMap = buildSirDoneMap(sessions);
      const tree = buildMMTree(mms);
      if (!mms.length) return (
        <div className="text-center py-16 text-gray-700">
          <div className="text-3xl mb-3">◎</div>
          <div className="text-sm">No Mind Maps in this slot.</div>
          <div className="text-xs mt-1 text-gray-500">
            Create MMs in <a href="sir-ks02.html" className="text-indigo-400 hover:underline">KS02 Tracker</a>.
          </div>
        </div>
      );
      return (
        <div>
          <div className="text-gray-700 tracking-widest mb-4 text-xs">
            {mms.length} MIND MAPS — read only · manage in KS02 Tracker
          </div>
          <div className="rounded-xl border border-gray-800 bg-gray-900/70 px-3 py-2">
            {tree.map(node => <MMTreeNode key={node.mm.id} node={node} depth={0} sirDoneMap={sirDoneMap} />)}
          </div>
        </div>
      );
    }

    // ── DonutChart ────────────────────────────────────────────────────────────

    function DonutChart({ done, total }) {
      const pct  = total === 0 ? 0 : done / total;
      const full = pct === 1;
      const r    = 24;
      const cx   = 32, cy = 32;
      const circ = 2 * Math.PI * r;
      const fill = circ * pct;
      const color = full ? '#10b981' : pct > 0.5 ? '#6366f1' : '#4f46e5';

      return (
        <svg width={64} height={64} viewBox="0 0 64 64" className="flex-shrink-0">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e293b" strokeWidth={8} />
          {pct > 0 && (
            <circle
              cx={cx} cy={cy} r={r}
              fill="none"
              stroke={color}
              strokeWidth={8}
              strokeLinecap="round"
              strokeDasharray={`${fill} ${circ - fill}`}
              transform={`rotate(-90 ${cx} ${cy})`}
              style={{ transition: 'stroke-dasharray 0.5s ease' }}
            />
          )}
          <text x={cx} y={cy - 5} textAnchor="middle" dominantBaseline="middle"
            fontSize={11} fontWeight="bold" fontFamily="monospace"
            fill={full ? '#10b981' : '#e2e8f0'}>
            {Math.round(pct * 100)}%
          </text>
          <text x={cx} y={cy + 9} textAnchor="middle" dominantBaseline="middle"
            fontSize={8} fontFamily="monospace"
            fill={full ? '#6ee7b7' : '#6b7280'}>
            {done}/{total}
          </text>
        </svg>
      );
    }

    // ── ProgressBar ───────────────────────────────────────────────────────────

    function ProgressBar({ done, total, slim = false }) {
      const pct     = total === 0 ? 0 : (done / total) * 100;
      const full    = done >= total && total > 0;
      const barH    = slim ? 'h-1' : 'h-1.5';
      const color   = full ? '#10b981' : '#6366f1';

      return (
        <div className="flex items-center gap-2 w-full">
          <div className={`flex-1 ${barH} bg-gray-800 rounded-full overflow-hidden`}>
            <div
              className={`${barH} rounded-full`}
              style={{ width: `${pct}%`, backgroundColor: color, transition: 'width 0.4s ease' }}
            />
          </div>
          <span className={`text-xs font-mono w-10 text-right flex-shrink-0 tabular-nums ${full ? 'text-emerald-400' : 'text-gray-600'}`}>
            {done}/{total}
          </span>
        </div>
      );
    }

    // ── MMPickerModal ─────────────────────────────────────────────────────────

    function MMPickerModal({ mms, linkedIds, onLink, onLinkMultiple, onClose, sirDoneMap }) {
      const [search, setSearch] = useState('');
      const inputRef = useRef(null);
      useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
      const filtered = mms.filter(m => m.name.toLowerCase().includes(search.toLowerCase()));

      function handlePick(mm) {
        if (mm.type === 'anchor') {
          const descIds = getMMDescendants(mm.id, mms);
          const allIds = [mm.id, ...descIds];
          if (onLinkMultiple) onLinkMultiple(allIds);
          else allIds.forEach(id => onLink(id));
        } else {
          onLink(mm.id);
        }
        onClose();
      }

      return (
        <>
          <div className="fixed inset-0 z-40 bg-black/50" onClick={onClose} />
          <div className="fixed z-50 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2
                          w-80 max-h-96 flex flex-col bg-gray-900 border border-gray-700
                          rounded-xl shadow-2xl overflow-hidden">
            <div className="flex items-center justify-between px-4 py-3 border-b border-gray-800">
              <span className="text-xs font-bold text-gray-300 tracking-widest">ADD TO LEARN</span>
              <button onClick={onClose} className="text-gray-600 hover:text-gray-300 text-sm">×</button>
            </div>
            <div className="px-3 py-2 border-b border-gray-800">
              <input ref={inputRef} value={search} onChange={e => setSearch(e.target.value)}
                onKeyDown={e => { if (e.key === 'Escape') onClose(); }}
                placeholder="Search Mind Maps…"
                className="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5
                           text-xs text-white outline-none placeholder-gray-600 focus:border-indigo-600" />
            </div>
            <div className="flex-1 overflow-y-auto py-1">
              {filtered.length === 0
                ? <div className="px-4 py-4 text-xs text-gray-600 text-center">No MMs found.</div>
                : filtered.map(mm => {
                    const isAnchor = mm.type === 'anchor';
                    const descIds = isAnchor ? getMMDescendants(mm.id, mms) : [];
                    const allIds = isAnchor ? [mm.id, ...descIds] : [mm.id];
                    const allLinked = allIds.every(id => linkedIds.includes(id));
                    const childCount = descIds.length;
                    return (
                      <button key={mm.id} onClick={() => { if (!allLinked) handlePick(mm); }}
                        disabled={allLinked}
                        className={`w-full text-left px-4 py-2 flex items-center gap-2 text-xs transition-colors
                          ${allLinked ? 'opacity-40 cursor-default' : 'hover:bg-gray-800 cursor-pointer'}`}>
                        <MindMapsBadge mm={mm} sirDoneMap={sirDoneMap} />
                        {isAnchor && childCount > 0 && !allLinked && (
                          <span className="text-[9px] text-indigo-400 flex-shrink-0">+{childCount} children</span>
                        )}
                        {allLinked && <span className="ml-auto text-gray-600 text-[10px]">linked</span>}
                      </button>
                    );
                  })
              }
            </div>
          </div>
        </>
      );
    }

    // ── GoalProgressViz ──────────────────────────────────────────────────────

    function GoalProgressViz({ node, goalColor, goals }) {
      const resolveLink = goals ? id => findNode(goals, id) : null;
      const { done, total } = countProgress(node, resolveLink);
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      const full = done === total && total > 0;
      const displayColor = full ? '#10b981' : goalColor;

      function collectLeaves(n) {
        const resolved = resolveLinkedTask(n, goals);
        if (!resolved) return [];
        if (resolved !== n) return collectLeaves(resolved);
        if (isMilestoneNode(n) && (n.children || []).length === 0) return [];
        if ((n.children || []).length === 0) return [{ id: n.id, done: n.completed }];
        return (n.children || []).flatMap(c => collectLeaves(c));
      }
      const leaves = (node.children || []).flatMap(c => collectLeaves(c));

      if (total === 0) {
        return (
          <div className="px-5 py-4 flex items-center gap-3">
            <span className="text-[10px] tracking-widest text-gray-700">PROGRESS</span>
            <span className="text-[10px] text-gray-700 italic">No tasks yet</span>
          </div>
        );
      }

      const useChunked = total > 40;

      return (
        <div className="px-5 py-4">
          <div className="flex items-center justify-between mb-3">
            <span className="text-[10px] tracking-widest text-gray-600">PROGRESS</span>
            <div className="flex items-center gap-2">
              <span className="text-2xl font-black tabular-nums leading-none" style={{ color: displayColor }}>{pct}%</span>
              <span className="text-xs text-gray-600 font-mono">{done}/{total}</span>
            </div>
          </div>
          {useChunked ? (
            <div className="h-5 w-full rounded-lg overflow-hidden bg-gray-800/70 relative">
              <div className="h-full rounded-lg transition-all duration-500" style={{ width: `${pct}%`, backgroundColor: displayColor, opacity: 0.9 }} />
              <div className="absolute inset-0 flex items-center justify-center">
                <span className="text-[10px] font-mono font-bold text-white/70 mix-blend-screen">{done} of {total} tasks complete</span>
              </div>
            </div>
          ) : (
            <div className="flex flex-wrap gap-1">
              {leaves.map((leaf, i) => (
                <div key={leaf.id || i}
                  className="rounded-sm transition-all duration-300"
                  style={{
                    width: 14, height: 14,
                    backgroundColor: leaf.done ? displayColor : 'transparent',
                    border: `1.5px solid ${leaf.done ? displayColor : '#374151'}`,
                    opacity: leaf.done ? 1 : 0.5,
                  }}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── ToLearnRow ────────────────────────────────────────────────────────────

    function ToLearnRow({ entry, depth, node, mms, sirDoneMap, onUpdateToLearn, onUpdateMmTargets }) {
      const { mm, children } = entry;
      const mmId = mm.id;
      const tgt = (node.mmTargets || {})[mmId] || {};
      const hasTarget = !!(tgt.stage || tgt.level);
      const met = hasTarget && isMMTargetMet(mm, tgt, sirDoneMap);
      const indicator = !hasTarget
        ? <span className="text-gray-700 text-[10px]">·</span>
        : met
          ? <span className="text-emerald-400 text-[10px] font-bold">✓</span>
          : <span className="text-amber-400 text-[10px]">○</span>;

      function setTarget(field, val) {
        const cur = (node.mmTargets || {})[mmId] || {};
        const next = { ...cur, [field]: val || undefined };
        let updatedTargets = { ...(node.mmTargets || {}) };
        if (!next.stage && !next.level && !next.milestone) {
          delete updatedTargets[mmId];
        } else {
          updatedTargets[mmId] = next;
        }
        if (field === 'milestone') {
          const toLearnSet = new Set(node.toLearn || []);
          const descendants = getMMDescendants(mmId, mms || []).filter(id => toLearnSet.has(id));
          for (const descId of descendants) {
            const descCur = updatedTargets[descId] || {};
            const descNext = { ...descCur, milestone: val || undefined };
            if (!descNext.stage && !descNext.level && !descNext.milestone) {
              delete updatedTargets[descId];
            } else {
              updatedTargets[descId] = descNext;
            }
          }
        }
        onUpdateMmTargets(node.id, updatedTargets);
      }

      function handleRemove() {
        const toRemove = new Set([mmId, ...getMMDescendants(mmId, mms || [])]);
        onUpdateToLearn(node.id, (node.toLearn || []).filter(id => !toRemove.has(id)));
        const updated = { ...(node.mmTargets || {}) };
        toRemove.forEach(id => delete updated[id]);
        onUpdateMmTargets(node.id, updated);
      }

      return (
        <div style={{ paddingLeft: depth * 14 }}>
          <div className="flex flex-col gap-1">
            <div className="flex items-center gap-1.5 flex-wrap">
              <MindMapsBadge mm={mm} sirDoneMap={sirDoneMap} />
              <select value={tgt.stage || ''} onChange={e => setTarget('stage', e.target.value)}
                className="text-[9px] bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-gray-400 outline-none focus:border-indigo-600 cursor-pointer"
                title="Goal stage target">
                <option value="">— stage</option>
                <option value="1">S1</option>
                <option value="2">S2</option>
                <option value="3">S3</option>
                <option value="4">S4</option>
                <option value="sir">SIR T1 (entered)</option>
                <option value="sir1">SIR T2 (D1 done)</option>
                <option value="sir2">SIR T3 (D3 done)</option>
                <option value="sir3">SIR T4 (D7 done)</option>
                <option value="sir4">SIR T5 (D14 done)</option>
                <option value="sir5">FIN (D30 done)</option>
              </select>
              {String(mm.type) === '2' && (
                <div className="flex items-center gap-0.5">
                  <input type="number" min="1" max="10" value={tgt.level || ''}
                    onChange={e => setTarget('level', e.target.value ? Number(e.target.value) : undefined)}
                    placeholder="lvl"
                    className="w-10 text-[9px] bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-gray-400 outline-none focus:border-indigo-600"
                    title="Goal level target (1–10)" />
                  <span className="text-[9px] text-gray-600">/10</span>
                </div>
              )}
              {(node.milestones || []).length > 0 && (
                <select value={tgt.milestone || ''} onChange={e => setTarget('milestone', e.target.value)}
                  className="text-[9px] bg-gray-800 border border-gray-700 rounded px-1 py-0.5 text-gray-400 outline-none focus:border-indigo-600 cursor-pointer"
                  title="Milestone">
                  <option value="">— milestone</option>
                  {(node.milestones || []).map(m => (
                    <option key={m.id} value={m.id}>{m.title}</option>
                  ))}
                </select>
              )}
              {indicator}
              <button onClick={handleRemove}
                className="ml-auto text-gray-700 hover:text-red-400 text-[10px] flex-shrink-0"
                title="Remove">×</button>
            </div>
          </div>
          {children.length > 0 && (
            <div className="mt-1">
              {children.map(child => (
                <ToLearnRow key={child.mm.id} entry={child} depth={depth + 1}
                  node={node} mms={mms} sirDoneMap={sirDoneMap}
                  onUpdateToLearn={onUpdateToLearn} onUpdateMmTargets={onUpdateMmTargets} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── GoalPickerModal ───────────────────────────────────────────────────────

            <span className="text-[10px] tracking-widest text-gray-500">LINK GOAL AS SUB-GOAL</span>
            <input ref={ref} value={search} onChange={e => setSearch(e.target.value)}

    // ── TaskPickerModal ───────────────────────────────────────────────────────

            <span className="text-[10px] tracking-widest text-gray-500">LINK EXISTING TASK</span>
            <input ref={ref} value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Search tasks…"
              className="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-xs text-white outline-none placeholder-gray-600 focus:border-sky-500" />

    // ── GoalNode ──────────────────────────────────────────────────────────────

    function GoalNode({ node, depth, handlers, goalColor, inDetailView, linkedRefId, milestoneOwner, insideMilestone = false, insideActiveMilestone = false }) {
      const { onToggle, onAddChild, onDelete, onDeleteKeepChildren, onUpdateTitle, onUpdateDate, onUpdateToLearn, onUpdateMmTargets, onAddSubGoal, onAddLinkedTask, onUnlinkTask, onAddLinkedSubGoal, onAddNote, onRemoveNote, onUpdateNote, onNestSubGoal, onNestTask, onArrangeTask, onAddMilestoneType, onRenameMilestoneType, onDeleteMilestoneType, onReorderMilestoneType, allGoals, mms, sirDoneMap } = handlers;
      const [hov, setHov]             = useState(false);
      const [showMMPicker, setShowMMPicker] = useState(false);
      const [editing, setEditing]     = useState(false);
      const [editVal, setEditVal]     = useState(node.title);
      const [showDate, setShowDate]   = useState(false);
      const [collapsed, setCollapsed] = useState(false);
      const [addingKid, setAddingKid] = useState(false);
      const [kidTitle, setKidTitle]   = useState('');
      const [kidType, setKidType]     = useState('task');
      const [kidMilestoneId, setKidMilestoneId] = useState('');
      const [addingSubGoal, setAddingSubGoal] = useState(false);
      const [subGoalTitle, setSubGoalTitle]   = useState('');
      const [addingMilestone, setAddingMilestone] = useState(false);
      const [milestoneTitle, setMilestoneTitle] = useState('');
      const [editingMilestoneId, setEditingMilestoneId] = useState(null);
      const [milestoneEditVal, setMilestoneEditVal] = useState('');
      const [pickingLink, setPickingLink]     = useState(false);
      const [pickingGoalLink, setPickingGoalLink] = useState(false);
      const [showNotePanel, setShowNotePanel] = useState(false);
      const [noteDraftTitle, setNoteDraftTitle] = useState('');
      const [noteDraftDetail, setNoteDraftDetail] = useState('');
      const [editingNoteId, setEditingNoteId] = useState(null);
      const [subGoalDragOver, setSubGoalDragOver] = useState(false);
      const [taskDragOver, setTaskDragOver] = useState(false);
      const [arrangeDragOver, setArrangeDragOver] = useState(null);
      const [pendingDelete, setPendingDelete] = useState(false);
      const editRef    = useRef(null);
      const kidRef     = useRef(null);
      const subGoalRef = useRef(null);
      const milestoneRef = useRef(null);
      const milestoneEditRef = useRef(null);

      useEffect(() => { if (editing  && editRef.current) editRef.current.focus(); }, [editing]);
      useEffect(() => { if (addingKid && kidRef.current)  kidRef.current.focus();  }, [addingKid]);
      useEffect(() => { if (addingSubGoal && subGoalRef.current) subGoalRef.current.focus(); }, [addingSubGoal]);
      useEffect(() => { if (addingMilestone && milestoneRef.current) milestoneRef.current.focus(); }, [addingMilestone]);
      useEffect(() => { if (editingMilestoneId && milestoneEditRef.current) milestoneEditRef.current.focus(); }, [editingMilestoneId]);

      const isParent = (node.children || []).length > 0;
      const isGoalType = depth === 0 || node.isSubGoal === true;
      const hasSubGoalKids = (node.children || []).some(c => c.isSubGoal);
      const isGoalLike = isGoalType && !hasSubGoalKids;
      const isGoalContainer = isGoalType && hasSubGoalKids;
      const isMilestone = isMilestoneNode(node);
      const currentMilestoneOwner = isGoalLike ? node : milestoneOwner;
      const blockedMilestoneBranch = insideMilestone || isMilestone;
      const todayStr = toDateStr(new Date());
      const milestoneDef = isMilestone ? (milestoneOwner?.milestones || []).find(m => m.id === node.milestoneId) : null;
      const thisMilestoneIsActive = !!(milestoneDef?.startDate && milestoneDef?.endDate && todayStr >= milestoneDef.startDate && todayStr <= milestoneDef.endDate);
      const nextInsideActiveMilestone = insideActiveMilestone || thisMilestoneIsActive;
      const availableMilestones = (currentMilestoneOwner?.milestones || [])
        .filter(m => !parentHasMilestoneChild(node, m.id, null, allGoals));
      const mmAutoComplete = isGoalLike ? computeMMAutoComplete(node, mms || [], sirDoneMap) : null;
      const resolveLink = allGoals ? id => findNode(allGoals, id) : null;
      const done = mmAutoComplete !== null ? mmAutoComplete : isComplete(node, allGoals);
      const prog = isParent ? countProgress(node, resolveLink) : null;

      useEffect(() => {
        if (kidType === 'milestone' && !availableMilestones.some(m => m.id === kidMilestoneId)) {
          setKidMilestoneId(availableMilestones[0]?.id || '');
        }
      }, [kidType, kidMilestoneId, availableMilestones.map(m => m.id).join('|')]);

      function commitEdit() {
        setEditing(false);
        const v = editVal.trim();
        if (v) onUpdateTitle(node.id, v);
        else   setEditVal(node.title);
      }

      function commitKid() {
        if (kidType === 'milestone') {
          const milestone = availableMilestones.find(m => m.id === kidMilestoneId);
          if (!milestone || blockedMilestoneBranch || parentHasMilestoneChild(node, milestone.id, null, allGoals)) return;
          onAddChild(node.id, {
            id: uid(), title: milestone.title, children: [], completed: false,
            createdAt: Date.now(), scheduledDate: null,
            taskType: 'milestone', milestoneId: milestone.id,
          });
        } else {
          const v = kidTitle.trim();
          if (v) onAddChild(node.id, {
            id: uid(), title: v, children: [], completed: false,
            createdAt: Date.now(), scheduledDate: null,
            taskType: kidType,
          });
        }
        setAddingKid(false);
        setKidTitle('');
        setKidType('task');
        setKidMilestoneId('');
      }

      function commitSubGoal() {
        const v = subGoalTitle.trim();
        if (v) onAddSubGoal(node.id, {
          id: uid(), title: v, children: [], completed: false,
          createdAt: Date.now(), scheduledDate: null,
          isSubGoal: true, toLearn: [], mmTargets: {}, milestones: [],
        });
        setAddingSubGoal(false);
        setSubGoalTitle('');
      }

      function commitMilestoneType() {
        const v = milestoneTitle.trim();
        if (v) onAddMilestoneType(node.id, v);
        setAddingMilestone(false);
        setMilestoneTitle('');
      }

      function commitMilestoneRename() {
        const v = milestoneEditVal.trim();
        if (editingMilestoneId && v) onRenameMilestoneType(node.id, editingMilestoneId, v);
        setEditingMilestoneId(null);
        setMilestoneEditVal('');
      }

      const hoverActions = (
        <div className={`flex items-center gap-0.5 flex-shrink-0 transition-opacity duration-100 ${hov ? 'opacity-100' : 'opacity-0'}`}>
          {node.isSubGoal && (
            <span
              draggable
              onDragStart={e => { e.dataTransfer.setData('application/subgoal-id', node.id); e.dataTransfer.effectAllowed = 'move'; e.stopPropagation(); }}
              title="Drag to promote to ultimate goal"
              className="text-gray-600 hover:text-violet-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60 cursor-grab select-none">⠿</span>
          )}
          {!isGoalType && (
            <span
              draggable
              onDragStart={e => {
                e.dataTransfer.setData('application/task-id', node.id);
                if (isMilestone) e.dataTransfer.setData('application/milestone-task-id', node.id);
                e.dataTransfer.effectAllowed = 'move';
                e.stopPropagation();
              }}
              title="Drag to nest into another task"
              className="text-gray-600 hover:text-indigo-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60 cursor-grab select-none">⠿</span>
          )}
          {!isGoalType && (
            <span
              draggable
              onDragStart={e => {
                e.dataTransfer.setData('application/arrange-id', node.id);
                e.dataTransfer.effectAllowed = 'move';
                e.stopPropagation();
              }}
              title="Drag to arrange among siblings"
              className="text-gray-600 hover:text-green-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60 cursor-grab select-none">⇅</span>
          )}
          <button onClick={() => setShowDate(v => !v)} title="Set date"
            className="text-gray-600 hover:text-indigo-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">◷</button>
          <button
            onClick={() => isGoalType ? setAddingSubGoal(v => !v) : setAddingKid(v => !v)}
            title={isGoalType ? "Add sub-goal" : "Add sub-task"}
            className={`text-gray-600 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60 font-bold ${isGoalType ? 'hover:text-violet-400' : 'hover:text-emerald-400'}`}>+</button>
          {!isGoalContainer && (
            <button onClick={() => setPickingLink(v => !v)} title="Link existing task"
              className="text-gray-600 hover:text-sky-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">^</button>
          )}
          {linkedRefId
            ? <button onClick={() => onUnlinkTask(linkedRefId)} title="Unlink task"
                className="text-gray-600 hover:text-sky-400 text-xs px-1 py-0.5 rounded hover:bg-gray-700/60">↩</button>
            : <button onClick={() => {
                const hasChildren = (node.children || []).filter(c => !c.isLink).length > 0;

            {depth === 0 && !inDetailView && (
              <div className="border-t border-gray-800/70">
                <GoalProgressViz node={node} goalColor={goalColor} goals={allGoals} />
              </div>
            )}
          </div>
          {pickingLink && (
            <TaskPickerModal
              goals={allGoals || []}
              excludeIds={[node.id, ...(node.children || []).filter(c => c.isLink).map(c => c.linkedTaskId)]}
              onSelect={taskId => { onAddLinkedTask(node.id, taskId); setPickingLink(false); }}
              onClose={() => setPickingLink(false)}
            />
          )}
          {pickingGoalLink && (
            <GoalPickerModal
              goals={allGoals || []}
              excludeId={node.id}
              excludeLinkedIds={(node.children||[]).filter(c => c.isSubGoal && c.isLink).map(c => c.linkedTaskId)}
              onSelect={goalId => { onAddLinkedSubGoal(node.id, goalId); setPickingGoalLink(false); }}
              onClose={() => setPickingGoalLink(false)}
            />
          )}
        </>);
      }

      const indent = (depth - 1) * 18;
      const isNeutralMilestone = isMilestone && !isParent;
      const displayDone = isNeutralMilestone ? false : done;

      return (<>
        <div>
          <div
            style={{ paddingLeft: indent, ...(insideActiveMilestone && !hov && !taskDragOver ? { backgroundColor: node.taskType === 'routine' ? 'rgba(245, 158, 11, 0.12)' : 'rgba(6, 182, 212, 0.10)' } : {}) }}
            className={`flex items-center gap-1.5 py-0.5 px-1 rounded transition-colors ${hov ? 'bg-gray-800/50' : ''} ${taskDragOver ? 'ring-1 ring-indigo-500 bg-indigo-950/30' : ''} ${arrangeDragOver === 'before' ? 'border-t-2 border-green-500' : arrangeDragOver === 'after' ? 'border-b-2 border-green-500' : ''}`}
            onMouseEnter={() => setHov(true)}
            onMouseLeave={() => setHov(false)}
            onDragOver={e => {
              const types = e.dataTransfer.types;
              if (types.includes('application/arrange-id')) {
                e.preventDefault(); e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                setArrangeDragOver(e.clientY < rect.top + rect.height / 2 ? 'before' : 'after');
              } else if (types.includes('application/task-id') && !(blockedMilestoneBranch && types.includes('application/milestone-task-id'))) {
                e.preventDefault(); e.stopPropagation(); setTaskDragOver(true);
              }
            }}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) { setTaskDragOver(false); setArrangeDragOver(null); } }}
            onDrop={e => {
              const arrangeId = e.dataTransfer.getData('application/arrange-id');
              if (arrangeId && arrangeId !== node.id) {
                e.preventDefault(); e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();
                onArrangeTask(arrangeId, node.id, e.clientY < rect.top + rect.height / 2);
              } else {
                const draggedId = e.dataTransfer.getData('application/task-id');
                if (draggedId && draggedId !== node.id) { e.preventDefault(); e.stopPropagation(); onNestTask(draggedId, node.id); }
              }
              setTaskDragOver(false); setArrangeDragOver(null);
            }}
          >
            {isParent ? (
              <button onClick={() => setCollapsed(c => !c)}
                className="text-gray-600 hover:text-gray-300 text-xs w-3.5 flex-shrink-0 leading-none">
                {collapsed ? '▶' : '▼'}
              </button>
            ) : isMilestone ? (
              <span className="w-3.5 flex-shrink-0 text-cyan-500 text-[11px] leading-none" title="Milestone">◇</span>
            ) : (
              <input type="checkbox" checked={node.completed} onChange={() => onToggle(node.id)}
                className={`flex-shrink-0 w-3.5 h-3.5 cursor-pointer ${node.taskType === 'routine' ? 'accent-amber-500' : 'accent-indigo-500'}`} />
            )}
            {editing ? (
              <input ref={editRef} value={editVal} onChange={e => setEditVal(e.target.value)}
                onBlur={commitEdit}
                onKeyDown={e => {
                  if (e.key === 'Enter')  commitEdit();
                  if (e.key === 'Escape') { setEditing(false); setEditVal(node.title); }
                }}
                className="flex-1 bg-gray-800 border border-indigo-500 rounded px-1.5 py-0.5 text-xs text-white outline-none min-w-0" />
            ) : (
              <span
                onDoubleClick={() => { setEditing(true); setEditVal(node.title); }}
                title={node.title}
                className={`flex-1 text-xs select-none min-w-0 truncate cursor-default ${
                  displayDone ? 'line-through text-gray-600' : isMilestone ? 'text-cyan-300 font-semibold' : isParent ? 'text-gray-200 font-semibold' : node.taskType === 'routine' ? (insideActiveMilestone ? 'text-amber-400' : 'text-amber-600') : (insideActiveMilestone ? 'text-gray-200' : 'text-gray-400')
                }`}
              >
                {node.title}
              </span>
            )}
            {node.scheduledDate && (
              <span onClick={() => setShowDate(v => !v)}
                className="text-xs px-1 py-0.5 rounded bg-indigo-900/30 text-indigo-400 flex-shrink-0 cursor-pointer hover:bg-indigo-900/50">
                {node.scheduledDate}
              </span>
            )}
            {hoverActions}
            {!isParent && (
              <button onClick={() => setShowNotePanel(v => !v)} title="add note"
                className={`flex-shrink-0 text-[11px] px-0.5 py-0.5 rounded transition-opacity transition-colors ${
                  (node.notes || []).length > 0 ? 'text-indigo-400 opacity-100' : `text-gray-600 hover:text-indigo-400 ${hov ? 'opacity-100' : 'opacity-0'}`
                }`}>✎</button>
            )}
          </div>
          {!isParent && (node.notes || []).length > 0 && (
            <div style={{ paddingLeft: indent + 22 }} className="flex flex-wrap gap-1 pb-0.5 pr-2">
              {(node.notes || []).map(nt => (
                <span key={nt.id}
                  className="text-[10px] bg-gray-800/80 border border-indigo-500/40 rounded px-1.5 py-0.5 text-indigo-300 cursor-default leading-tight">
                  📌 {nt.title}
                </span>
              ))}
            </div>
          )}
          {!isParent && showNotePanel && (
            <div style={{ paddingLeft: indent + 18 }} className="pr-2 mb-1">
              <div className="bg-gray-900 border border-indigo-700/60 rounded shadow-lg">
                <div className="flex items-center justify-between px-2 pt-1.5 pb-0.5">
                  <span className="text-[9px] text-indigo-500 uppercase tracking-widest font-semibold">Notes</span>
                  <button className="text-gray-500 hover:text-white text-xs leading-none" onClick={() => { setShowNotePanel(false); setEditingNoteId(null); setNoteDraftTitle(''); setNoteDraftDetail(''); }}>×</button>
                </div>
                {(node.notes || []).length > 0 && (
                  <div className="px-2 pb-1 flex flex-col gap-1 max-h-32 overflow-y-auto">
                    {(node.notes || []).map(nt => (
                      <div key={nt.id}
                        className={`bg-gray-800/70 border rounded px-2 py-1 relative group/note cursor-pointer ${editingNoteId === nt.id ? 'border-indigo-500' : 'border-indigo-900/50'}`}
                        onDoubleClick={e => { e.stopPropagation(); setNoteDraftTitle(nt.title); setNoteDraftDetail(nt.detail || ''); setEditingNoteId(nt.id); }}>
                        <p className="text-[11px] font-semibold text-indigo-200 leading-tight">{nt.title}</p>
                        {nt.detail && <p className="text-[10px] text-gray-400 leading-tight mt-0.5 whitespace-pre-wrap">{nt.detail}</p>}
                        <button
                          className="absolute top-0.5 right-0.5 text-sm text-gray-500 hover:text-red-400 leading-none p-1"
                          onClick={e => { e.stopPropagation(); if (window.confirm('Delete this note?')) { onRemoveNote(node.id, nt.id); if (editingNoteId === nt.id) { setEditingNoteId(null); setNoteDraftTitle(''); setNoteDraftDetail(''); } } }}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <div className="border-t border-gray-700/50 mx-2 mt-0.5" />
                <input value={noteDraftTitle} onChange={e => setNoteDraftTitle(e.target.value)}
                  placeholder="Title..."
                  className="w-full bg-transparent text-sm font-semibold text-white px-2 pt-1.5 pb-0.5 outline-none placeholder-gray-600" />
                <div className="border-t border-gray-700/50 mx-2" />
                <textarea value={noteDraftDetail} onChange={e => setNoteDraftDetail(e.target.value)}
                  placeholder="Details..." rows={2}
                  className="w-full bg-transparent text-[11px] text-gray-300 px-2 py-1 resize-none outline-none placeholder-gray-600" />
                <div className="flex justify-end px-2 pb-2">
                  <button
                    className="text-[11px] bg-indigo-600 hover:bg-indigo-500 text-white rounded px-3 py-0.5 font-semibold transition-colors disabled:opacity-40"
                    disabled={!noteDraftTitle.trim()}
                    onMouseDown={e => e.stopPropagation()}
                    onClick={e => {
                      e.stopPropagation();
                      if (!noteDraftTitle.trim()) return;
                      if (editingNoteId) {
