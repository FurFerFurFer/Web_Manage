                            onClick={e => e.stopPropagation()}>
                            {(() => {
                              const mmEntryNotes = entry.notes || (entry.noteTitle ? [{id: entry.id+'_n0', title: entry.noteTitle, detail: entry.noteDetail||'', createdAt: 0}] : []);
                              const nt = mmEntryNotes.find(n => n.id === viewingNote.noteId);
                              if (!nt) return null;
                              return React.createElement(React.Fragment, null,
                                React.createElement('div', { className: 'flex items-center justify-between px-2 pt-1.5 pb-1' },
                                  React.createElement('span', { className: 'text-[12px] font-semibold leading-tight', style: { color: col } }, nt.title),
                                  React.createElement('button', {
                                    className: 'text-gray-500 hover:text-white text-xs leading-none ml-2',
                                    onClick: e => { e.stopPropagation(); setViewingNote(null); },
                                    onMouseDown: e => e.stopPropagation()
                                  }, '×')
                                ),
                                nt.detail && React.createElement('p', { className: 'text-[11px] text-gray-400 px-2 pb-2 leading-snug whitespace-pre-wrap' }, nt.detail)
                              );
                            })()}
                          </div>
                        )}
                        {openSourcePicker.has(entry.id) && (() => {
                          const related = (sourceDumps || []).flatMap(dump =>
                            (dump.mmLinks || [])
                              .filter(link => link.mmId === entry.mmId)
                              .filter(link => getSCTextBlocks(link).length > 0 || (link.links || []).length > 0)
                              .map(link => ({ dump, link }))
                          );
                          const mode = sourcePickerMode[entry.id] || 'text';
                          const textItems = related.flatMap(({dump, link}) =>
                            getSCTextBlocks(link).map(b => ({dump, link, block: b}))
                          );
                          const linkItems = related.flatMap(({dump, link}) =>
                            (link.links || []).map(b => ({dump, link, block: b}))
                          );
                          const pinToggle = (dump, link, block, blockType) => e => {
                            e.stopPropagation();
                            const isPinned = (entry.sourcePins || []).some(p => p.dumpId === dump.id && p.linkId === link.id && p.blockId === block.id);
                            if (isPinned) {
                              const pin = (entry.sourcePins || []).find(p => p.dumpId === dump.id && p.linkId === link.id && p.blockId === block.id);
                              if (pin) setMmEntries(prev => prev.map(en => en.id !== entry.id ? en : {...en, sourcePins: (en.sourcePins||[]).filter(p => p.id !== pin.id)}));
                            } else {
                              setMmEntries(prev => prev.map(en => en.id !== entry.id ? en : {...en, sourcePins: [...(en.sourcePins||[]), {id: uid(), dumpId: dump.id, linkId: link.id, blockId: block.id, blockType, addedAt: Date.now()}]}));
                            }
                          };
                          return (
                            <div style={{ top: (top + height) + 'px', left: '3px', right: '3px', position: 'absolute', zIndex: 30 }}
                              className="bg-gray-900 border border-emerald-700/60 rounded-b shadow-xl"
                              onMouseDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
                              <div className="flex items-center justify-between px-2 pt-1.5 pb-0.5">
                                <div className="flex gap-1">
                                  <button
                                    className={`text-[9px] uppercase tracking-widest font-semibold px-1.5 py-0.5 rounded transition-colors ${mode === 'text' ? 'bg-emerald-800/60 text-emerald-400' : 'text-gray-500 hover:text-gray-300'}`}
                                    onClick={() => setSourcePickerMode(prev => ({...prev, [entry.id]: 'text'}))}>Text Block</button>
                                  <button
                                    className={`text-[9px] uppercase tracking-widest font-semibold px-1.5 py-0.5 rounded transition-colors ${mode === 'link' ? 'bg-emerald-800/60 text-emerald-400' : 'text-gray-500 hover:text-gray-300'}`}
                                    onClick={() => setSourcePickerMode(prev => ({...prev, [entry.id]: 'link'}))}>Link Block</button>
                                </div>
                                <button className="text-gray-500 hover:text-white text-xs leading-none"
                                  onClick={() => setOpenSourcePicker(prev => { const n = new Set(prev); n.delete(entry.id); return n; })}>×</button>
                              </div>
                              {mode === 'text'
                                ? (textItems.length === 0
                                  ? <div className="px-2 pb-2 text-[10px] text-gray-600 italic">No text blocks linked to this MM.</div>
                                  : <div className="px-2 pb-2 flex flex-col gap-1 max-h-48 overflow-y-auto">
                                      {textItems.map(({dump, link, block}) => {
                                        const isPinned = (entry.sourcePins || []).some(p => p.dumpId === dump.id && p.linkId === link.id && p.blockId === block.id);
                                        return (
                                          <div key={dump.id + '_' + link.id + '_' + block.id}
                                            className={`border rounded px-2 py-1 cursor-pointer transition-colors ${isPinned ? 'bg-emerald-900/30 border-emerald-500/60' : 'bg-gray-800/70 border-gray-700/50 hover:border-emerald-700/50'}`}
                                            onClick={pinToggle(dump, link, block, 'text')}>
                                            <div className="flex items-center gap-1">
                                              {block.title && <span className="text-[10px] font-semibold text-gray-300">{block.title}</span>}
                                              {isPinned && <span className="text-[9px] text-emerald-500 ml-auto">✓ pinned</span>}
                                            </div>
                                            <p className="text-[10px] text-gray-400 leading-tight mt-0.5">{block.explanation}</p>
                                          </div>
                                        );
                                      })}
                                    </div>)
                                : (linkItems.length === 0
                                  ? <div className="px-2 pb-2 text-[10px] text-gray-600 italic">No link blocks linked to this MM.</div>
                                  : <div className="px-2 pb-2 flex flex-col gap-1 max-h-48 overflow-y-auto">
                                      {linkItems.map(({dump, link, block}) => {
                                        const isPinned = (entry.sourcePins || []).some(p => p.dumpId === dump.id && p.linkId === link.id && p.blockId === block.id);
                                        return (
                                          <div key={dump.id + '_' + link.id + '_' + block.id}
                                            className={`border rounded px-2 py-1 cursor-pointer transition-colors ${isPinned ? 'bg-emerald-900/30 border-emerald-500/60' : 'bg-gray-800/70 border-gray-700/50 hover:border-emerald-700/50'}`}
                                            onClick={pinToggle(dump, link, block, 'link')}>
                                            <div className="flex items-center gap-1">
                                              <span className="text-[10px] font-semibold text-emerald-300">{block.label || block.url}</span>
                                              {isPinned && <span className="text-[9px] text-emerald-500 ml-auto">✓ pinned</span>}
                                            </div>
                                            {block.label && <p className="text-[10px] text-gray-400 leading-tight mt-0.5 truncate">{block.url}</p>}
                                          </div>
                                        );
                                      })}
                                    </div>)
                              }
                            </div>
                          );
                        })()}
                        {viewingSource?.taskId === entry.id && !commentOpen && !openSourcePicker.has(entry.id) && (() => {
                          const pin = (entry.sourcePins || []).find(p => p.id === viewingSource.pinId);
                          if (!pin) return null;
                          const dump = (sourceDumps || []).find(d => d.id === pin.dumpId);
                          const link = dump && (dump.mmLinks || []).find(l => l.id === pin.linkId);
                          if (!dump || !link) return null;
                          const allTextBlocks = getSCTextBlocks(link);
                          const blocks = pin.blockId && pin.blockType === 'text'
                            ? allTextBlocks.filter(b => b.id === pin.blockId)
                            : allTextBlocks;
                          const urlLinks = pin.blockId && pin.blockType === 'link'
                            ? (link.links || []).filter(b => b.id === pin.blockId)
                            : (link.links || []);
                          return (
                            <div style={{ top: (top + height) + 'px', left: '3px', right: '3px', position: 'absolute', zIndex: 30 }}
                              className="bg-gray-900 border border-emerald-700/60 rounded-b shadow-xl"
                              onMouseDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
                              <div className="flex items-center justify-between px-2 pt-1.5 pb-1">
                                <span className="text-[12px] font-semibold text-emerald-300">{dump.title}</span>
                                <button className="text-gray-500 hover:text-white text-xs leading-none ml-2"
                                  onClick={e => { e.stopPropagation(); setViewingSource(null); }}
                                  onMouseDown={e => e.stopPropagation()}>×</button>
                              </div>
                              {blocks.length > 0 && (
                                <div className="px-2 pb-1 max-h-36 overflow-y-auto flex flex-col gap-1">
                                  {blocks.map(b => (
                                    <div key={b.id}>
                                      {b.title && <p className="text-[11px] font-semibold text-gray-300">{b.title}</p>}
                                      {b.explanation && <p className="text-[10px] text-gray-400 leading-snug whitespace-pre-wrap">{b.explanation}</p>}
                                    </div>
                                  ))}
                                </div>
                              )}
                              {urlLinks.length > 0 && (
                                <div className="px-2 pb-2 flex flex-col gap-0.5">
                                  {urlLinks.map(u => (
                                    <a key={u.id} href={u.url} target="_blank" rel="noopener noreferrer"
                                      className="text-[10px] text-indigo-400 hover:text-indigo-300 truncate block"
                                      onClick={e => e.stopPropagation()}>
                                      🔗 {u.label || u.url}
                                    </a>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })()}
                        </React.Fragment>
                      );
                    })}

                    {/* Ghost block while dragging */}
                    {ghost && ghost.date === ds && (() => {
                      const [th, tm] = ghost.time.split(':').map(Number);
                      const dur  = ghost.duration || 60;
                      const top  = (th + tm / 60 - START_HOUR) * PX_PER_HOUR;
                      const h    = Math.max(22, (dur / 60) * PX_PER_HOUR);

                      if (ghost.type === 'entry') {
                        const entry  = saEntries.find(e => e.id === ghost.entryId);
                        if (!entry) return null;
                        const action = saActions.find(a => a.id === entry.actionId);
                        if (!action) return null;
                        return (
                          <div style={{ top: top + 'px', height: h + 'px', left: '3px', right: '3px', position: 'absolute',
                            borderColor: action.color, backgroundColor: action.color + '20' }}
                            className="rounded px-1.5 py-0.5 text-xs border border-dashed pointer-events-none z-20">
                            <div className="font-semibold truncate leading-tight" style={{ color: action.color }}>
                              {action.emoji} {action.title}
                            </div>
                            <div className="text-[10px] opacity-70">{formatTime12(ghost.time)}</div>
                          </div>
                        );
                      } else if (ghost.type === 'mmEntry') {
                        const entry = (mmEntries || []).find(e => e.id === ghost.entryId);
                        if (!entry) return null;
                        const mm = (mms || []).find(m => m.id === entry.mmId);
                        if (!mm) return null;
                        const col = mm.color || '#6366f1';
                        return (
                          <div style={{ top: top + 'px', height: h + 'px', left: '3px', right: '3px', position: 'absolute',
                            borderColor: col, backgroundColor: col + '20' }}
                            className="rounded px-1.5 py-0.5 text-xs border border-dashed pointer-events-none z-20">
                            <div className="font-semibold truncate leading-tight" style={{ color: col }}>
                              ◎ {mm.name}
                            </div>
                            <div className="text-[10px] opacity-70">{formatTime12(ghost.time)}</div>
                          </div>
                        );
                      } else {
                        const task = allTasks.find(t => t.id === ghost.taskId);
                        if (!task) return null;
                        return (
                          <div style={{ top: top + 'px', height: h + 'px', left: '3px', right: '3px', position: 'absolute' }}
                            className="rounded px-1.5 py-0.5 text-xs bg-indigo-400/20 border border-dashed border-indigo-400 text-indigo-300 pointer-events-none z-20">
                            <div className="font-semibold truncate leading-tight">{task.title}</div>
                            <div className="text-[10px] opacity-70">{formatTime12(ghost.time)}</div>
                          </div>
                        );
                      }
                    })()}
                  </div>
                );
              })}
            </div>
          </div>}

          {/* Calendar view */}
          {schedView === 'calendar' && (
            <div className="flex-1 overflow-y-auto p-4 max-w-2xl mx-auto w-full">
              <div className="flex items-center justify-between mb-4">
                <button onClick={()=>{setCalDate(p=>p.month===0?{year:p.year-1,month:11}:{...p,month:p.month-1});setSelDay(null);}}
                  className="text-gray-400 hover:text-white px-2">◀</button>
                <span className="font-bold tracking-widest">{MONTH_NAMES[calDate.month]} {calDate.year}</span>
                <button onClick={()=>{setCalDate(p=>p.month===11?{year:p.year+1,month:0}:{...p,month:p.month+1});setSelDay(null);}}
                  className="text-gray-400 hover:text-white px-2">▶</button>
              </div>
              <div className="grid grid-cols-7 mb-1">
                {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} className="text-center text-gray-500 text-xs py-1">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {Array(getFirstDay(calDate.year,calDate.month)).fill(null).map((_,i)=><div key={`e${i}`}/>)}
                {Array(getDIM(calDate.year,calDate.month)).fill(null).map((_,i)=>{
                  const day=i+1, ds=dStr(calDate.year,calDate.month,day);
                  const active=(sessionsByDate[ds]||[]).filter(s=>!s.done&&!s.skipped);
                  const isToday=ds===toDateStr(new Date()), isSel=selDay===day;
                  return (
                    <div key={day} onClick={()=>setSelDay(isSel?null:day)}
                      className={`rounded p-1 cursor-pointer min-h-[48px] border transition ${isSel?"border-white":"border-gray-800 hover:border-gray-600"} ${isToday?"bg-gray-800":"bg-gray-900"}`}>
                      <div className={`text-xs mb-1 ${isToday?"text-white font-bold":"text-gray-400"}`}>{day}</div>
                      <div className="flex flex-wrap gap-0.5">
                        {active.slice(0,4).map(s=><div key={s.id} className="w-2 h-2 rounded-full" style={{backgroundColor:mmColor(s.mmId)}}/>)}
                        {active.length>4&&<span className="text-gray-500 text-xs">+{active.length-4}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
              {selDay&&(()=>{
                const selSessions=sessionsByDate[dStr(calDate.year,calDate.month,selDay)]||[];
                return (
                  <div className="mt-4 bg-gray-900 rounded border border-gray-700 p-3">
                    <div className="font-bold mb-2 text-xs tracking-widest text-gray-300">{MONTH_NAMES[calDate.month]} {selDay}</div>
                    {!selSessions.length&&<div className="text-gray-500 text-xs">No sessions.</div>}
                    {selSessions.map(s=>{
                      const mm=(mms||[]).find(m=>m.id===s.mmId);
                      return (
                        <div key={s.id}
                          className="flex items-center justify-between rounded px-3 py-2 mb-1 bg-emerald-900 text-emerald-200">
                          <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full" style={{backgroundColor:mmColor(s.mmId)}}/>
                            <span className="font-bold">{mm?.name||"?"}</span>
                          </div>
                          <span className="text-xs opacity-70">rep {s.repIndex+1} · D{SIR_INTERVALS[s.repIndex]}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          )}

        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [goals,      setGoals]      = useState(() => expandAnchorToLearn(_readP('goals', []), _readMMs()));
      const [saActions,  setSaActions]  = useState(() => _readP('saActions',  []));
      const [saEntries,  setSaEntries]  = useState(() => _readP('saEntries',  []));
      const [mmEntries,  setMmEntries]  = useState(() => _readP('mmEntries',  []));
      const [mms]                       = useState(() => _readMMs());
      const [sessions]                  = useState(() => _readSessions());
      const [mgChanges]                 = useState(() => _readMGChanges());
      const [sourceDumps]               = useState(() => _readP('sourceDumps', []));
      const [mgSchedule, setMgSchedule] = useState(() => _readP('mgSchedule', {}));
      const [tab, setTab] = useState(() => window.location.hash.slice(1) || 'progress');

      useEffect(() => { _writeP('goals',      goals);      }, [goals]);
      useEffect(() => { _writeP('saActions',  saActions);  }, [saActions]);
      useEffect(() => { _writeP('saEntries',  saEntries);  }, [saEntries]);
      useEffect(() => { _writeP('mmEntries',  mmEntries);  }, [mmEntries]);
      useEffect(() => { _writeP('mgSchedule', mgSchedule); }, [mgSchedule]);

      useEffect(() => {
        function onVisible() {
          if (document.visibilityState === 'visible') {
            const freshMms = _readMMs();
            setGoals(prev => expandAnchorToLearn(prev, freshMms));
          }
        }
        document.addEventListener('visibilitychange', onVisible);
        return () => document.removeEventListener('visibilitychange', onVisible);
      }, []);

      const sirDoneMap = useMemo(() => buildSirDoneMap(sessions), [sessions]);

      const allLeaves  = flattenAll(goals).filter(n => (n.children || []).length === 0);
      const doneLeaves = allLeaves.filter(n => {
        const ac = computeMMAutoComplete(n, mms, sirDoneMap);
        return ac !== null ? ac : n.completed;
      });
      let mmDone = 0, mmTotal = 0;
      flattenAll(goals).forEach(n => {
        (n.toLearn || []).forEach(mmId => {
          const mm = (mms || []).find(m => m.id === mmId);
          if (!mm) return;
          const tgt = (n.mmTargets || {})[mmId] || {};
          if (!(tgt.stage || tgt.level)) return;
          mmDone += mmProgressFraction(mm, tgt, sirDoneMap);
          mmTotal++;
        });
      });
      const toActionFrac = allLeaves.length === 0 ? 0 : doneLeaves.length / allLeaves.length;
      const toLearnFrac  = mmTotal === 0 ? 0 : mmDone / mmTotal;
      const hasBoth = allLeaves.length > 0 && mmTotal > 0;
      const pct = hasBoth                ? Math.round((toActionFrac + toLearnFrac) / 2 * 100)
                : allLeaves.length > 0   ? Math.round(toActionFrac * 100)
                : mmTotal > 0            ? Math.round(toLearnFrac * 100)
                : 0;

      return (
        <div className="h-screen bg-gray-950 text-gray-300 font-mono flex flex-col text-xs overflow-hidden">

          {/* Header */}
          <header className="sticky top-0 z-10 flex items-center gap-0 border-b border-gray-800 bg-gray-900/90 backdrop-blur-sm">
            <a href="index.html"
              className="px-4 py-3 text-gray-600 hover:text-gray-300 transition-colors border-r border-gray-800">
              ← TRACK
            </a>

            <button
              onClick={() => setTab('progress')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'progress'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              PROGRESS
            </button>
            <button
              onClick={() => setTab('schedule')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'schedule'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              SCHEDULE
            </button>
            <button
              onClick={() => setTab('actions')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'actions'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              ACTIONS
            </button>
            <button
              onClick={() => setTab('mindmaps')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'mindmaps'
                  ? 'border-indigo-500 text-indigo-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              MIND MAPS
            </button>
            <button
              onClick={() => setTab('mg')}
              className={`px-5 py-3 tracking-widest transition-colors border-b-2 ${
                tab === 'mg'
                  ? 'border-emerald-500 text-emerald-300'
                  : 'border-transparent text-gray-600 hover:text-gray-400'
              }`}
            >
              MG
            </button>

            {allLeaves.length > 0 && (
              <div className="flex items-center gap-3 ml-auto px-4">
                <span className="text-gray-600">{doneLeaves.length}/{allLeaves.length}</span>
                <div className="w-28 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                  <div
                    className="h-full rounded-full transition-all duration-500"
                    style={{ width: `${pct}%`, backgroundColor: pct === 100 ? '#10b981' : '#6366f1' }}
                  />
                </div>
                <span className={`w-8 text-right tabular-nums ${pct === 100 ? 'text-emerald-400' : 'text-gray-600'}`}>
                  {pct}%
                </span>
              </div>
            )}
          </header>

          {/* Tab: PROGRESS */}
          {tab === 'progress' && (
            <div className="flex-1 flex flex-col min-h-0">
              <GoalTabsPanel goals={goals} setGoals={setGoals} mms={mms} sirDoneMap={sirDoneMap} />
            </div>
          )}

          {/* Tab: SCHEDULE */}
          {tab === 'schedule' && (
            <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
              <SchedulePanel
                goals={goals} setGoals={setGoals}
                saActions={saActions} saEntries={saEntries} setSaEntries={setSaEntries}
                mms={mms} mmEntries={mmEntries} setMmEntries={setMmEntries}
                sessions={sessions}
                mgChanges={mgChanges} mgSchedule={mgSchedule} setMgSchedule={setMgSchedule}
                sourceDumps={sourceDumps}
              />
            </div>
          )}

          {/* Tab: ACTIONS */}
          {tab === 'actions' && (
            <div className="flex-1 overflow-y-auto p-6 max-w-3xl mx-auto w-full">
              <div className="text-gray-700 tracking-widest mb-6 text-xs">
                SUPPORTING ACTIONS — define a time slot · add to any day from the schedule
              </div>
              <SupportingActionsPanel
                saActions={saActions} setSaActions={setSaActions}
                saEntries={saEntries} setSaEntries={setSaEntries}
              />
            </div>
          )}

          {/* Tab: MIND MAPS */}
          {tab === 'mindmaps' && (
            <div className="flex-1 overflow-y-auto p-6 max-w-3xl mx-auto w-full">
              <MindMapsPanel />
            </div>
          )}

          {/* Tab: MG */}
          {tab === 'mg' && (
            <div className="flex-1 overflow-y-auto">
              <MGPanel
                mms={mms}
                mgChanges={mgChanges}
                mgSchedule={mgSchedule}
                setMgSchedule={setMgSchedule}
              />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
